
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>BOO-RICULUM GAMES</title>
<meta name="theme-color" content="#0a0014">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:#0a0014;
  --card-h:130px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:'Fredoka One','M PLUS Rounded 1c',sans-serif;
  background:var(--bg);color:#fff;
  min-height:100dvh;overflow-y:auto;overflow-x:hidden;padding-bottom:2rem;
}

.bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.bg-blob{
  position:absolute;border-radius:50%;
  filter:blur(80px);opacity:0.18;
  animation:blobDrift var(--dur,12s) ease-in-out infinite alternate;
}
.bg-blob:nth-child(1){width:500px;height:500px;background:#a855f7;top:-100px;left:-150px;--dur:13s;}
.bg-blob:nth-child(2){width:420px;height:420px;background:#00d4ff;bottom:-80px;right:-100px;--dur:17s;}
.bg-blob:nth-child(3){width:320px;height:320px;background:#ff6b9d;top:40%;left:58%;--dur:11s;}
.bg-blob:nth-child(4){width:260px;height:260px;background:#ffe94a;bottom:20%;left:5%;--dur:19s;}
@keyframes blobDrift{from{transform:translate(0,0) scale(1);}to{transform:translate(28px,36px) scale(1.08);}}

.star{
  position:fixed;border-radius:50%;background:#fff;opacity:0;
  pointer-events:none;z-index:0;
  animation:twinkle var(--td,3s) var(--td2,0s) ease-in-out infinite;
}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(0.5);}50%{opacity:0.9;transform:scale(1.4);}}

.header{position:relative;z-index:10;text-align:center;padding:1.6rem 1rem 0.6rem;}
.header-inner{display:inline-flex;flex-direction:column;align-items:center;gap:0.15rem;}

.close-btn{
  position:absolute;top:1.2rem;right:1.2rem;
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.25);
  color:#fff;font-size:1.4rem;display:flex;align-items:center;justify-content:center;
  cursor:pointer;text-decoration:none;z-index:20;
  transition:background 0.2s,transform 0.2s;
  backdrop-filter:blur(8px);line-height:1;
}
.close-btn:hover{background:rgba(255,80,80,0.5);transform:scale(1.12) rotate(5deg);}

.title-rainbow{
  font-family:'Fredoka One',sans-serif;
  font-size:clamp(26px,6.5vw,50px);letter-spacing:0.05em;
  background:linear-gradient(120deg,#ff6b9d,#ffe94a,#00d4ff,#a855f7,#34d399,#ff8c42);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:rainbowShift 4s linear infinite;
  line-height:1.1;filter:drop-shadow(0 0 12px rgba(255,107,157,0.5));
}
@keyframes rainbowShift{0%{background-position:0% center;}100%{background-position:200% center;}}

.title-jp{
  font-family:'M PLUS Rounded 1c',sans-serif;
  font-size:clamp(13px,3vw,18px);color:rgba(255,255,255,0.6);font-weight:400;letter-spacing:0.08em;
}
.divider{
  margin:0.8rem auto 0;height:4px;border-radius:9px;
  background:linear-gradient(90deg,#ff6b9d,#00d4ff,#ffe94a);
  animation:shimmerBar 2s ease-in-out infinite alternate;
}
@keyframes shimmerBar{from{width:60px;opacity:0.7;}to{width:120px;opacity:1;}}

.grid-wrap{
  position:relative;z-index:10;display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;padding:1.2rem 1rem 2rem;max-width:680px;margin:0 auto;
}

.tile{
  position:relative;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  height:var(--card-h);border-radius:22px;
  text-decoration:none;cursor:pointer;overflow:hidden;
  border:3px solid rgba(255,255,255,0.18);
  transition:transform 0.18s ease,filter 0.18s ease;
  -webkit-tap-highlight-color:transparent;
}
/* 9 unique gradients */
.tile:nth-child(1){background:linear-gradient(145deg,#ff6b9d,#d63384);}
.tile:nth-child(2){background:linear-gradient(145deg,#00d4ff,#0ea5e9);}
.tile:nth-child(3){background:linear-gradient(145deg,#ffe94a,#f59e0b);}
.tile:nth-child(4){background:linear-gradient(145deg,#a855f7,#7c3aed);}
.tile:nth-child(5){background:linear-gradient(145deg,#34d399,#059669);}
.tile:nth-child(6){background:linear-gradient(145deg,#ff8c42,#c2410c);}
.tile:nth-child(7){background:linear-gradient(145deg,#e879f9,#a21caf);}
.tile:nth-child(8){background:linear-gradient(145deg,#38bdf8,#1d4ed8);}
.tile:nth-child(9){background:linear-gradient(145deg,#86efac,#15803d);}

.tile:hover{transform:translateY(-4px) scale(1.03);filter:brightness(1.15);}
.tile:active{transform:scale(0.96);}

.tile::before{
  content:'';position:absolute;top:-60%;left:-80%;
  width:60%;height:220%;
  background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,0.35) 50%,transparent 70%);
  transform:skewX(-20deg);transition:left 0.5s ease;pointer-events:none;z-index:2;
}
.tile:hover::before{left:140%;}
.tile::after{
  content:'';position:absolute;width:160%;height:160%;
  border-radius:50%;border:3px solid rgba(255,255,255,0.12);
  animation:tileRing 8s linear infinite;pointer-events:none;z-index:1;
}
@keyframes tileRing{to{transform:rotate(360deg);}}

.tile-content{
  position:relative;z-index:3;display:flex;flex-direction:column;
  align-items:center;gap:2px;text-align:center;padding:0 6px;width:100%;
}
.tile-en{
  font-family:'Fredoka One',sans-serif;
  font-size:clamp(13px,2.8vw,17px);color:#fff;
  text-shadow:0 2px 6px rgba(0,0,0,0.35);line-height:1.15;word-break:break-word;
}
.tile-jp{
  font-family:'M PLUS Rounded 1c',sans-serif;
  font-size:clamp(10px,2vw,13px);color:rgba(255,255,255,0.82);
  font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,0.3);line-height:1.2;
}
.tile-kanji{
  font-family:'M PLUS Rounded 1c',sans-serif;
  font-size:clamp(9px,1.8vw,12px);color:rgba(255,255,255,0.6);font-weight:400;line-height:1.1;
}

.kaboom-ring{
  position:fixed;border-radius:50%;border:4px solid #fff;
  pointer-events:none;z-index:9998;opacity:0.85;
  animation:ringExpand 0.55s cubic-bezier(0.2,0.8,0.4,1) forwards;
}
@keyframes ringExpand{
  from{transform:translate(-50%,-50%) scale(0);opacity:0.85;}
  to  {transform:translate(-50%,-50%) scale(4.5);opacity:0;}
}
.burst-dot{
  position:fixed;width:10px;height:10px;border-radius:50%;
  pointer-events:none;z-index:9999;
  animation:burstFly var(--dur,0.7s) ease-out forwards;
}
@keyframes burstFly{
  0%  {transform:translate(-50%,-50%) translate(0,0) scale(1);opacity:1;}
  100%{transform:translate(-50%,-50%) translate(var(--bx),var(--by)) scale(0.2);opacity:0;}
}
.tile.warp{animation:tileWarp 0.35s ease-out forwards;}
@keyframes tileWarp{
  0%  {transform:scale(1);}
  45% {transform:scale(1.18);filter:brightness(1.4) saturate(1.5);}
  100%{transform:scale(1);}
}

#swipeScreen{
  position:fixed;inset:0;background:#000;z-index:9997;
  transform:translateY(100%);transition:transform 0.12s ease-in;pointer-events:none;
}
#swipeScreen.go{transform:translateY(0);}

@media(max-width:500px){
  .grid-wrap{grid-template-columns:repeat(2,1fr);gap:12px;padding:1rem 0.85rem 2rem;}
  :root{--card-h:118px;}
}
</style>
</head>
<body>


<div class="bg-layer">
  <div class="bg-blob"></div><div class="bg-blob"></div>
  <div class="bg-blob"></div><div class="bg-blob"></div>
</div>

<header class="header">
   <a class="close-btn" href="../maze.html" id="closeBtn" title="Back / もどる">✕</a>
  <div class="header-inner">
    <div class="title-rainbow">BOO-RICULUM GAMES</div>
    <div class="title-jp">ブー・リキュラム ゲームズ</div>
    <div class="divider"></div>
  </div>
</header>

<div class="grid-wrap" id="gameGrid">
  <a class="tile" href="br_vt.html"><div class="tile-content">
    <div class="tile-en">Vocabulary Tap</div><div class="tile-jp">たんごをタップ</div><div class="tile-kanji">単語タップ</div>
  </div></a>
  <a class="tile" href="br_spell.html"><div class="tile-content">
    <div class="tile-en">Spell the Word</div><div class="tile-jp">もじをならべよう</div><div class="tile-kanji">文字並べ</div>
  </div></a>
  <a class="tile" href="br_vs.html"><div class="tile-content">
    <div class="tile-en">Vocabulary Speed</div><div class="tile-jp">たんごスピード</div><div class="tile-kanji">単語速読</div>
  </div></a>
  <a class="tile" href="br_st.html"><div class="tile-content">
    <div class="tile-en">Sentences Tap</div><div class="tile-jp">ぶんをタップ</div><div class="tile-kanji">文タップ</div>
  </div></a>
  <a class="tile" href="br_so.html"><div class="tile-content">
    <div class="tile-en">Sentence Order</div><div class="tile-jp">ぶんをならべよう</div><div class="tile-kanji">文の順番</div>
  </div></a>
  <a class="tile" href="br_se.html"><div class="tile-content">
    <div class="tile-en">Sentence Speed</div><div class="tile-jp">ぶんのスピード</div><div class="tile-kanji">文速読</div>
  </div></a>
  <a class="tile" href="br_stw.html"><div class="tile-content">
    <div class="tile-en">Say the Word</div><div class="tile-jp">ことばをいおう</div><div class="tile-kanji">言葉を言おう</div>
  </div></a>
  <a class="tile" href="br_sts.html"><div class="tile-content">
    <div class="tile-en">Say the Sentence</div><div class="tile-jp">ぶんをいおう</div><div class="tile-kanji">文を言おう</div>
  </div></a>
  <a class="tile" href="br_atq.html"><div class="tile-content">
    <div class="tile-en">Ask the Question</div><div class="tile-jp">しつもんしよう</div><div class="tile-kanji">質問しよう</div>
  </div></a>
</div>

<div id="swipeScreen"></div>

<script>
(function(){
  const COLORS=['#ff6b9d','#00d4ff','#ffe94a','#a855f7','#34d399','#ff8c42','#e879f9','#38bdf8','#86efac'];
  for(let i=0;i<55;i++){
    const s=document.createElement('div');s.className='star';
    s.style.left=Math.random()*100+'vw';s.style.top=Math.random()*100+'vh';
    s.style.background=COLORS[i%COLORS.length];
    s.style.width=s.style.height=(2+Math.random()*4)+'px';
    s.style.setProperty('--td',(2+Math.random()*4)+'s');
    s.style.setProperty('--td2',(Math.random()*4)+'s');
    document.body.appendChild(s);
  }
})();

const DOT_COLORS=['#ff6b9d','#00d4ff','#ffe94a','#a855f7','#34d399','#ff8c42','#e879f9','#38bdf8','#86efac'];
function kaboom(cx,cy,ringColor){
  const ring=document.createElement('div');
  ring.className='kaboom-ring';
  ring.style.cssText=`left:${cx}px;top:${cy}px;width:60px;height:60px;border-color:${ringColor||'#fff'};`;
  document.body.appendChild(ring);
  ring.addEventListener('animationend',()=>ring.remove());
  setTimeout(()=>{
    const r2=ring.cloneNode();r2.style.borderColor='rgba(255,255,255,0.45)';
    document.body.appendChild(r2);r2.addEventListener('animationend',()=>r2.remove());
  },90);
  const N=18;
  for(let i=0;i<N;i++){
    const a=(i/N)*Math.PI*2,d=52+Math.random()*72;
    const dot=document.createElement('div');dot.className='burst-dot';
    dot.style.cssText=`left:${cx}px;top:${cy}px;background:${DOT_COLORS[Math.floor(Math.random()*DOT_COLORS.length)]};`;
    dot.style.setProperty('--bx',(Math.cos(a)*d).toFixed(1)+'px');
    dot.style.setProperty('--by',(Math.sin(a)*d).toFixed(1)+'px');
    dot.style.setProperty('--dur',(0.5+Math.random()*0.4)+'s');
    document.body.appendChild(dot);dot.addEventListener('animationend',()=>dot.remove());
  }
}

let locked=false;
const swipe=document.getElementById('swipeScreen');
  
function getMonthFromWeek() {
  const weekParam = new URLSearchParams(window.location.search).get('week') || '';
  const m = weekParam.match(/_([a-z]{3})_w/i);
  return m ? m[1].toLowerCase() : null;
}
  
function getMonthFolder() {
  const map = {
    jan:'january', feb:'february', mar:'march', apr:'april',
    may:'may', jun:'june', jul:'july', aug:'august',
    sep:'september', oct:'october', nov:'november', dec:'december'
  };

  const m = getMonthFromWeek();
  return m ? map[m] : null;
}


function buildGameHref(baseHref) {
  const params = new URLSearchParams(window.location.search);
  const weekParam = params.get('week') || '';
  const monthFolder = getMonthFolder();

  const hrefWithFolder = monthFolder
    ? `${monthFolder}/${baseHref}`
    : baseHref;

  return weekParam
    ? `${hrefWithFolder}?week=${encodeURIComponent(weekParam)}`
    : hrefWithFolder;
}
  

function safeNavigate(href, cx, cy, tileEl, ringColor){
  if (locked) return;
  locked = true;

  const finalHref = buildGameHref(href);

  tileEl.classList.add('warp');
  kaboom(cx, cy, ringColor);

  setTimeout(() => {
    document.body.style.transition = 'background 0.08s';
    document.body.style.background = '#fff';
  }, 280);

  setTimeout(() => {
    document.body.style.background = 'var(--bg)';
    swipe.classList.add('go');
  }, 380);

  setTimeout(() => {
    window.location.href = finalHref;
  }, 560);
}

const RING_COLORS=['#ff6b9d','#00d4ff','#ffe94a','#a855f7','#34d399','#ff8c42','#e879f9','#38bdf8','#86efac'];
const tiles=[...document.querySelectorAll('.tile')];
document.getElementById('gameGrid').addEventListener('click',e=>{
  const tile=e.target.closest('.tile');
  if(!tile||locked)return;
  e.preventDefault();
  const idx=tiles.indexOf(tile);
  const r=tile.getBoundingClientRect();
  safeNavigate(tile.getAttribute('href'),r.left+r.width/2,r.top+r.height/2,tile,RING_COLORS[idx]||'#fff');
});

document.getElementById('closeBtn').addEventListener('click', function(e){
  e.preventDefault();
  if (locked) return;
  locked = true;

  const r = this.getBoundingClientRect();
  kaboom(r.left + r.width / 2, r.top + r.height / 2, '#ff6b9d');

  setTimeout(() => { swipe.classList.add('go'); }, 280);

  setTimeout(() => {
    const params = new URLSearchParams(window.location.search);
    const week = params.get('week');
    const url = week ? `../maze.html?week=${week}` : '../maze.html';
    window.location.href = url;
  }, 480);
});
  
</script>
</body>
</html>
