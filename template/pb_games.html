
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>PRE-BOO GAMES</title>
<meta name="theme-color" content="#fff5f9">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
<style>
/* ═══════════════════════════════════════════
   PRE-BOO — Soft candy pastel world
   9 tiles, no two colors alike
   ═══════════════════════════════════════════ */
:root {
  --bg:       #fce8f3;
  --bg2:      #f0f8ff;
  --t1:  #ff9ec4;  /* strawberry pink    */
  --t2:  #a8e6cf;  /* mint green         */
  --t3:  #ffd3a5;  /* peach              */
  --t4:  #b5d8fa;  /* sky blue           */
  --t5:  #e8c6f8;  /* lavender           */
  --t6:  #fef08a;  /* lemon yellow       */
  --t7:  #f9a8d4;  /* bubblegum          */
  --t8:  #6ee7b7;  /* seafoam            */
  --t9:  #fed7aa;  /* apricot            */
  --card-h: 136px;
  --radius: 28px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }

body {
  font-family: 'Baloo 2', 'Nunito', sans-serif;
  background: var(--bg);
  color: #4a2060;
  min-height: 100dvh;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: 2.5rem;
}

/* ── Polka-dot background ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle, rgba(255,158,196,0.22) 3px, transparent 3px),
    radial-gradient(circle, rgba(168,230,207,0.22) 3px, transparent 3px);
  background-size: 42px 42px, 70px 70px;
  background-position: 0 0, 21px 21px;
  pointer-events: none;
  z-index: 0;
}

/* ── Floating clouds ── */
.cloud {
  position: fixed;
  border-radius: 50px;
  background: rgba(255,255,255,0.55);
  filter: blur(2px);
  pointer-events: none;
  z-index: 0;
  animation: cloudDrift var(--cd, 18s) ease-in-out infinite alternate;
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  background: inherit;
}
.cloud:nth-child(1){ width:140px;height:50px;top:8%;left:-30px;--cd:20s; }
.cloud:nth-child(1)::before{ width:70px;height:60px;top:-28px;left:18px; }
.cloud:nth-child(1)::after { width:55px;height:50px;top:-20px;left:60px; }
.cloud:nth-child(2){ width:110px;height:40px;top:22%;right:-20px;--cd:25s; }
.cloud:nth-child(2)::before{ width:55px;height:48px;top:-22px;left:14px; }
.cloud:nth-child(2)::after { width:45px;height:40px;top:-16px;left:50px; }
.cloud:nth-child(3){ width:90px;height:35px;bottom:28%;left:10%;--cd:15s; }
.cloud:nth-child(3)::before{ width:46px;height:42px;top:-20px;left:10px; }
.cloud:nth-child(3)::after { width:38px;height:34px;top:-14px;left:42px; }
@keyframes cloudDrift {
  from { transform: translateX(0px); }
  to   { transform: translateX(28px); }
}

/* ── Floating hearts ── */
.heart {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  font-size: var(--hs, 18px);
  opacity: 0;
  animation: heartRise var(--hd, 5s) var(--hde, 0s) ease-in infinite;
}
@keyframes heartRise {
  0%   { opacity: 0; transform: translateY(0) scale(0.5) rotate(0deg); }
  15%  { opacity: 0.55; transform: translateY(-20px) scale(1) rotate(8deg); }
  85%  { opacity: 0.4; transform: translateY(-120px) scale(0.9) rotate(-6deg); }
  100% { opacity: 0; transform: translateY(-160px) scale(0.4) rotate(12deg); }
}

/* ── Header ── */
.header {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 1.8rem 1rem 0.5rem;
}
.header-inner {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 0.2rem;
}

.close-btn {
  position: absolute;
  top: 1.3rem;
  right: 1.3rem;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: rgba(255,255,255,0.75);
  border: 3px solid #ffb3d1;
  color: #c0607a;
  font-size: 1.25rem;
  font-family: 'Baloo 2', sans-serif;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  text-decoration: none;
  z-index: 20;
  transition: background 0.2s, transform 0.25s;
  box-shadow: 0 4px 14px rgba(255,100,160,0.2);
  line-height: 1;
}
.close-btn:hover { background: #ffcce0; transform: scale(1.15) rotate(-8deg); }

.title-main {
  font-family: 'Baloo 2', sans-serif;
  font-size: clamp(30px, 8vw, 58px);
  font-weight: 800;
  letter-spacing: 0.04em;
  line-height: 1.05;
  background: linear-gradient(135deg, #ff6fae 0%, #ff9ec4 30%, #e879a0 55%, #a855c8 80%, #7c3aad 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 3px 0 rgba(255,120,180,0.25));
}
.title-jp {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(12px, 2.8vw, 17px);
  color: rgba(160,80,130,0.75);
  font-weight: 700;
  letter-spacing: 0.1em;
}

/* Bouncy divider dots */
.dot-divider {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin: 0.75rem 0 0.2rem;
}
.dot-divider span {
  width: 10px; height: 10px;
  border-radius: 50%;
  display: block;
  animation: dotBounce 1.4s ease-in-out infinite;
}
.dot-divider span:nth-child(1){ background:#ff9ec4; animation-delay:0s; }
.dot-divider span:nth-child(2){ background:#a8e6cf; animation-delay:.15s; }
.dot-divider span:nth-child(3){ background:#ffd3a5; animation-delay:.30s; }
.dot-divider span:nth-child(4){ background:#b5d8fa; animation-delay:.45s; }
.dot-divider span:nth-child(5){ background:#e8c6f8; animation-delay:.60s; }
@keyframes dotBounce {
  0%,100%{ transform:translateY(0); }
  45%    { transform:translateY(-7px); }
}

/* ── Grid ── */
.grid-wrap {
  position: relative;
  z-index: 10;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  padding: 1rem 1.1rem 2rem;
  max-width: 680px;
  margin: 0 auto;
}

/* ── Tiles ── */
.tile {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: var(--card-h);
  border-radius: var(--radius);
  text-decoration: none;
  cursor: pointer;
  overflow: hidden;
  border: 3.5px solid rgba(255,255,255,0.8);
  box-shadow:
    0 6px 0 rgba(0,0,0,0.08),
    0 10px 22px rgba(0,0,0,0.07),
    inset 0 1px 0 rgba(255,255,255,0.7);
  transition: transform 0.16s cubic-bezier(.34,1.46,.64,1), filter 0.16s ease;
  -webkit-tap-highlight-color: transparent;
}

/* Unique colors — no repeats */
.tile:nth-child(1){ background: linear-gradient(145deg, #ffb3cc, var(--t1)); }
.tile:nth-child(2){ background: linear-gradient(145deg, #c8f2e0, var(--t2)); }
.tile:nth-child(3){ background: linear-gradient(145deg, #ffe5c0, var(--t3)); }
.tile:nth-child(4){ background: linear-gradient(145deg, #d4eaff, var(--t4)); }
.tile:nth-child(5){ background: linear-gradient(145deg, #f2dbff, var(--t5)); }
.tile:nth-child(6){ background: linear-gradient(145deg, #fffbd0, var(--t6)); }
.tile:nth-child(7){ background: linear-gradient(145deg, #ffc5df, var(--t7)); }
.tile:nth-child(8){ background: linear-gradient(145deg, #9ff7d4, var(--t8)); }
.tile:nth-child(9){ background: linear-gradient(145deg, #ffeac2, var(--t9)); }

.tile:hover {
  transform: translateY(-6px) scale(1.04);
  filter: brightness(1.06);
  box-shadow:
    0 12px 0 rgba(0,0,0,0.07),
    0 18px 30px rgba(0,0,0,0.1),
    inset 0 1px 0 rgba(255,255,255,0.7);
}
.tile:active { transform: scale(0.94) translateY(3px); }

/* Wobbly shine */
.tile::before {
  content: '';
  position: absolute;
  top: 8%; left: 12%;
  width: 38%; height: 28%;
  background: rgba(255,255,255,0.52);
  border-radius: 50%;
  filter: blur(6px);
  pointer-events: none;
  z-index: 2;
}
/* Bottom shadow band */
.tile::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 32%;
  background: linear-gradient(to top, rgba(0,0,0,0.06), transparent);
  border-radius: 0 0 var(--radius) var(--radius);
  pointer-events: none;
  z-index: 2;
}

.tile-content {
  position: relative;
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  text-align: center;
  padding: 0 8px;
}
.tile-en {
  font-family: 'Baloo 2', sans-serif;
  font-size: clamp(14px, 3vw, 18px);
  font-weight: 800;
  color: #3d1a4f;
  text-shadow: 0 2px 0 rgba(255,255,255,0.6);
  line-height: 1.1;
}
.tile-jp {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(10px, 2vw, 13px);
  color: rgba(80,30,100,0.78);
  font-weight: 700;
  line-height: 1.2;
}
.tile-kanji {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(9px, 1.7vw, 11px);
  color: rgba(80,30,100,0.52);
  font-weight: 400;
  line-height: 1.1;
}

/* ── POP click animation (no emoji) ── */
.pop-ring {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  border: 5px solid rgba(255,160,200,0.85);
  animation: popExpand 0.6s cubic-bezier(0.15, 0.85, 0.35, 1) forwards;
}
@keyframes popExpand {
  from { transform: translate(-50%,-50%) scale(0); opacity: 1; }
  to   { transform: translate(-50%,-50%) scale(5); opacity: 0; }
}
.pop-dot {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  animation: popDot var(--dur,0.65s) ease-out forwards;
}
@keyframes popDot {
  0%   { transform: translate(-50%,-50%) translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(-50%,-50%) translate(var(--bx),var(--by)) scale(0); opacity: 0; }
}
.tile.jelly {
  animation: jellyPop 0.38s cubic-bezier(.36,1.6,.58,1) forwards;
}
@keyframes jellyPop {
  0%  { transform: scale(1); }
  35% { transform: scale(1.14,0.88); }
  65% { transform: scale(0.94,1.08); }
  100%{ transform: scale(1); }
}

/* ── Swipe out ── */
#swipeScreen {
  position: fixed;
  inset: 0;
  background: #fce8f3;
  z-index: 9997;
  transform: scale(0);
  border-radius: 50%;
  transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1),
              border-radius 0.22s ease;
  pointer-events: none;
  transform-origin: center center;
}
#swipeScreen.go {
  transform: scale(4);
  border-radius: 0;
}

/* ── Mobile ── */
@media (max-width: 500px) {
  .grid-wrap { grid-template-columns: repeat(2,1fr); gap:14px; padding:0.9rem 0.9rem 2rem; }
  :root { --card-h: 124px; }
}
</style>
</head>

<script>
// ── Floating hearts (no emoji, pure CSS shapes) ───────────────────────────
(function(){
  const COLORS=['#ff9ec4','#a8e6cf','#ffd3a5','#b5d8fa','#e8c6f8','#fef08a'];
  for(let i=0;i<10;i++){
    const h=document.createElement('div');
    h.className='heart';
    h.textContent='♥'; // unicode character, not emoji
    h.style.left=(5+Math.random()*88)+'vw';
    h.style.bottom=(Math.random()*30)+'vh';
    h.style.color=COLORS[i%COLORS.length];
    h.style.setProperty('--hs',(14+Math.random()*10)+'px');
    h.style.setProperty('--hd',(4+Math.random()*4)+'s');
    h.style.setProperty('--hde',(Math.random()*5)+'s');
    document.body.appendChild(h);
  }
})();

// ── POP click animation ───────────────────────────────────────────────────
const DOT_COLORS=['#ff9ec4','#a8e6cf','#ffd3a5','#b5d8fa','#e8c6f8','#fef08a','#f9a8d4','#6ee7b7'];

function popBurst(cx, cy, tileEl){
  // Ripple ring in tile color
  const col = getComputedStyle(tileEl).backgroundColor || '#ffb3cc';
  const ring=document.createElement('div');
  ring.className='pop-ring';
  ring.style.left=cx+'px'; ring.style.top=cy+'px';
  ring.style.width='50px'; ring.style.height='50px';
  ring.style.borderColor=col;
  document.body.appendChild(ring);
  ring.addEventListener('animationend',()=>ring.remove());

  // Second softer ring
  setTimeout(()=>{
    const r2=document.createElement('div');
    r2.className='pop-ring';
    r2.style.left=cx+'px'; r2.style.top=cy+'px';
    r2.style.width='50px'; r2.style.height='50px';
    r2.style.borderColor='rgba(255,255,255,0.7)';
    r2.style.animationDuration='0.7s';
    document.body.appendChild(r2);
    r2.addEventListener('animationend',()=>r2.remove());
  },80);

  // Dot burst
  const N=14;
  for(let i=0;i<N;i++){
    const angle=(i/N)*Math.PI*2;
    const dist=45+Math.random()*55;
    const dot=document.createElement('div');
    dot.className='pop-dot';
    dot.style.left=cx+'px'; dot.style.top=cy+'px';
    dot.style.width=(6+Math.random()*8)+'px';
    dot.style.height=dot.style.width;
    dot.style.background=DOT_COLORS[Math.floor(Math.random()*DOT_COLORS.length)];
    dot.style.setProperty('--bx',(Math.cos(angle)*dist).toFixed(1)+'px');
    dot.style.setProperty('--by',(Math.sin(angle)*dist).toFixed(1)+'px');
    dot.style.setProperty('--dur',(0.45+Math.random()*0.35)+'s');
    document.body.appendChild(dot);
    dot.addEventListener('animationend',()=>dot.remove());
  }
}

// ── Navigation with smash-guard ───────────────────────────────────────────
let locked = false;
const swipe = document.getElementById('swipeScreen');

function safeNavigate(href, cx, cy, tileEl){
  if(locked) return;
  locked = true;

  tileEl.classList.add('jelly');
  popBurst(cx, cy, tileEl);

  // Expand swipe circle from click point
  swipe.style.transformOrigin = cx+'px '+cy+'px';

  setTimeout(()=>{ swipe.classList.add('go'); }, 220);
  setTimeout(()=>{ window.location.assign(href); }, 430);
}

document.getElementById('gameGrid').addEventListener('click', e=>{
  const tile = e.target.closest('.tile');
  if(!tile||locked) return;
  e.preventDefault();
  const r = tile.getBoundingClientRect();
  safeNavigate(tile.getAttribute('href'), r.left+r.width/2, r.top+r.height/2, tile);
});

// ── Close button ─────────────────────────────────────────────────────────
document.getElementById('closeBtn').addEventListener('click', function(e){
  e.preventDefault();
  if(locked) return;
  locked = true;
  const r = this.getBoundingClientRect();
  popBurst(r.left+r.width/2, r.top+r.height/2, this);
  setTimeout(()=>{ swipe.classList.add('go'); }, 220);
  setTimeout(()=>{
    if(window.history.length>1){ window.history.back(); }
    else { window.location.assign(this.getAttribute('href')); }
  }, 430);
});

// ── Block browser back-button smash ──────────────────────────────────────
// Push a dummy state so browser back fires popstate first
history.pushState({pbGames:true}, '');
window.addEventListener('popstate', function(e){
  if(locked) {
    // Already navigating — re-push so rapid back can't stack
    history.pushState({pbGames:true}, '');
    return;
  }
  // Intentional back: let it through
});
</script>
