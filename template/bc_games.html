
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>BOO-CONTINUUM GAMES</title>
<meta name="theme-color" content="#0c0a0f">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />
<style>
/* ═══════════════════════════════════════════
   BOO-CONTINUUM — Dark Ritual Chamber
   Obsidian base, crimson/violet ember accents
   ═══════════════════════════════════════════ */
:root {
  --bg:    #0c0a0f;
  --panel: rgba(18,12,26,0.85);
  --ink:   #d4c8e8;
  --ember: #ff4d2e;
  --violet:#9b5de5;
  --gold:  #e8c547;
  --teal:  #00c9a7;

  /* 9 unique tile accent pairs */
  --t1a:#ff4d2e; --t1b:#7a1a0a;
  --t2a:#9b5de5; --t2b:#3d0f6b;
  --t3a:#e8c547; --t3b:#6b4a00;
  --t4a:#00c9a7; --t4b:#004d3e;
  --t5a:#f72585; --t5b:#5a0030;
  --t6a:#4cc9f0; --t6b:#0a3d5c;
  --t7a:#a8ff78; --t7b:#1a5200;
  --t8a:#ff9f1c; --t8b:#6b3200;
  --t9a:#c0c0ff; --t9b:#1a1a6b;

  --card-h: 128px;
  --radius: 10px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:'Cinzel','Noto Sans JP',sans-serif;
  background:var(--bg);color:var(--ink);
  min-height:100dvh;overflow-y:auto;overflow-x:hidden;padding-bottom:2.5rem;
  position:relative;
}

/* ── Noise grain overlay ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  background-size:200px 200px;opacity:0.35;
}

/* ── Smoke blobs ── */
.bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.smoke{
  position:absolute;border-radius:50%;
  filter:blur(100px);
  animation:smokeDrift var(--sd,20s) ease-in-out infinite alternate;
}
.smoke:nth-child(1){width:700px;height:500px;background:rgba(155,93,229,0.10);top:-120px;left:-180px;--sd:25s;}
.smoke:nth-child(2){width:600px;height:400px;background:rgba(255,77,46,0.07);bottom:-100px;right:-120px;--sd:19s;}
.smoke:nth-child(3){width:400px;height:400px;background:rgba(232,197,71,0.06);top:30%;left:50%;--sd:30s;}
.smoke:nth-child(4){width:300px;height:300px;background:rgba(0,201,167,0.05);top:60%;left:10%;--sd:22s;}
@keyframes smokeDrift{
  from{transform:translate(0,0) scale(1) rotate(0deg);}
  to  {transform:translate(22px,34px) scale(1.07) rotate(3deg);}
}

/* Crack texture overlay on tiles */
.crack-svg{position:absolute;inset:0;pointer-events:none;z-index:1;opacity:0.06;}

/* ── Header ── */
.header{position:relative;z-index:10;text-align:center;padding:2rem 1rem 0.5rem;}
.header-inner{display:inline-flex;flex-direction:column;align-items:center;gap:0.3rem;}

.close-btn{
  position:absolute;top:1.4rem;right:1.4rem;
  width:44px;height:44px;border-radius:6px;
  background:rgba(255,77,46,0.08);
  border:1.5px solid rgba(255,77,46,0.35);
  color:#ff4d2e;font-size:1.2rem;
  font-family:'Cinzel',sans-serif;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;text-decoration:none;z-index:20;
  transition:background 0.2s,box-shadow 0.2s,transform 0.15s;
  line-height:1;
}
.close-btn:hover{
  background:rgba(255,77,46,0.2);
  box-shadow:0 0 18px rgba(255,77,46,0.5);
  transform:scale(1.08);
}

.title-main{
  font-family:'Cinzel',sans-serif;
  font-size:clamp(20px,5vw,42px);
  font-weight:900;
  letter-spacing:0.14em;
  text-transform:uppercase;
  background:linear-gradient(160deg,#e8c547 0%,#ff9f1c 35%,#ff4d2e 65%,#9b5de5 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  background-size:200% auto;
  animation:emberShift 6s ease-in-out infinite alternate;
  line-height:1.1;
  filter:drop-shadow(0 0 14px rgba(232,197,71,0.4));
}
@keyframes emberShift{
  0%  {background-position:0% center;}
  100%{background-position:100% center;}
}
.title-jp{
  font-family:'Noto Sans JP',sans-serif;
  font-size:clamp(10px,2vw,14px);
  color:rgba(180,160,220,0.45);font-weight:400;letter-spacing:0.1em;margin-top:3px;
}

/* Rune divider */
.rune-divider{
  display:flex;align-items:center;gap:12px;margin:1rem 0 0.1rem;width:min(400px,90vw);
}
.rune-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(232,197,71,0.4),transparent);}
.rune-gem{
  width:10px;height:10px;
  background:var(--gold);
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  box-shadow:0 0 12px rgba(232,197,71,0.7);
  animation:gemPulse 2.5s ease-in-out infinite;
}
@keyframes gemPulse{0%,100%{opacity:0.7;transform:scale(1);}50%{opacity:1;transform:scale(1.3);}}

/* ── Grid ── */
.grid-wrap{
  position:relative;z-index:10;display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;padding:1rem 1rem 2rem;
  max-width:700px;margin:0 auto;
}

/* ── Tiles ── */
.tile{
  position:relative;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  height:var(--card-h);border-radius:var(--radius);
  text-decoration:none;cursor:pointer;overflow:hidden;
  background:var(--panel);
  transition:transform 0.15s ease,box-shadow 0.15s ease;
  -webkit-tap-highlight-color:transparent;
  backdrop-filter:blur(4px);
}

/* Unique border + accent per tile */
.tile:nth-child(1){border:1px solid rgba(255,77,46,0.30); --accent:var(--t1a);--accent2:var(--t1b);}
.tile:nth-child(2){border:1px solid rgba(155,93,229,0.30); --accent:var(--t2a);--accent2:var(--t2b);}
.tile:nth-child(3){border:1px solid rgba(232,197,71,0.30); --accent:var(--t3a);--accent2:var(--t3b);}
.tile:nth-child(4){border:1px solid rgba(0,201,167,0.28);  --accent:var(--t4a);--accent2:var(--t4b);}
.tile:nth-child(5){border:1px solid rgba(247,37,133,0.30); --accent:var(--t5a);--accent2:var(--t5b);}
.tile:nth-child(6){border:1px solid rgba(76,201,240,0.28); --accent:var(--t6a);--accent2:var(--t6b);}
.tile:nth-child(7){border:1px solid rgba(168,255,120,0.25);--accent:var(--t7a);--accent2:var(--t7b);}
.tile:nth-child(8){border:1px solid rgba(255,159,28,0.28); --accent:var(--t8a);--accent2:var(--t8b);}
.tile:nth-child(9){border:1px solid rgba(192,192,255,0.25);--accent:var(--t9a);--accent2:var(--t9b);}

/* Top ember bar */
.tile::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent2),transparent);
  z-index:3;pointer-events:none;
  box-shadow:0 0 8px var(--accent);
}
/* Left bar */
.tile::after{
  content:'';position:absolute;top:3px;left:0;bottom:0;width:2px;
  background:linear-gradient(180deg,var(--accent),transparent 70%);
  z-index:3;pointer-events:none;
}

/* Inner glow on hover */
.tile:hover{
  transform:translateY(-3px) scale(1.025);
  box-shadow:0 0 28px rgba(255,77,46,0.12),0 10px 40px rgba(0,0,0,0.6);
  filter:brightness(1.08);
}
.tile:active{transform:scale(0.97);}

/* Shimmer sweep */
.tile-shine{
  position:absolute;inset:0;pointer-events:none;z-index:2;
  background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,0.05) 50%,transparent 70%);
  transform:translateX(-120%);transition:transform 0.5s ease;
}
.tile:hover .tile-shine{transform:translateX(120%);}

.tile-content{
  position:relative;z-index:4;display:flex;flex-direction:column;
  align-items:flex-start;gap:3px;text-align:left;padding:0 14px 0 18px;width:100%;
}
.tile-en{
  font-family:'Cinzel',sans-serif;
  font-size:clamp(11px,2.4vw,15px);font-weight:700;
  color:#e8dff5;letter-spacing:0.06em;line-height:1.2;
}
.tile-en::before{
  content:'';display:inline-block;
  width:5px;height:5px;
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  background:var(--accent);
  margin-right:8px;margin-bottom:1px;vertical-align:middle;
  box-shadow:0 0 6px var(--accent);
}
.tile-jp{
  font-family:'Noto Sans JP',sans-serif;
  font-size:clamp(10px,1.8vw,12px);
  color:rgba(180,160,220,0.65);font-weight:700;line-height:1.2;
}
.tile-kanji{
  font-family:'Noto Sans JP',sans-serif;
  font-size:clamp(9px,1.5vw,11px);
  color:rgba(180,160,220,0.35);font-weight:400;line-height:1.1;
}

/* ── EMBER SPARK click effect ── */
.ember{
  position:fixed;pointer-events:none;z-index:9999;
  border-radius:50%;
  background:var(--ec,#ff4d2e);
  box-shadow:0 0 4px var(--ec,#ff4d2e);
  animation:emberFly var(--dur,0.7s) ease-out forwards;
}
@keyframes emberFly{
  0%  {transform:translate(-50%,-50%) translate(0,0) scale(1);opacity:1;}
  60% {opacity:0.8;}
  100%{transform:translate(-50%,-50%) translate(var(--bx),var(--by)) scale(0.15);opacity:0;}
}
/* Shockwave ring */
.shock-ring{
  position:fixed;border-radius:50%;pointer-events:none;z-index:9998;
  border:2px solid var(--rc,rgba(255,77,46,0.7));
  animation:shockExpand 0.55s ease-out forwards;
}
@keyframes shockExpand{
  from{transform:translate(-50%,-50%) scale(0);opacity:0.9;}
  to  {transform:translate(-50%,-50%) scale(5.5);opacity:0;}
}
/* Diamond burst */
.diamond{
  position:fixed;pointer-events:none;z-index:9998;
  width:var(--ds,7px);height:var(--ds,7px);
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  background:var(--dc,#e8c547);
  animation:diamondFly var(--dur,0.6s) ease-out forwards;
}
@keyframes diamondFly{
  0%  {transform:translate(-50%,-50%) translate(0,0) scale(1) rotate(0deg);opacity:1;}
  100%{transform:translate(-50%,-50%) translate(var(--bx),var(--by)) scale(0.1) rotate(180deg);opacity:0;}
}

.tile.ignite{animation:tileIgnite 0.3s ease-out forwards;}
@keyframes tileIgnite{
  0%  {transform:scale(1);}
  40% {transform:scale(1.07);filter:brightness(1.4) saturate(1.6);}
  100%{transform:scale(1);}
}

/* ── Swipe screen — fade to void ── */
#swipeScreen{
  position:fixed;inset:0;background:#0c0a0f;z-index:9997;
  opacity:0;transition:opacity 0.15s ease-in;pointer-events:none;
}
#swipeScreen.go{opacity:1;}

/* ── Mobile ── */
@media(max-width:500px){
  .grid-wrap{grid-template-columns:repeat(2,1fr);gap:10px;padding:0.9rem 0.85rem 2rem;}
  :root{--card-h:118px;}
  .tile-content{padding:0 10px 0 14px;}
  .title-main{letter-spacing:0.06em;}
}
</style>
</head>
<body>

<div class="bg-layer">
  <div class="smoke"></div>
  <div class="smoke"></div>
  <div class="smoke"></div>
  <div class="smoke"></div>
</div>

<header class="header">
  <a class="close-btn" href="../maze.html" id="closeBtn" title="Back / もどる">✕</a>
  <div class="header-inner">

      <div class="rune-line"></div>

  </div>
</header>

<div class="grid-wrap" id="gameGrid">

  <a class="tile" href="bc_vt.html">
    <div class="tile-shine"></div>
    <div class="tile-content">

  </a>

  <a class="tile" href="bc_spell.html">

  <a class="tile" href="bc_vs.html">
    <div class="tile-shine"></div>

      <div class="tile-kanji">単語速読</div>
    </div>
  </a>

  <a class="tile" href="bc_st.html">

  <a class="tile" href="bc_so.html">

  <a class="tile" href="bc_se.html">

  <a class="tile" href="bc_stw.html">

  <a class="tile" href="bc_sts.html">

  <a class="tile" href="bc_atq.html">

      <div class="tile-en">Ask the Question</div>

      <div class="tile-kanji">質問しよう</div>
    </div>
  </a>

</div>

<div id="swipeScreen"></div>

<script>
// ── Ember spark on click ─────────────────────────────────────────────────
const EMBER_COLS = ['#ff4d2e','#ff9f1c','#e8c547','#f72585','#9b5de5','#00c9a7','#4cc9f0','#a8ff78','#c0c0ff'];
const DIAMOND_COLS = ['#e8c547','#ff9f1c','#fff','#ff4d2e','#9b5de5'];

function emberBurst(cx, cy, accentColor){
  const col = accentColor || '#ff4d2e';

  // Shockwave ring
  const ring = document.createElement('div'); ring.className = 'shock-ring';
  ring.style.cssText = `left:${cx}px;top:${cy}px;width:50px;height:50px;`;
  ring.style.setProperty('--rc', col);
  document.body.appendChild(ring);
  ring.addEventListener('animationend', () => ring.remove());

  // Second ring slightly delayed
  setTimeout(() => {
    const r2 = ring.cloneNode();
    r2.style.setProperty('--rc', 'rgba(255,255,255,0.25)');
    r2.style.animationDuration = '0.75s';
    document.body.appendChild(r2);
    r2.addEventListener('animationend', () => r2.remove());
  }, 80);

  // Ember sparks (round, fire-like)
  const N = 20;
  for(let i = 0; i < N; i++){
    const ang = (i / N) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
    const dist = 35 + Math.random() * 65;
    const e = document.createElement('div'); e.className = 'ember';
    const sz = (3 + Math.random() * 6) + 'px';
    e.style.cssText = `left:${cx}px;top:${cy}px;width:${sz};height:${sz};`;
    e.style.setProperty('--ec', EMBER_COLS[Math.floor(Math.random() * EMBER_COLS.length)]);
    e.style.setProperty('--bx', (Math.cos(ang) * dist).toFixed(1) + 'px');
    e.style.setProperty('--by', (Math.sin(ang) * dist).toFixed(1) + 'px');
    e.style.setProperty('--dur', (0.45 + Math.random() * 0.45) + 's');
    document.body.appendChild(e);
    e.addEventListener('animationend', () => e.remove());
  }

  // Diamond sparks (gem-like, slower)
  for(let i = 0; i < 8; i++){
    const ang = (i / 8) * Math.PI * 2;
    const dist = 28 + Math.random() * 45;
    const d = document.createElement('div'); d.className = 'diamond';
    const sz = (5 + Math.random() * 7) + 'px';
    d.style.cssText = `left:${cx}px;top:${cy}px;`;
    d.style.setProperty('--ds', sz);
    d.style.setProperty('--dc', DIAMOND_COLS[Math.floor(Math.random() * DIAMOND_COLS.length)]);
    d.style.setProperty('--bx', (Math.cos(ang) * dist).toFixed(1) + 'px');
    d.style.setProperty('--by', (Math.sin(ang) * dist).toFixed(1) + 'px');
    d.style.setProperty('--dur', (0.5 + Math.random() * 0.4) + 's');
    document.body.appendChild(d);
    d.addEventListener('animationend', () => d.remove());
  }
}

// ── Month routing ────────────────────────────────────────────────────────
function getMonthFromWeek(){
  const p = new URLSearchParams(window.location.search).get('week') || '';
  const m = p.match(/_([a-z]{3})_w/i);
  return m ? m[1].toLowerCase() : null;
}
const MONTH_MAP = {
  jan:'january',feb:'february',mar:'march',apr:'april',
  may:'may',jun:'june',jul:'july',aug:'august',
  sep:'september',oct:'october',nov:'november',dec:'december'
};
function buildGameHref(baseHref){
  const params = new URLSearchParams(window.location.search);
  const weekParam = params.get('week') || '';
  const abbr = getMonthFromWeek();
  const folder = abbr ? MONTH_MAP[abbr] : null;
  const withFolder = folder ? `${folder}/${baseHref}` : baseHref;
  return weekParam ? `${withFolder}?week=${encodeURIComponent(weekParam)}` : withFolder;
}

// ── Navigation ───────────────────────────────────────────────────────────
let locked = false;
const swipe = document.getElementById('swipeScreen');
const tiles = [...document.querySelectorAll('.tile')];

function safeNavigate(href, cx, cy, tileEl, accentColor){
  if(locked) return; locked = true;
  tileEl.classList.add('ignite');
  emberBurst(cx, cy, accentColor);
  setTimeout(() => { swipe.classList.add('go'); }, 220);
  setTimeout(() => { window.location.assign(href); }, 400);
}

document.getElementById('gameGrid').addEventListener('click', e => {
  const tile = e.target.closest('.tile');
  if(!tile || locked) return;
  e.preventDefault();
  const idx = tiles.indexOf(tile);
  const r = tile.getBoundingClientRect();
  safeNavigate(
    buildGameHref(tile.getAttribute('href')),
    r.left + r.width / 2, r.top + r.height / 2,
    tile, EMBER_COLS[idx] || '#ff4d2e'
  );
});

document.getElementById('closeBtn').addEventListener('click', function(e){
  e.preventDefault(); if(locked) return; locked = true;
  const r = this.getBoundingClientRect();
  emberBurst(r.left + r.width / 2, r.top + r.height / 2, '#ff4d2e');
  setTimeout(() => { swipe.classList.add('go'); }, 220);
  setTimeout(() => {
    const params = new URLSearchParams(window.location.search);
    const week = params.get('week');
    window.location.assign(week ? `../maze.html?week=${week}` : '../maze.html');
  }, 400);
});

history.pushState({bcGames:true}, '');
window.addEventListener('popstate', () => {
  if(locked) history.pushState({bcGames:true}, '');
});
</script>
