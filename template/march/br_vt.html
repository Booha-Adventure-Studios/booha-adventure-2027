
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Boo-riculum – Vocabulary Tap</title>
<meta name="theme-color" content="#0d1a09">
<link rel="icon" type="image/png" href="../../assets/img/boo-tree.png">
<link rel="apple-touch-icon" href="../../assets/img/boo-tree.png">
<link href="https://fonts.googleapis.com/css2?family=Chau+Philomene+One&family=Nunito:wght@800;900&family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0d1a09;
  --ink:#ffffff;
  --white:#ffffff;
  --white-dim:rgba(255,255,255,.65);
  --line:rgba(255,255,255,.22);

  --green:#22c55e;
  --green-2:#15803d;
  --green-glow:rgba(48,208,80,.45);

  --red:#ef4444;
  --blue:#60a5fa;
  --gold:#ffd166;

  --font-ui:'Chau Philomene One', sans-serif;
  --font-en:'Nunito', sans-serif;
  --font-jp:'Noto Sans JP', sans-serif;

  --cardH:106px;
  --actionsH:72px;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}

body{
  min-height:100vh;
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-ui);
  display:flex;
  flex-direction:column;
  align-items:center;
  overflow-y:auto;
  overflow-x:hidden;
  overscroll-behavior-y:contain;
  padding-bottom:env(safe-area-inset-bottom);
  position:relative;
}

/* softer Boo-riculum glow bg */
body::before,
body::after{
  content:'';
  position:fixed;
  border-radius:50%;
  filter:blur(90px);
  pointer-events:none;
  z-index:0;
}
body::before{
  width:420px;height:420px;
  background:#30d050;
  opacity:.10;
  top:-90px;left:-130px;
  animation:blobA 14s ease-in-out infinite alternate;
}
body::after{
  width:360px;height:360px;
  background:#60d8ff;
  opacity:.08;
  bottom:-70px;right:-90px;
  animation:blobA 18s ease-in-out infinite alternate;
}
@keyframes blobA{
  from{transform:translate(0,0) scale(1);}
  to{transform:translate(22px,30px) scale(1.08);}
}

/* ── X close button ── */
.close-btn{
  position:fixed;
  top:18px;
  right:18px;
  z-index:40;
  width:48px;
  height:48px;
  border-radius:50%;
  background:rgba(0,0,0,.45);
  border:2px solid rgba(255,255,255,.35);
  color:#fff;
  font-size:1.15rem;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  text-decoration:none;
  transition:transform .18s ease,border-color .18s ease,background .18s ease;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  line-height:1;
  box-shadow:0 0 12px rgba(255,255,255,.18), 0 0 26px rgba(255,255,255,.07);
}
.close-btn:hover{
  transform:scale(1.12);
  border-color:rgba(255,255,255,.75);
  background:rgba(0,0,0,.58);
  box-shadow:0 0 20px rgba(255,255,255,.30);
}

/* ── Header ── */
header{
  position:relative;
  z-index:10;
  padding:28px 60px 8px;
  text-align:center;
  width:100%;
}
header h1{
  font-family:var(--font-ui);
  font-size:clamp(1.05rem,3vw,1.35rem);
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--white);
  text-shadow:0 0 20px var(--green-glow), 0 2px 8px rgba(0,0,0,.8);
}
header h2{
  font-family:var(--font-ui);
  font-size:clamp(1.5rem,4.8vw,2.5rem);
  letter-spacing:.05em;
  color:var(--white);
  margin-top:2px;
  text-transform:uppercase;
  text-shadow:0 0 28px var(--green-glow), 0 2px 8px rgba(0,0,0,.8);
}
.subtitle-stack{
  font-family:var(--font-jp);
  font-size:.92rem;
  color:var(--white-dim);
  display:flex;
  gap:.4rem;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:6px;
  font-weight:700;
  letter-spacing:.04em;
}

/* Round tracker */
.round-dots{
  display:flex;
  gap:10px;
  justify-content:center;
  margin:10px 0 2px;
}
.round-dot{
  width:12px;
  height:12px;
  border-radius:50%;
  background:rgba(255,255,255,.10);
  border:2px solid rgba(255,255,255,.22);
  transition:all .3s ease;
}
.round-dot.done{
  background:#22c55e;
  border-color:#15803d;
  box-shadow:0 0 10px rgba(34,197,94,.5);
}
.round-dot.active{
  background:#ffffff;
  border-color:rgba(255,255,255,.85);
  box-shadow:0 0 14px rgba(48,208,80,.55);
  transform:scale(1.2);
}

hr.sep{
  border:0;
  height:2px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);
  margin:8px 0;
  border-radius:2px;
}

/* ── Pages ── */
.page{
  width:100%;
  max-width:980px;
  margin:0 auto;
  display:none;
  padding:8px 16px 24px;
  position:relative;
  z-index:10;
}
.page.active{display:block}

/* ── Round layout ── */
.round-wrap{
  display:flex;
  gap:20px;
  align-items:flex-start;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:12px;
}
.col{
  flex:1 1 400px;
  max-width:440px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.round-wrap,.card,.col{touch-action:pan-y;}

/* ── EN card stripe animations ── */
@keyframes stripesV{
  from{background-position:0 0}
  to{background-position:0 var(--cardH)}
}
.sv{
  background-size:100% var(--cardH);
  animation:stripesV 3.6s linear infinite;
}
.sv1{background-image:repeating-linear-gradient(0deg,#1a7a2e 0 18px,#2ecc50 18px 36px,#6ee88a 36px 54px);}
.sv2{background-image:repeating-linear-gradient(0deg,#0d5fa8 0 18px,#1a8fe0 18px 36px,#60c4ff 36px 54px);}
.sv3{background-image:repeating-linear-gradient(0deg,#a06200 0 18px,#d98c00 18px 36px,#ffc532 36px 54px);}
.sv4{background-image:repeating-linear-gradient(0deg,#0a6060 0 18px,#18a8a8 18px 36px,#5cf0e0 36px 54px);}
.sv5{background-image:repeating-linear-gradient(0deg,#3a5a00 0 18px,#6a9a00 18px 36px,#b8f040 36px 54px);}

/* ── Cards ── */
.card{
  border-radius:28px;
  height:var(--cardH);
  padding:14px 18px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  line-height:1.2;
  user-select:none;
  transition:transform .15s cubic-bezier(.34,1.46,.64,1),box-shadow .2s ease,background .2s ease,border-color .2s ease;
  word-break:break-word;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  box-shadow:0 12px 32px rgba(0,0,0,.35);
}

.card.en{
  color:#fff;
  font-family:var(--font-en);
  font-weight:900;
  font-size:clamp(1.7rem,5.2vw,2.8rem);
  border:3px solid rgba(255,255,255,.18);
  text-shadow:0 2px 10px rgba(0,0,0,.55);
  word-break:keep-all;
  overflow-wrap:normal;
  hyphens:none;
}

.card.jp{
  background:rgba(255,255,255,.05);
  border:3px dashed rgba(255,255,255,.55);
  color:var(--ink);
  white-space:pre-line;
  font-family:var(--font-jp);
  font-size:clamp(1rem,2.8vw,1.5rem);
  font-weight:700;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  text-shadow:0 1px 6px rgba(0,0,0,.35);
}

/* Selected EN */
.card.selected{
  transform:scale(1.03) translateY(-2px);
  box-shadow:
    0 0 0 3px rgba(255,255,255,.55),
    0 0 18px rgba(48,208,80,.55),
    0 0 34px rgba(48,208,80,.25);
}

/* JP awake */
.jpAwake .card.jp:not(.combined):not(.correct):not(.wrong){
  border-color:rgba(255,255,255,.85);
  box-shadow:0 0 14px rgba(255,255,255,.14);
  filter:brightness(1.04);
}

/* Combined */
.card.combined{
  border:0;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.card.matchedBlue{
  background:linear-gradient(135deg,#3b82f6,#1d4ed8)!important;
  color:#fff!important;
  box-shadow:0 0 0 2px rgba(96,165,250,.45),0 0 20px rgba(59,130,246,.55)!important;
}
.card.combined .enTxt{
  font-family:var(--font-en);
  font-size:1.05em;
  font-weight:900;
}
.card.combined .jpTxt{
  font-family:var(--font-jp);
  font-size:.7em;
  opacity:.95;
}

@keyframes pairBounce{
  0%{transform:scale(.97)}
  50%{transform:scale(1.05)}
  100%{transform:scale(1)}
}
.card.pairedPop{animation:pairBounce .2s ease-out;}

/* CORRECT */
.card.correct{
  background:linear-gradient(135deg,#4ade80,#22c55e)!important;
  color:#052e16!important;
  border:0!important;
}
@keyframes correctPop{
  0%{transform:scale(1)}
  30%{transform:scale(1.12) rotate(-2deg)}
  55%{transform:scale(1.08) rotate(2deg)}
  75%{transform:scale(1.05) rotate(-1deg)}
  100%{transform:scale(1) rotate(0deg)}
}
.card.correct.animate{animation:correctPop .5s ease-out;}

/* WRONG */
.card.wrong{
  background:linear-gradient(135deg,#f87171,#ef4444)!important;
  color:#fff!important;
  border:0!important;
}
@keyframes wrongShake{
  0%,100%{transform:translateX(0) rotate(0deg)}
  15%{transform:translateX(-10px) rotate(-2deg)}
  30%{transform:translateX(10px) rotate(2deg)}
  45%{transform:translateX(-8px) rotate(-1.5deg)}
  60%{transform:translateX(8px) rotate(1.5deg)}
  75%{transform:translateX(-5px)}
  90%{transform:translateX(5px)}
}
.card.wrong.animate{animation:wrongShake .55s ease-in-out;}
.card.locked{pointer-events:none;}

/* ── Buttons ── */
.actions{
  display:flex;
  gap:12px;
  justify-content:center;
  margin-top:16px;
  flex-wrap:wrap;
}
.btn{
  border:0;
  border-radius:999px;
  padding:11px 32px;
  font-weight:800;
  font-family:var(--font-ui);
  font-size:1.05rem;
  cursor:pointer;
  transition:transform .1s ease,box-shadow .2s ease,background .2s ease,border-color .2s ease;
  touch-action:manipulation;
}
.btn:active{transform:scale(.96) translateY(1px)}

.btn-check{
  background:linear-gradient(145deg,#1f8f35,#0e4019);
  color:#fff;
  border:2px solid #5ee87a;
  box-shadow:0 0 18px rgba(94,232,122,.38), 0 8px 24px rgba(0,0,0,.35);
}
.btn-check:hover{
  background:linear-gradient(145deg,#28b844,#145c25);
  border-color:#88ffaa;
  box-shadow:0 0 26px rgba(94,232,122,.55), 0 8px 24px rgba(0,0,0,.35);
}
.btn-check:disabled{
  filter:saturate(.2) brightness(.7);
  box-shadow:none;
  cursor:not-allowed;
}

.btn-secondary{
  background:rgba(255,255,255,.10);
  color:#fff;
  border:2px solid rgba(255,255,255,.22);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  font-size:.95rem;
}
.btn-secondary:hover{
  background:rgba(255,255,255,.16);
  border-color:rgba(255,255,255,.45);
}

/* ── Results ── */
#page-results .result-box{
  min-height:60vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  gap:10px;
}
.result-icon{
  font-size:clamp(2.8rem,8vw,4.2rem);
  line-height:1;
  filter:drop-shadow(0 0 16px rgba(255,209,102,.45));
}
.result-msg{
  font-family:var(--font-ui);
  font-size:clamp(1.8rem,5.5vw,2.8rem);
  line-height:1.15;
}
.result-sub{
  font-family:var(--font-jp);
  font-size:clamp(1rem,3vw,1.45rem);
  font-weight:700;
  opacity:.9;
  line-height:1.3;
}
.result-kanji{
  font-family:var(--font-jp);
  font-size:clamp(.85rem,2.2vw,1.1rem);
  font-weight:500;
  opacity:.62;
  letter-spacing:.08em;
}
.result-score{
  font-size:clamp(1.5rem,4.5vw,2.2rem);
  opacity:.92;
  margin-top:4px;
}
.res-red{background:linear-gradient(135deg,#2a0c0c,#5d1717)}
.res-orange{background:linear-gradient(135deg,#2e1b05,#744000)}
.res-blue{background:linear-gradient(135deg,#07131e,#163f72)}
.res-gold{background:linear-gradient(135deg,#1e1703,#6f5211)}

/* ── Round flash ── */
.round-flash{
  position:fixed;
  inset:0;
  z-index:60;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(13,26,9,.82);
  backdrop-filter:blur(6px);
}
.round-flash.show{display:flex}
.round-flash .box{
  padding:20px 40px;
  border-radius:20px;
  background:rgba(10,20,12,.96);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 0 40px rgba(48,208,80,.18);
  text-align:center;
}
.round-flash .t1{
  font-family:var(--font-ui);
  font-size:1.9rem;
  letter-spacing:.08em;
  color:#fff;
  text-shadow:0 0 20px var(--green-glow);
}
.round-flash .t2{
  margin-top:4px;
  font-family:var(--font-jp);
  color:rgba(255,255,255,.72);
  font-weight:700;
}

/* ── Particle effects ── */
.br-ring{
  position:fixed;
  border-radius:50%;
  pointer-events:none;
  z-index:99;
  border:3px solid var(--rc,#22c55e);
  animation:brRing .55s cubic-bezier(.2,.8,.4,1) forwards;
}
@keyframes brRing{
  from{transform:translate(-50%,-50%) scale(0);opacity:.9}
  to{transform:translate(-50%,-50%) scale(5);opacity:0}
}
.br-bit{
  position:fixed;
  border-radius:50%;
  pointer-events:none;
  z-index:100;
  animation:brBit var(--dur,.65s) ease-out forwards;
}
@keyframes brBit{
  0%{opacity:1;transform:translate(-50%,-50%) translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) translate(var(--dx),var(--dy)) scale(.2)}
}
.br-wrong-ring{
  position:fixed;
  border-radius:50%;
  pointer-events:none;
  z-index:99;
  border:3px solid #ef4444;
  animation:brRing .4s ease-out forwards;
}
.br-wrong-x{
  position:fixed;
  pointer-events:none;
  z-index:100;
  font-size:var(--fs,20px);
  font-weight:900;
  color:#ef4444;
  line-height:1;
  animation:brBit var(--dur,.6s) ease-out forwards;
}

/* ── Confetti for perfect ── */
.br-confetti{
  position:fixed;
  border-radius:3px;
  pointer-events:none;
  z-index:200;
  animation:brConfettiFall var(--dur,1.2s) linear forwards;
}
@keyframes brConfettiFall{
  0%{transform:translateY(-10px) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}

/* ── Help ── */
.help-icon{
  position:fixed;
  right:14px;
  bottom:calc(14px + env(safe-area-inset-bottom));
  width:36px;
  height:36px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.22);
  background:linear-gradient(145deg,#1f8f35,#0e4019);
  color:#fff;
  font-weight:900;
  font-family:var(--font-ui);
  font-size:1rem;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:35;
  box-shadow:0 0 14px rgba(48,208,80,.35);
}
.help-overlay{
  position:fixed;
  inset:0;
  background:rgba(13,26,9,.9);
  backdrop-filter:blur(8px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:50;
}
.help-overlay.show{display:flex}
.help-dialog{
  max-width:500px;
  width:90%;
  padding:22px;
  border-radius:20px;
  background:rgba(10,20,12,.98);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 0 40px rgba(0,0,0,.8);
  position:relative;
  max-height:80vh;
  overflow-y:auto;
}
.help-title{
  font-family:var(--font-ui);
  font-size:1.3rem;
  letter-spacing:.05em;
  margin-bottom:6px;
  text-align:center;
  color:#fff;
  text-shadow:0 0 16px var(--green-glow);
}
.help-sub{
  font-size:.88rem;
  opacity:.7;
  text-align:center;
  margin-bottom:10px;
  font-family:var(--font-jp);
}
.help-content{
  font-size:.9rem;
  line-height:1.65;
  font-family:var(--font-jp);
}
.help-content ul{padding-left:1.1em;margin:4px 0 10px}
.help-content li{margin-bottom:4px}
.help-close{
  position:absolute;
  top:10px;
  right:12px;
  border:none;
  border-radius:50%;
  width:28px;
  height:28px;
  background:rgba(255,255,255,.08);
  color:#fff;
  font-weight:900;
  cursor:pointer;
  font-size:1rem;
  border:1px solid rgba(255,255,255,.24);
}
hr.sep-help{
  border:0;
  height:1px;
  background:rgba(255,255,255,.15);
  margin:8px 0;
}

/* ── Mobile ── */
@media (max-width:700px){
  :root{--cardH:86px;}
  .round-wrap{flex-wrap:nowrap;gap:10px;}
  .col{flex:0 0 48%;max-width:48%;}
  .card{height:var(--cardH);padding:10px 10px;font-size:.95rem;}
  .card.en{font-size:1.3rem;}
  .card.jp{font-size:.85rem;line-height:1.3;}
  .actions{
    position:sticky;
    bottom:0;
    z-index:5;
    background:linear-gradient(transparent,rgba(13,26,9,.92));
    padding:8px 0 calc(env(safe-area-inset-bottom));
  }
}
</style>
</head>
