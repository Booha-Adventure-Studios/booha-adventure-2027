
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Boo-riculum – Stream</title>
<meta name="theme-color" content="#0d1a09">
<link rel="icon" type="image/png" href="../../assets/img/boo-tree.png">
<link href="https://fonts.googleapis.com/css2?family=Chau+Philomene+One&family=Nunito:wght@800;900&family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet" />

<style>
:root {
  --bg:       #0d1a09;
  --font-ui:  'Chau Philomene One', sans-serif;
  --font-en:  'Nunito', sans-serif;
  --font-jp:  'Noto Sans JP', sans-serif;
  --white:    #ffffff;
  --dim:      rgba(255,255,255,.6);
  --stream:   #5dd4c4;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--white);
  overflow: hidden;
}

#app {
  height: 100dvh;
  max-height: -webkit-fill-available;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: env(safe-area-inset-bottom, 16px);
}

#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── Close button ── */
#btn-close {
  position: fixed;
  top: 18px; right: 18px;
  z-index: 9999;
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.35);
  background: rgba(0,0,0,.45);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform .18s ease, border-color .18s ease;
  animation: pulseClose 2.8s ease-in-out infinite;
}
#btn-close:hover  { transform: scale(1.15); border-color: rgba(255,255,255,.75); box-shadow: 0 0 20px rgba(255,255,255,.38); }
#btn-close:active { transform: scale(.9); }
#btn-close svg {
  width: 22px; height: 22px;
  stroke: #fff; stroke-width: 2.5; stroke-linecap: round;
  filter: drop-shadow(0 0 5px rgba(255,255,255,.7));
}
@keyframes pulseClose {
  0%,100% { box-shadow: 0 0 12px rgba(255,255,255,.18), 0 0 26px rgba(255,255,255,.07); }
  50%     { box-shadow: 0 0 22px rgba(255,255,255,.36), 0 0 48px rgba(255,255,255,.14); }
}

/* ── Header ── */
header {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 32px 20px 8px;
  animation: fadeUp .9s cubic-bezier(.22,.8,.36,1) both;
  width: 100%;
}
.hdr-title {
  font-size: clamp(20px, 4.4vw, 44px);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--white);
  text-shadow: 0 0 28px rgba(93,212,196,.6), 0 2px 8px rgba(0,0,0,.8);
  line-height: 1.05;
}
.hdr-jp {
  font-family: var(--font-jp);
  font-size: clamp(12px, 2vw, 17px);
  color: var(--dim);
  letter-spacing: 2px;
  margin-top: 4px;
}
.hdr-sub {
  font-size: clamp(13px, 2vw, 17px);
  color: var(--white);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 6px;
  text-shadow: 0 1px 6px rgba(0,0,0,.6);
}
.divider {
  width: clamp(80px, 28vw, 200px);
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
  border-radius: 2px;
  margin: 8px auto 0;
}

/* ── Preload bar ── */
#preload-bar {
  position: relative;
  z-index: 1;
  font-size: clamp(10px, 1.5vw, 13px);
  color: rgba(255,255,255,.4);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 8px;
  height: 16px;
  transition: opacity .4s ease;
}
#preload-bar.done { opacity: 0; pointer-events: none; }

/* ── Stream badge ── */
.stream-badge {
  position: relative;
  z-index: 1;
  margin-top: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: clamp(12px, 1.8vw, 15px);
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
  animation: fadeUp .7s .1s both;
}
.stream-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--stream);
  box-shadow: 0 0 10px var(--stream);
  flex-shrink: 0;
}
#stream-label { color: var(--stream); }
#track-counter { color: var(--dim); }

/* ── Main card ── */
.card-area {
  position: relative;
  z-index: 1;
  width: min(92vw, 740px);
  margin-top: 10px;
  animation: fadeUp .8s .15s both;
  flex-shrink: 0;
}

.card-face {
  width: 100%;
  aspect-ratio: 4 / 3;
  border-radius: 28px;
  border: 3px solid rgba(93,212,196,.45);
  box-shadow: 0 20px 60px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.06) inset;
  overflow: hidden;
  background: #111;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.stripe-layer {
  position: absolute;
  inset: 0;
  background-size: 100% 240px;
  animation: stripeScroll 7s linear infinite;
}
@keyframes stripeScroll {
  from { background-position: 0 0; }
  to   { background-position: 0 240px; }
}

.frosted {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.38);
}

.card-content {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  padding: clamp(18px, 4vw, 36px) clamp(20px, 5vw, 48px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-align: center;
  overflow: hidden;
}

.en-text {
  font-family: var(--font-en);
  font-weight: 900;
  font-size: clamp(20px, 4.2vw, 48px);
  line-height: 1.3;
  color: #fff;
  text-shadow: 0 2px 10px rgba(0,0,0,.75);
  white-space: normal;
  word-break: normal;
  overflow-wrap: break-word;
  text-wrap: balance;
  max-width: 100%;
  letter-spacing: .2px;
  transition: opacity .3s ease;
}

.en-text .word { display: inline-block; }
.en-text.dancing .word {
  animation: wordBounce var(--wd, .55s) ease-in-out infinite alternate;
  animation-delay: var(--wdel, 0s);
}
@keyframes wordBounce {
  0%   { transform: translateY(0) scale(1); }
  100% { transform: translateY(-8px) scale(1.04); }
}

/* ── Pause ring ── */
.pause-ring-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  opacity: 0;
  transition: opacity .25s;
}
.pause-ring-wrap.visible { opacity: 1; }
.pause-label {
  font-size: clamp(11px, 1.6vw, 14px);
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--stream);
  text-shadow: 0 0 8px var(--stream);
}
svg.ring-svg {
  width: 44px; height: 44px;
  transform: rotate(-90deg);
}
.ring-bg {
  fill: none;
  stroke: rgba(255,255,255,.12);
  stroke-width: 4;
}
.ring-fg {
  fill: none;
  stroke: var(--stream);
  stroke-width: 4;
  stroke-linecap: round;
  stroke-dasharray: 113;
  stroke-dashoffset: 0;
  filter: drop-shadow(0 0 4px var(--stream));
}

/* ── Sparkle motes ── */
#sparkle-layer {
  position: absolute;
  inset: 0;
  border-radius: 28px;
  pointer-events: none;
  overflow: hidden;
  z-index: 10;
}
.mote {
  position: absolute;
  border-radius: 50%;
  opacity: 0;
  background: radial-gradient(circle, var(--mc, #fff) 0%, transparent 70%);
  animation: motePop var(--md, .9s) ease-out forwards;
}
@keyframes motePop {
  0%   { opacity: 0; transform: translate(-50%,-50%) scale(.3); }
  15%  { opacity: 1; transform: translate(-50%,-50%) scale(1.15); }
  100% { opacity: 0; transform: translate(var(--tx,0), var(--ty,-50px)) scale(.4); }
}

/* ── Progress bar ── */
.progress-wrap {
  position: relative;
  z-index: 1;
  width: min(92vw, 740px);
  margin-top: 10px;
  animation: fadeUp .8s .22s both;
  flex-shrink: 0;
}
.progress-track {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,.12);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--stream);
  border-radius: 99px;
  width: 0%;
  transition: width .5s ease;
  box-shadow: 0 0 8px var(--stream);
}
.progress-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
  font-size: clamp(10px, 1.5vw, 12px);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--dim);
}

/* ── Controls ── */
.controls {
  position: relative;
  z-index: 1;
  display: flex;
  gap: clamp(12px, 2.8vw, 22px);
  justify-content: center;
  align-items: center;
  margin-top: clamp(10px, 1.8vh, 20px);
  padding: 0 16px 20px;
  flex-shrink: 0;
  animation: fadeUp .8s .3s both;
}

.btn {
  width: clamp(62px, 10.5vw, 80px);
  height: clamp(62px, 10.5vw, 80px);
  border-radius: 20px;
  border: 3px solid rgba(255,255,255,.25);
  background: rgba(255,255,255,.10);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--white);
  font-family: var(--font-ui);
  font-size: clamp(20px, 3.8vw, 32px);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform .15s ease, border-color .15s, background .15s;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  touch-action: manipulation;
}
.btn:hover { background: rgba(255,255,255,.18); border-color: rgba(255,255,255,.55); transform: scale(1.06); }
.btn:active { transform: scale(.92); }

#btn-playpause {
  width: clamp(80px, 14vw, 100px);
  height: clamp(80px, 14vw, 100px);
  border-radius: 24px;
  font-size: clamp(28px, 5vw, 42px);
  background: linear-gradient(145deg, #0e3030, #071a1a);
  border-color: #5dd4c4;
  box-shadow: 0 0 22px rgba(93,212,196,.5), 0 8px 24px rgba(0,0,0,.4);
}
#btn-playpause:hover {
  background: linear-gradient(145deg, #154444, #0a2828);
  border-color: #8de8dc;
  box-shadow: 0 0 34px rgba(93,212,196,.7), 0 8px 24px rgba(0,0,0,.4);
}
#btn-playpause.playing {
  animation: pulsePlay 1.8s ease-in-out infinite;
}
@keyframes pulsePlay {
  0%,100% { box-shadow: 0 0 20px rgba(93,212,196,.45), 0 8px 24px rgba(0,0,0,.4); }
  50%     { box-shadow: 0 0 40px rgba(93,212,196,.75), 0 8px 24px rgba(0,0,0,.4); }
}

#btn-slow {
  font-size: clamp(14px, 2.4vw, 20px);
  letter-spacing: .5px;
}
#btn-slow.active {
  background: linear-gradient(145deg, #5a2a00, #2a1000);
  border-color: #ffaa44;
  color: #ffaa44;
  box-shadow: 0 0 16px rgba(255,170,68,.4), 0 8px 24px rgba(0,0,0,.4);
}

#btn-prev, #btn-next {
  font-size: clamp(18px, 3.2vw, 28px);
}

/* ── Entrance animations ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  .stripe-layer { animation: none; }
  .en-text.dancing .word { animation: none; }
  .mote { animation: none; opacity: 0; }
  #btn-playpause.playing { animation: none; }
}

/* ── Landscape compact ── */
@media (orientation: landscape) and (max-height: 520px) {
  header          { padding: 14px 70px 4px; }
  .hdr-title      { font-size: clamp(13px, 2.8vw, 20px); }
  .hdr-jp         { font-size: clamp(10px, 1.5vw, 13px); }
  .hdr-sub        { font-size: clamp(11px, 1.5vw, 13px); margin-top: 2px; }
  .divider        { margin: 3px auto 0; }
  .stream-badge   { margin-top: 6px; }
  .card-area      { width: min(60vw, 480px); margin-top: 4px; }
  .progress-wrap  { width: min(60vw, 480px); }
  .controls       { margin-top: 6px; gap: 9px; padding-bottom: 12px; }
  .btn            { width: 50px; height: 50px; font-size: 18px; border-radius: 13px; }
  #btn-playpause  { width: 66px; height: 66px; font-size: 26px; }
}

/* ── Small portrait ── */
@media (max-width: 380px) {
  .card-area, .progress-wrap { width: 94vw; }
  .btn { width: 56px; height: 56px; font-size: 18px; }
  #btn-playpause { width: 74px; height: 74px; }
}
</style>

<!-- ══════════════════════════════════
     BACKGROUND PARTICLES
     ══════════════════════════════════ -->
<script>
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');
  const COLORS = [
    '#5dd4c4','#8de8dc','#30d050','#4df070',
    '#20a8f0','#60d8ff','#f0aa00','#ffe060',
    '#b0f040','#ff9040'
  ];
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const PARTS = [];
  function makePart(scatter) {
    return {
      x:     Math.random() * (canvas.width || 400),
      y:     scatter ? Math.random() * (canvas.height || 700) : (canvas.height || 700) + 10,
      r:     .7 + Math.random() * 2,
      vx:    (Math.random() - .5) * .2,
      vy:    -.06 - Math.random() * .16,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      alpha: .08 + Math.random() * .22,
      life:  scatter ? Math.random() : 0
    };
  }
  for (let i = 0; i < 55; i++) PARTS.push(makePart(true));
  function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < PARTS.length; i++) {
      const p = PARTS[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life += .0032;
      if (p.y < -10 || p.life > 1) { PARTS[i] = makePart(false); continue; }
      const a = p.alpha * Math.sin(p.life * Math.PI);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = a;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>

<!-- ══════════════════════════════════
     STREAM LOGIC
     ══════════════════════════════════ -->
<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   STREAM SETTINGS

   br_stream.json contains 180 ordered items:

   1–60   vocab
   61–120 sentences
   121–180 questions

   Each week plays 45 items:
   vocab 15 → sentences 15 → questions 15
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

const AUDIO_BASE = '../../assets/audio/march/boo_riculum/stream/';
const JSON_URL   = 'br_stream.json';
const DEFAULT_PAUSE = 5.5;

const STREAM_PALETTES = [
  ['#0e6a60','#22bfae','#8de8dc'],
  ['#0d5fa8','#1a8fe0','#60c4ff'],
  ['#1a7a2e','#2ecc50','#6ee88a'],
  ['#a06200','#d98c00','#ffc532'],
  ['#5a1a8a','#8e3dcc','#c87aff']
];

let TRACKS = [];
let trackIdx = 0;
let isPlaying = false;
let slowMode = false;
let pauseTimer = null;
let ringRAF = null;
let audioCache = {};
let currentAudio = null;

const enTextEl = document.getElementById('en-text');
const stripeEl = document.getElementById('stripe-layer');
const trackCounter = document.getElementById('track-counter');
const progressFill = document.getElementById('progress-fill');
const pauseRing = document.getElementById('pause-ring');
const ringFg = document.getElementById('ring-fg');
const btnPlayPause = document.getElementById('btn-playpause');
const btnSlow = document.getElementById('btn-slow');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const preloadBar = document.getElementById('preload-bar');

/* ── Determine week ── */

function getWeekKey() {
  const params = new URLSearchParams(window.location.search);
  const week = params.get("week");
  if (week) return week;

  const parts = window.location.pathname.split("/");
  const folder = parts[parts.length-2] || "";
  const m = folder.match(/_w(\d)$/i);
  return m ? "w"+m[1] : "w1";
}

/* ── Calculate correct 45 items ── */

function buildWeekStream(allCards, weekIndex) {

  const base = (weekIndex-1)*15;

  const vocab     = allCards.slice(base, base+15);
  const sentences = allCards.slice(60+base, 60+base+15);
  const questions = allCards.slice(120+base, 120+base+15);

  return [...vocab, ...sentences, ...questions];
}

/* ── Preload audio ── */

function preloadAudio(cards) {

  let loaded = 0;

  cards.forEach(card=>{
    const a = new Audio();
    a.src = AUDIO_BASE + card.mp3;
    a.preload = "auto";

    const done=()=>{
      loaded++;
      preloadBar.textContent=`Audio ${loaded} / ${cards.length}`;
      if(loaded===cards.length) preloadBar.classList.add("done");
    };

    a.addEventListener("canplaythrough",done,{once:true});
    a.addEventListener("error",done,{once:true});

    a.load();
    audioCache[card.mp3]=a;
  });
}

/* ── Stripe background ── */

function makeStripe(colors){

  const band=40;
  const stops=[];

  colors.forEach((c,i)=>{
    const s=i*band;
    stops.push(`${c} ${s}px ${s+band}px`);
  });

  const doubled=stops.concat(
    stops.map(s=>s.replace(/(\d+)px/g,(_,n)=>(+n+band*colors.length)+"px"))
  );

  return `repeating-linear-gradient(180deg, ${doubled.join(",")})`;
}

/* ── Update UI ── */

function updateUI(track){

  const palette=STREAM_PALETTES[trackIdx%STREAM_PALETTES.length];
  stripeEl.style.backgroundImage=makeStripe(palette);

  trackCounter.textContent=`${trackIdx+1} / ${TRACKS.length}`;
  progressFill.style.width=((trackIdx+1)/TRACKS.length*100)+"%";

  enTextEl.textContent=track.en;
}

/* ── Ring animation ── */

function animateRing(duration){

  const circumference=113;
  const start=performance.now();

  cancelAnimationFrame(ringRAF);

  function step(now){

    const elapsed=now-start;
    const fraction=Math.min(elapsed/duration,1);

    ringFg.style.strokeDashoffset=(circumference*fraction).toFixed(2);

    if(fraction<1) ringRAF=requestAnimationFrame(step);
  }

  ringFg.style.strokeDashoffset="0";
  ringRAF=requestAnimationFrame(step);
}

/* ── Stop playback ── */

function stopEverything(){

  if(currentAudio){
    currentAudio.pause();
    currentAudio.currentTime=0;
  }

  clearTimeout(pauseTimer);
  cancelAnimationFrame(ringRAF);

  pauseRing.classList.remove("visible");
}

/* ── Pause stage ── */

function startPause(track){

  const pause=(track.pause ?? DEFAULT_PAUSE)*(slowMode?2:1)*1000;

  pauseRing.classList.add("visible");
  animateRing(pause);

  pauseTimer=setTimeout(()=>{

    pauseRing.classList.remove("visible");

    if(!isPlaying) return;

    playTrack((trackIdx+1)%TRACKS.length);

  },pause);
}

/* ── Play track ── */

function playTrack(idx){

  stopEverything();

  trackIdx=((idx%TRACKS.length)+TRACKS.length)%TRACKS.length;
  const track=TRACKS[trackIdx];

  updateUI(track);

  currentAudio=audioCache[track.mp3] || new Audio(AUDIO_BASE+track.mp3);
  currentAudio.currentTime=0;

  currentAudio.onended=()=>{
    if(!isPlaying) return;
    startPause(track);
  };

  currentAudio.onerror=()=>{
    if(!isPlaying) return;
    startPause(track);
  };

  currentAudio.play();
}

/* ── Controls ── */

btnPlayPause.onclick=()=>{

  if(!TRACKS.length) return;

  if(isPlaying){

    isPlaying=false;
    stopEverything();
    btnPlayPause.innerHTML="&#9654;";

  }else{

    isPlaying=true;
    btnPlayPause.innerHTML="&#9646;&#9646;";
    playTrack(trackIdx);

  }

};

btnPrev.onclick=()=>{
  const newIdx=(trackIdx-1+TRACKS.length)%TRACKS.length;
  if(isPlaying) playTrack(newIdx);
  else{
    trackIdx=newIdx;
    updateUI(TRACKS[trackIdx]);
  }
};

btnNext.onclick=()=>{
  const newIdx=(trackIdx+1)%TRACKS.length;
  if(isPlaying) playTrack(newIdx);
  else{
    trackIdx=newIdx;
    updateUI(TRACKS[trackIdx]);
  }
};

btnSlow.onclick=()=>{
  slowMode=!slowMode;
  btnSlow.classList.toggle("active",slowMode);
};

/* ── INIT ── */

(async function init(){

  const weekKey=getWeekKey();
  const weekNum=parseInt(weekKey.replace("w","")) || 1;

  const res=await fetch(JSON_URL);
  const data=await res.json();

  const allCards=data.cards || [];

  TRACKS=buildWeekStream(allCards,weekNum);

  preloadAudio(TRACKS);

  updateUI(TRACKS[0]);

})();
</script>

</body>
