
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Boo-riculum</title>
<meta name="theme-color" content="#0d1a09">
<link href="https://fonts.googleapis.com/css2?family=Chau+Philomene+One&display=swap" rel="stylesheet" />

<style>
:root {
  --bg: #0d1a09;

  /* Tile 1 — Canopy Green */
  --c1-bg:     linear-gradient(145deg, #1f8f35 0%, #0e4019 55%, #165c25 100%);
  --c1-border: #5ee87a;
  --c1-halo:   rgba(94,232,122,.6);
  --c1-ring-a: #30d050;
  --c1-ring-b: #aaff88;
  --c1-mote:   #c0ffcc;

  /* Tile 2 — Sky Blue */
  --c2-bg:     linear-gradient(145deg, #1070c0 0%, #073568 55%, #0d5090 100%);
  --c2-border: #55c8ff;
  --c2-halo:   rgba(85,200,255,.6);
  --c2-ring-a: #20a8f0;
  --c2-ring-b: #a8e8ff;
  --c2-mote:   #c0eeff;

  /* Tile 3 — Sunflower Gold */
  --c3-bg:     linear-gradient(145deg, #b87000 0%, #542e00 55%, #7a4400 100%);
  --c3-border: #ffcc44;
  --c3-halo:   rgba(255,204,68,.6);
  --c3-ring-a: #f0aa00;
  --c3-ring-b: #ffe878;
  --c3-mote:   #ffeeaa;

  /* Tile 4 — Teal Stream */
  --c4-bg:     linear-gradient(145deg, #0e7070 0%, #053838 55%, #0a5050 100%);
  --c4-border: #5dd4c4;
  --c4-halo:   rgba(93,212,196,.6);
  --c4-ring-a: #30c8b8;
  --c4-ring-b: #8de8dc;
  --c4-mote:   #c0fff8;

  --white:     #ffffff;
  --white-dim: rgba(255,255,255,.62);

  --tile-w: 158px;
  --tile-h: 158px;
  --tile-r: 26px;
  --font:   'Chau Philomene One', sans-serif;
}

@property --angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--white);
  overflow: hidden;
}

#app {
  position: relative;
  z-index: 1;
  height: 100dvh;
  max-height: 100vh;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

#welcome {
  position: relative;
  z-index: 1;
  min-height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 32px 20px 32px;
  gap: 8px;
  animation: fadeUp 1.2s cubic-bezier(.22,.8,.36,1) both;
}

.boo-icon {
  width: clamp(58px, 12vw, 88px);
  height: auto;
  filter:
    drop-shadow(0 0 22px rgba(48,208,80,.65))
    drop-shadow(0 0 8px rgba(48,208,80,.4));
  animation: floatIcon 4.5s ease-in-out infinite;
  margin-bottom: 2px;
}
@keyframes floatIcon {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-9px); }
}

.title-en {
  font-size: clamp(28px, 5.8vw, 60px);
  letter-spacing: 1.5px;
  line-height: 1.06;
  color: var(--white);
  text-transform: uppercase;
  text-shadow:
    0 0 32px rgba(48,208,80,.45),
    0 2px 10px rgba(0,0,0,.8);
  margin-top: 4px;
}

.title-jp {
  font-size: clamp(12px, 2.3vw, 19px);
  color: var(--white-dim);
  letter-spacing: 3px;
  margin-top: 3px;
}

.week-label {
  font-size: clamp(13px, 2.4vw, 19px);
  color: var(--white);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-shadow: 0 1px 8px rgba(0,0,0,.65);
  margin-bottom: 4px;
}

.divider {
  width: clamp(90px, 32vw, 220px);
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
  border-radius: 2px;
  margin: 8px 0 4px;
}

.deck-links {
  display: grid;
  grid-template-columns: repeat(2, var(--tile-w));
  gap: 1rem;
  padding: 14px 0 6px;
}

a.deck {
  width: var(--tile-w);
  height: var(--tile-h);
  border-radius: var(--tile-r);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  overflow: visible;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  touch-action: pan-y manipulation;
  transition: transform .22s cubic-bezier(.34,1.56,.64,1);
  transform: translateZ(0);
  z-index: 1;
}

/* Per-colour tile properties via utility classes */
a.deck.c1 { --tile-bg:var(--c1-bg); --border-c:var(--c1-border); --halo:var(--c1-halo); --ring-a:var(--c1-ring-a); --ring-b:var(--c1-ring-b); --mote-c:var(--c1-mote); }
a.deck.c2 { --tile-bg:var(--c2-bg); --border-c:var(--c2-border); --halo:var(--c2-halo); --ring-a:var(--c2-ring-a); --ring-b:var(--c2-ring-b); --mote-c:var(--c2-mote); }
a.deck.c3 { --tile-bg:var(--c3-bg); --border-c:var(--c3-border); --halo:var(--c3-halo); --ring-a:var(--c3-ring-a); --ring-b:var(--c3-ring-b); --mote-c:var(--c3-mote); }
a.deck.c4 { --tile-bg:var(--c4-bg); --border-c:var(--c4-border); --halo:var(--c4-halo); --ring-a:var(--c4-ring-a); --ring-b:var(--c4-ring-b); --mote-c:var(--c4-mote); }

a.deck::before {
  content: "";
  position: absolute;
  inset: -5px;
  border-radius: calc(var(--tile-r) + 5px);
  background: conic-gradient(
    from var(--angle, 0deg),
    var(--ring-a) 0%, var(--ring-b) 25%,
    var(--ring-a) 50%, var(--ring-b) 75%,
    var(--ring-a) 100%
  );
  opacity: .5;
  z-index: -1;
  filter: blur(2.5px);
  animation: spinRing 7s linear infinite;
  pointer-events: none;
}

a.deck::after {
  content: "";
  position: absolute;
  inset: -46px;
  border-radius: 50%;
  z-index: -2;
  pointer-events: none;
  opacity: 0;
  transform: scale(.6) translateZ(0);
  transition: opacity .28s, transform .28s;
  background: radial-gradient(circle, var(--halo) 0%, transparent 70%);
}

a.deck .clip {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  overflow: hidden;
  z-index: 2;
  border: 3px solid var(--border-c);
  box-shadow:
    0 14px 40px rgba(0,0,0,.7),
    0 0 0 1px rgba(255,255,255,.08) inset,
    0 1px 0 rgba(255,255,255,.18) inset;
}

a.deck .inner {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 14px 10px;
  gap: 5px;
  background: var(--tile-bg);
  text-align: center;
  line-height: 1.1;
  transition: filter .2s;
}

a.deck .inner::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(115deg, transparent 25%, rgba(255,255,255,.1) 50%, transparent 75%);
  background-size: 200% 200%;
  background-position: 160% 0;
  pointer-events: none;
  transition: background-position .45s ease;
}
a.deck:hover .inner::after { background-position: -60% 100%; }

a.deck .label {
  display: block;
  font-size: clamp(15px, 1.9vw, 18px);
  letter-spacing: .5px;
  text-transform: uppercase;
  color: var(--white);
  text-shadow: 0 1px 8px rgba(0,0,0,.75);
  text-wrap: balance;
}
a.deck .jp {
  display: block;
  font-size: clamp(11px, 1.3vw, 13px);
  color: rgba(255,255,255,.72);
  letter-spacing: 1px;
  text-shadow: 0 1px 4px rgba(0,0,0,.6);
}

a.deck .sparkles {
  position: absolute;
  inset: 0;
  z-index: 9;
  pointer-events: none;
  border-radius: inherit;
  overflow: hidden;
}
.mote {
  position: absolute;
  border-radius: 50%;
  opacity: 0;
  animation: moteFly var(--dur, .8s) ease-out forwards;
  background: radial-gradient(circle, var(--mote-c, #fff) 0%, transparent 70%);
}
@keyframes moteFly {
  0%   { opacity:0; transform:translate(-50%,-50%) scale(.2); }
  12%  { opacity:1; transform:translate(-50%,-50%) scale(1.3); }
  60%  { opacity:.9; }
  100% { opacity:0; transform:translate(var(--tx,0), var(--ty,-44px)) scale(.3); }
}

a.deck.tap    { transform: scale(.92); transition: transform .1s ease; }

/* ── Playing: dramatic music-sync show ── */
a.deck.playing {
  z-index: 999;
  animation:
    bloom      .45s cubic-bezier(.34,1.56,.64,1) forwards,
    beatBounce .38s ease-in-out .45s infinite;
}
a.deck.playing::after  {
  opacity: 1;
  transform: scale(1.2) translateZ(0);
  animation: haloFlash .38s ease-in-out infinite;
}
a.deck.playing::before {
  opacity: 1;
  animation: spinRing .65s linear infinite;  /* 3× faster than idle */
}
a.deck.playing .inner {
  animation: innerFlash .38s ease-in-out infinite;
}
a.deck.playing .clip {
  animation: borderFlash .19s ease-in-out infinite;
}

@keyframes bloom {
  0%   { transform: scale(1); }
  55%  { transform: scale(1.18) translateY(-8px); }
  100% { transform: scale(1.1)  translateY(-5px); }
}
/* Tile bounces on every beat */
@keyframes beatBounce {
  0%,100% { transform: scale(1.1)  translateY(-5px); }
  40%     { transform: scale(1.18) translateY(-9px) rotate(1.5deg); }
  70%     { transform: scale(1.05) translateY(-3px) rotate(-1deg); }
}
/* Inner brightness flash — big swing */
@keyframes innerFlash {
  0%,100% { filter: brightness(1)   saturate(1); }
  45%     { filter: brightness(1.7) saturate(1.6) contrast(1.1); }
}
/* Halo pulse — large and snappy */
@keyframes haloFlash {
  0%,100% { opacity: .5;  transform: scale(1.0) translateZ(0); }
  45%     { opacity: 1;   transform: scale(1.5) translateZ(0); }
}
/* Border flickers on every half-beat */
@keyframes borderFlash {
  0%,100% { box-shadow: 0 14px 40px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.08) inset, 0 1px 0 rgba(255,255,255,.18) inset; }
  50%     { box-shadow: 0 14px 40px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.5) inset, 0 0 22px 4px var(--border-c); }
}
@keyframes spinRing   { to { --angle: 360deg; } }
@keyframes fadeUp     { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
@keyframes tileIn     { from{opacity:0;transform:translateY(22px) scale(.88);} to{opacity:1;transform:translateY(0) scale(1);} }

.deck-links a.deck              { animation: tileIn .65s cubic-bezier(.22,.8,.36,1) both; }
.deck-links a.deck:nth-child(1) { animation-delay: .22s; }
.deck-links a.deck:nth-child(2) { animation-delay: .34s; }
.deck-links a.deck:nth-child(3) { animation-delay: .46s; }
.deck-links a.deck:nth-child(4) { animation-delay: .58s; }

@media (prefers-reduced-motion: reduce) {
  .boo-icon, a.deck::before, a.deck.playing { animation: none !important; }
  a.deck.playing .inner { animation: none !important; }
  .mote { animation: none !important; opacity: 0; }
}

@media (max-width: 390px) {
  :root { --tile-w: 140px; --tile-h: 140px; --tile-r: 22px; }
}
@media (orientation: landscape) and (max-height: 500px) {
  :root { --tile-w: 124px; --tile-h: 124px; }
  #welcome { padding: 14px 16px 14px; gap: 4px; }
  .boo-icon { width: 40px; }
  .title-en { font-size: clamp(18px, 3.8vw, 28px); }
  .divider  { margin: 5px 0 2px; }
  .deck-links { grid-template-columns: repeat(4, var(--tile-w)); gap: .8rem; }
}

#btn-close {
  position: fixed;
  top: 18px; right: 18px;
  z-index: 9999;
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.35);
  background: rgba(0,0,0,.45);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform .18s ease, border-color .18s ease;
  animation: pulseClose 2.8s ease-in-out infinite;
}
#btn-close:hover { transform: scale(1.15); border-color: rgba(255,255,255,.75); }
#btn-close:active { transform: scale(.9); }
#btn-close svg {
  width: 22px; height: 22px;
  stroke: #fff; stroke-width: 2.5; stroke-linecap: round;
  filter: drop-shadow(0 0 5px rgba(255,255,255,.7));
}
@keyframes pulseClose {
  0%,100% { box-shadow: 0 0 12px rgba(255,255,255,.18), 0 0 26px rgba(255,255,255,.07); }
  50%     { box-shadow: 0 0 22px rgba(255,255,255,.36), 0 0 48px rgba(255,255,255,.14); }
}
</style>
</head>

<body>
<div id="app">

<canvas id="bg-canvas" aria-hidden="true"></canvas>

<!-- Close button goes back to index -->
<button id="btn-close" aria-label="Back to menu" onclick="history.back()">
  <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <line x1="5" y1="5" x2="19" y2="19"/>
    <line x1="19" y1="5" x2="5" y2="19"/>
  </svg>
</button>

<section id="welcome">

  <img class="boo-icon" src="../assets/img/boo-tree.png" alt="Boo-riculum" onerror="this.style.display='none'">

  <h1 class="title-en">Boo-riculum</h1>
  <p class="title-jp">ブーリキュラム・スタディデッキ</p>

  <div class="divider" aria-hidden="true"></div>

  <!-- Week label is injected by JS from the ?week= param -->
  <p class="week-label" id="week-label">Loading…</p>

  <div class="deck-links">

    <a id="vocab" class="deck c1" href="#">
      <div class="clip">
        <div class="inner">
          <span class="label">Vocabulary</span>
          <span class="jp">語彙</span>
        </div>
        <div class="sparkles" aria-hidden="true"></div>
      </div>
    </a>

    <a id="sentences" class="deck c2" href="#">
      <div class="clip">
        <div class="inner">
          <span class="label">Sentences</span>
          <span class="jp">文</span>
        </div>
        <div class="sparkles" aria-hidden="true"></div>
      </div>
    </a>

    <a id="questions" class="deck c3" href="#">
      <div class="clip">
        <div class="inner">
          <span class="label">Questions</span>
          <span class="jp">質問</span>
        </div>
        <div class="sparkles" aria-hidden="true"></div>
      </div>
    </a>

    <a id="stream" class="deck c4" href="#">
      <div class="clip">
        <div class="inner">
          <span class="label">Stream</span>
          <span class="jp">ストリーム</span>
        </div>
        <div class="sparkles" aria-hidden="true"></div>
      </div>
    </a>

  </div>

</section>

<!-- ── Background particles ── -->
<script>
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  const COLORS = [
    '#30d050','#4df070','#20a8f0','#60d8ff',
    '#f0aa00','#ffe060','#28c890','#b0f040',
    '#ff9040','#5dd4c4'
  ];
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const PARTS = [];
  function makePart(scatter) {
    return {
      x:     Math.random() * (canvas.width  || 400),
      y:     scatter ? Math.random() * (canvas.height || 700) : (canvas.height || 700) + 10,
      r:     .7 + Math.random() * 2.1,
      vx:    (Math.random() - .5) * .22,
      vy:    -.06 - Math.random() * .18,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      alpha: .1 + Math.random() * .26,
      life:  scatter ? Math.random() : 0,
    };
  }
  for (let i = 0; i < 60; i++) PARTS.push(makePart(true));
  function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < PARTS.length; i++) {
      const p = PARTS[i];
      p.x += p.vx; p.y += p.vy; p.life += .0033;
      if (p.y < -10 || p.life > 1) { PARTS[i] = makePart(false); continue; }
      const a = p.alpha * Math.sin(p.life * Math.PI);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color; ctx.globalAlpha = a; ctx.fill();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>

<!-- ── Tile interaction ── -->
<script>
let lockedUI = false;
let moteInterval = null;

function resetUI() {
  lockedUI = false;
  if (moteInterval) { clearInterval(moteInterval); moteInterval = null; }
  document.querySelectorAll('a.deck').forEach(el => {
    el.classList.remove('playing', 'tap');
    el.style.pointerEvents = '';
  });
}

/* Restore clean state when returning via bfcache or browser back */
window.addEventListener('pageshow', ev => {
  if (ev.persisted || sessionStorage.getItem('booha_deck_open')) {
    resetUI();
    sessionStorage.removeItem('booha_deck_open');
  }
});
/* Also reset on regular load in case sessionStorage was set */
if (sessionStorage.getItem('booha_deck_open')) {
  resetUI();
  sessionStorage.removeItem('booha_deck_open');
}

function burstMotes(anchor, count) {
  const box = anchor.querySelector('.sparkles');
  if (!box) return;
  const n = count || 16;
  for (let i = 0; i < n; i++) {
    const m = document.createElement('div');
    m.className = 'mote';
    const sz  = 4 + Math.random() * 11;
    const x   = 8  + Math.random() * 84;
    const y   = 8  + Math.random() * 84;
    const tx  = (Math.random() - .5) * 80 + 'px';
    const ty  = -(20 + Math.random() * 60) + 'px';
    const dur = (.35 + Math.random() * .5) + 's';
    m.style.cssText = `width:${sz}px;height:${sz}px;left:${x}%;top:${y}%;--tx:${tx};--ty:${ty};--dur:${dur};animation-delay:${(Math.random()*.08).toFixed(3)}s`;
    box.appendChild(m);
  }
  setTimeout(() => {
    /* Only clear motes that have finished — keep box alive for continuous bursts */
    const motes = box.querySelectorAll('.mote');
    motes.forEach(m => { if (m.style.animationDelay) {} });
    box.innerHTML = '';
  }, 900);
}

function startMusicShow(anchor) {
  /* Continuous mote bursts every 220ms while music plays */
  moteInterval = setInterval(() => {
    if (!anchor.classList.contains('playing')) {
      clearInterval(moteInterval); moteInterval = null; return;
    }
    burstMotes(anchor, 8);
  }, 220);
  /* Initial big burst */
  burstMotes(anchor, 20);
}

function goToDeck(anchor) {
  if (lockedUI) return;
  lockedUI = true;
  const url = anchor.getAttribute('href');
  if (!url || url === '#') { lockedUI = false; return; }

  anchor.classList.add('tap');
  setTimeout(() => anchor.classList.remove('tap'), 110);

  document.querySelectorAll('a.deck').forEach(el => {
    if (el !== anchor) el.style.pointerEvents = 'none';
  });

  anchor.classList.add('playing');
  startMusicShow(anchor);

  /* Flag so booriculum.html resets cleanly on return */
  sessionStorage.setItem('booha_deck_open', '1');

  setTimeout(() => { window.location.href = url; }, 420);
}

document.querySelectorAll('a.deck').forEach(a => {
  a.addEventListener('click', e => { e.preventDefault(); goToDeck(a); }, { passive: false });
});
</script>

<!-- ── Week routing ── -->
<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const week   = params.get('week');

  /* No week param → back to index */
  if (!week) {
    window.location.href = '../index.html';
    return;
  }

  /* Build a human-readable week label from the folder name.
     e.g. "2027_w09_mar_w1" → "Mar Week 1 · 3月第1週" */
  function prettyWeek(folder) {
    const m = folder.match(/_([a-z]{3})_w(\d)$/i);
    if (!m) return folder;
    const MONTHS = {
      jan:'January',feb:'February',mar:'March',apr:'April',
      may:'May',jun:'June',jul:'July',aug:'August',
      sep:'September',oct:'October',nov:'November',dec:'December'
    };
    const MONTHS_JP = {
      jan:'1月',feb:'2月',mar:'3月',apr:'4月',
      may:'5月',jun:'6月',jul:'7月',aug:'8月',
      sep:'9月',oct:'10月',nov:'11月',dec:'12月'
    };
    const mo = m[1].toLowerCase();
    const wn = m[2];
    return `${MONTHS[mo] || mo} Week ${wn} &middot; ${MONTHS_JP[mo] || mo}第${wn}週`;
  }

  document.getElementById('week-label').innerHTML = prettyWeek(week);

  /* Wire up tile hrefs */
  document.getElementById("vocab").href = `../weeks/${week}/br_vocab.html`;
  document.getElementById("sentences").href = `../weeks/${week}/br_sentences.html`;
  document.getElementById("questions").href = `../weeks/${week}/br_questions.html`;
  document.getElementById("stream").href = `../weeks/${week}/br_stream.html`;
})();
</script>

</div>
</body>
</html>
