
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Booha Adventure 2027 — Maze</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&display=swap" rel="stylesheet" />
  <style>
    :root{
      --pink:#ff3bbd; --pink2:#ff79d7;
      --blue:#3bc8ff; --blue2:#79dfff;
      --safe-top:    env(safe-area-inset-top);
      --safe-right:  env(safe-area-inset-right);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left:   env(safe-area-inset-left);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; background:#000; color:#fff;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,
        "Noto Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; }
    #app{ position:fixed; inset:0; background:#000; overflow:hidden; }

    /* ════════════════════════════════
       ROTATE OVERLAY
    ════════════════════════════════ */
    #rotateOverlay{
      position:fixed; inset:0;
      display:none; flex-direction:column;
      align-items:center; justify-content:center; gap:20px;
      background:#000; z-index:9999; text-align:center; padding:32px;
    }
    #rotateOverlay.show{ display:flex; }
    @media screen and (orientation:portrait) and (max-width:1023px){
      #rotateOverlay{ display:flex !important; }
    }
    .rotateIcon{
      font-size:72px; display:block;
      transform-origin:center;
      animation:rotateHint 2.2s ease-in-out infinite;
    }
    @keyframes rotateHint{
      0%  { transform:rotate(0deg); }
      35% { transform:rotate(-90deg); }
      65% { transform:rotate(-90deg); }
      100%{ transform:rotate(0deg); }
    }
    .rotateEmoji{
      font-size:48px;
      animation:floatEmoji 2s ease-in-out infinite;
    }
    @keyframes floatEmoji{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-10px); }
    }
    .rotateTitle{
      font-family:'Bowlby One',sans-serif;
      font-size:clamp(22px,6vw,34px);
      letter-spacing:2px; color:#fff; margin:0;
      text-shadow:0 0 30px rgba(255,140,255,.8),0 0 60px rgba(255,80,200,.4);
    }
    .rotateSub{
      font-size:16px; color:rgba(255,255,255,.65); margin:0;
      line-height:1.7;
    }
    .rotateGlow{
      width:140px; height:4px; border-radius:999px; margin:0 auto;
      background:linear-gradient(90deg,var(--pink),var(--blue),var(--pink));
      background-size:200%; animation:shimmer 2s linear infinite;
      box-shadow:0 0 16px rgba(255,59,189,.5);
    }
    @keyframes shimmer{
      0%{ background-position:0% } 100%{ background-position:200% }
    }

    /* ════════════════════════════════
       SHARED OVERLAY BASE
    ════════════════════════════════ */
    .overlay{
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:clamp(14px,3.5vmin,30px);
      padding:
        calc(28px + var(--safe-top))
        calc(28px + var(--safe-right))
        calc(28px + var(--safe-bottom))
        calc(28px + var(--safe-left));
      background:radial-gradient(ellipse at center,
        rgba(0,0,0,.50) 0%,rgba(0,0,0,.84) 62%,rgba(0,0,0,.97) 100%);
      backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
      text-align:center; z-index:40;
      transition:opacity 550ms ease;
    }
    .overlay.hidden{ opacity:0; pointer-events:none; }
    .overlay.gone  { display:none; }

    .overlayHeading{
      font-family:'Bowlby One',sans-serif;
      font-size:clamp(20px,4.5vw,46px);
      letter-spacing:2px; margin:0; color:#fff; line-height:1.2;
      text-shadow:
        0 0 32px rgba(255,140,255,.7),
        0 0 80px rgba(255,80,200,.35),
        0 2px 8px rgba(0,0,0,.9);
    }
    .btnRow{
      display:flex; gap:clamp(10px,3vmin,20px);
      flex-wrap:wrap; justify-content:center; align-items:center;
    }

    /* ════════════════════════════════
       OVERLAY BUTTONS
    ════════════════════════════════ */
    .btnPink, .btnBlue{
      appearance:none; border:0; border-radius:999px;
      padding:clamp(11px,2.5vmin,15px) clamp(20px,5vmin,30px);
      font-size:clamp(15px,3.8vmin,20px); font-weight:1000; letter-spacing:.5px;
      cursor:pointer; color:#000;
      -webkit-tap-highlight-color:transparent; transform:translateZ(0);
      min-width:80px;
    }
    .btnPink{
      background:linear-gradient(180deg,var(--pink2),var(--pink));
      box-shadow:
        0 8px 20px rgba(255,59,189,.28),
        0 0 0 2px rgba(255,59,189,.18),
        0 0 26px rgba(255,59,189,.38);
    }
    .btnPink:active{ transform:scale(.96); }
    .btnBlue{
      background:linear-gradient(180deg,var(--blue2),var(--blue));
      box-shadow:
        0 8px 20px rgba(59,200,255,.28),
        0 0 0 2px rgba(59,200,255,.18),
        0 0 26px rgba(59,200,255,.38);
    }
    .btnBlue:active{ transform:scale(.96); }

    /* ════════════════════════════════
       SPARKLES
    ════════════════════════════════ */
    .sparkleWrap{
      position:relative; display:inline-flex;
      align-items:center; justify-content:center;
    }
    .sparkleField{ position:absolute; inset:-50px; pointer-events:none; }
    .sp{
      position:absolute; border-radius:50%; background:#fff; opacity:0;
      animation:sparkleLife var(--dur) ease-in-out var(--delay) infinite;
      width:var(--size); height:var(--size); top:var(--y); left:var(--x);
      box-shadow:
        0 0 4px 1px rgba(255,255,255,.9),
        0 0 10px 3px rgba(255,100,220,.6);
    }
    @keyframes sparkleLife{
      0%  { opacity:0;   transform:scale(.4) translateY(0); }
      20% { opacity:1;   transform:scale(1)  translateY(-6px); }
      60% { opacity:.85; transform:scale(.9) translateY(-14px); }
      100%{ opacity:0;   transform:scale(.3) translateY(-22px); }
    }

    /* ════════════════════════════════
       OVERLAY 1 — confirmation
    ════════════════════════════════ */
    #overlay1{ z-index:50; }

    /* ════════════════════════════════
       TRANSITION VIDEO
    ════════════════════════════════ */
    #videoWrap{
      position:absolute; inset:0;
      display:none; background:#000; z-index:20;
    }
    #videoWrap.show{ display:block; }
    #toMazeVideo{ width:100%; height:100%; object-fit:cover; background:#000; }

    /* ════════════════════════════════
       OVERLAY 2 — ghost start
    ════════════════════════════════ */
    #overlay2{ z-index:45; display:none; }
    #overlay2.show{ display:flex; }

    .ghostBtnWrap{
      position:relative;
      display:inline-flex; align-items:center; justify-content:center;
      background:none; border:none; padding:0;
      cursor:pointer; -webkit-tap-highlight-color:transparent;
    }
    .ghostBtnWrap:active #startGhost{
      transform:scale(.88) translateY(-5px);
      filter:
        drop-shadow(0 0 44px rgba(255,100,220,1))
        drop-shadow(0 14px 30px rgba(0,0,0,.7));
    }
    .ghostSparkleField{
      position:absolute; inset:-70px;
      pointer-events:none; z-index:0;
    }
    .ghostSparkleField .sp{
      box-shadow:
        0 0 6px 2px rgba(255,255,255,.95),
        0 0 16px 5px rgba(255,100,220,.75);
    }
    #startGhost{
      width:  clamp(100px, 28vmin, 200px);
      height: clamp(100px, 28vmin, 200px);
      object-fit:contain; user-select:none; -webkit-user-drag:none;
      filter:
        drop-shadow(0 0 26px rgba(255,100,220,.6))
        drop-shadow(0 14px 30px rgba(0,0,0,.7));
      animation:floaty 3.6s ease-in-out infinite;
      transform-origin:50% 60%;
      transition:transform 120ms ease, filter 120ms ease;
      position:relative; z-index:1;
    }

    /* ════════════════════════════════
       MAZE SCENE
    ════════════════════════════════ */
    #mazeScene{ position:absolute; inset:0; background:#000; }

    #stage{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    #mazeImg{
      display:block;
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center center;
      user-select:none; -webkit-user-drag:none;
      pointer-events:none;
    }

    #hitLayer{
      position:absolute; left:0; top:0; width:0; height:0;
      cursor:default; z-index:5; pointer-events:auto;
    }

    /* Dev grid + crosshair */
    #grid{
      position:absolute; inset:0; display:none; pointer-events:none;
      background-image:
        linear-gradient(to right, rgba(255,255,255,.12) 1px, transparent 1px),
        linear-gradient(to bottom,rgba(255,255,255,.12) 1px, transparent 1px);
      background-size:80px 80px; mix-blend-mode:screen; opacity:.55;
    }
    #grid.show{ display:block; }
    #crosshair{ position:absolute; inset:0; pointer-events:none; display:none; }
    #crosshair.show{ display:block; }
    .chLineH,.chLineV{
      position:absolute; background:rgba(255,255,255,.7);
      box-shadow:0 0 16px rgba(255,255,255,.25);
    }
    .chLineH{ height:1px; left:0; right:0; top:0; }
    .chLineV{ width:1px;  top:0; bottom:0; left:0; }

    /* ── HUD ── */
    .hudTitle{
      font-family:'Bowlby One',sans-serif; font-size:clamp(13px,1.8vw,18px);
      letter-spacing:2px; line-height:1.15; color:#fff;
      text-shadow:
        0 0 22px rgba(255,140,255,.7),
        0 0 60px rgba(255,80,200,.35),
        0 2px 6px rgba(0,0,0,.9);
      user-select:none; pointer-events:none;
    }
    #hud{
      position:absolute;
      left:calc(12px + var(--safe-left)); top:calc(12px + var(--safe-top));
      display:flex; gap:10px; align-items:flex-start; z-index:10;
    }
    .pill{
      border-radius:999px; padding:10px 14px; font-weight:900; letter-spacing:.4px;
      background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.16);
      backdrop-filter:blur(14px) saturate(140%);
      -webkit-backdrop-filter:blur(14px) saturate(140%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.08),
        0 14px 30px rgba(0,0,0,.35);
      color:rgba(255,255,255,.92); user-select:none;
    }
    #coordPill{ display:none; } #coordPill.show{ display:block; }
    .coordSmall{ font-size:12px; color:rgba(255,255,255,.7); font-weight:800; letter-spacing:1px; }
    .coordBig  { font-size:14px; margin-top:4px; }

    /* ── Floating ghost avatar ── */
    #avatar{
      position:absolute;
      right:calc(10px + var(--safe-right)); top:calc(10px + var(--safe-top));
      width:48px; height:48px; z-index:10; pointer-events:none;
      filter:drop-shadow(0 8px 16px rgba(0,0,0,.55));
      opacity:.95; transform-origin:50% 60%;
      animation:floaty 3.8s ease-in-out infinite;
      display:none; /* hidden — ghost is on canvas */
    }
    @keyframes floaty{
      0%  { transform:translateY(0px)  rotate(var(--r,0deg)); }
      50% { transform:translateY(-8px) rotate(calc(var(--r,0deg) + 2deg)); }
      100%{ transform:translateY(0px)  rotate(var(--r,0deg)); }
    }

    /* ── BRYAN button ── */
    #bryanBtn{
      position:absolute;
      left:calc(10px + var(--safe-left)); bottom:calc(10px + var(--safe-bottom));
      z-index:20; border-radius:999px;
      padding:6px 10px; font-size:9px; font-weight:1000; letter-spacing:1.4px;
      text-transform:uppercase; color:rgba(255,255,255,.45);
      background:rgba(0,0,0,.30); border:1px solid rgba(255,255,255,.10);
      backdrop-filter:blur(10px) saturate(140%);
      -webkit-backdrop-filter:blur(10px) saturate(140%);
      cursor:pointer; -webkit-tap-highlight-color:transparent;
    }
    #bryanBtn.on{
      color:#fff; border-color:rgba(255,255,255,.22);
      box-shadow:0 0 0 2px rgba(255,59,189,.18),0 0 18px rgba(255,59,189,.25);
    }
    #bryanBtn:active{ transform:scale(.96); }

    /* ── BACK BUTTON — smaller, bottom-right ── */
    #backBtn{
      position:absolute;
      right:  calc(8px + var(--safe-right));
      bottom: calc(8px + var(--safe-bottom));
      z-index:20;
      appearance:none; border:0; border-radius:999px;
      padding:5px 12px;
      font-size:11px; font-weight:1000; letter-spacing:.5px;
      cursor:pointer; color:#000;
      background:linear-gradient(180deg,var(--pink2),var(--pink));
      box-shadow:
        0 4px 10px rgba(255,59,189,.28),
        0 0 0 1px rgba(255,59,189,.15),
        0 0 14px rgba(255,59,189,.28);
      opacity:0.75;
      -webkit-tap-highlight-color:transparent; transform:translateZ(0);
      transition:opacity 200ms;
    }
    #backBtn:hover { opacity:1; }
    #backBtn:active{ transform:scale(.96); opacity:1; }

    @media (min-width:900px) and (pointer:fine){
      #backBtn{ padding:7px 14px; font-size:12px; opacity:0.85; }
      #bryanBtn{ padding:8px 12px; font-size:10px; color:rgba(255,255,255,.6); }
    }

    @media (pointer:coarse){
      .hudTitle{ display:none; }
      #bryanBtn{ display:none; }
      #hud{ display:none; }
    }

    #app.inTransition #bryanBtn,
    #app.inTransition #hud,
    #app.inTransition #avatar,
    #app.inTransition #backBtn{ display:none !important; }

    /* ── FADE ── */
    #fade{
      position:fixed; inset:0; background:#000; opacity:0;
      pointer-events:none; transition:opacity 520ms ease; z-index:200;
    }
    #fade.on{ opacity:1; }

    /* ════════════════════════════════
       CANVAS LAYER — checkpoints + ghost
    ════════════════════════════════ */
    #mazeCanvas{
      position:absolute; inset:0;
      width:100%; height:100%;
      pointer-events:none;
      z-index:6;
    }
    #mazeCanvas.interactive{ pointer-events:auto; }

    /* ════════════════════════════════
       CHECKPOINT POPUP
    ════════════════════════════════ */
    #cpPopup{
      position:absolute; z-index:30;
      background:rgba(0,0,0,.88);
      border:1.5px solid rgba(255,255,255,.18);
      border-radius:20px;
      padding:22px 28px;
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      text-align:center;
      min-width:200px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.06),
        0 20px 60px rgba(0,0,0,.7),
        0 0 40px rgba(255,59,189,.15);
      display:none;
      transform:translate(-50%,-120%);
      pointer-events:auto;
    }
    #cpPopup.show{ display:block; }
    #cpPopup h2{
      font-family:'Bowlby One',sans-serif;
      font-size:clamp(14px,2.5vw,20px);
      letter-spacing:1px; margin:0 0 8px; color:#fff;
      text-shadow:0 0 20px rgba(255,140,255,.6);
    }
    #cpPopup p{
      font-size:13px; color:rgba(255,255,255,.6); margin:0 0 16px;
      line-height:1.5;
    }
    #cpCloseBtn{
      appearance:none; border:0; border-radius:999px;
      padding:8px 20px; font-size:13px; font-weight:900;
      cursor:pointer; color:#000;
      background:linear-gradient(180deg,var(--pink2),var(--pink));
      box-shadow:0 4px 14px rgba(255,59,189,.35);
    }
    #cpCloseBtn:active{ transform:scale(.96); }

    @media (prefers-reduced-motion:reduce){
      #avatar,#startGhost{ animation:none; }
      .rotateIcon{ animation:none; transform:rotate(-90deg); }
      #fade{ transition:none; }
      .sp{ animation:none; opacity:.6; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ROTATE OVERLAY -->
  <div id="rotateOverlay" role="alert" aria-live="polite">
    <span class="rotateIcon">📱</span>
    <div class="rotateGlow"></div>
    <h1 class="rotateTitle">よこにしてね！</h1>
    <p class="rotateSub">めいろをあそぶには<br>スマホを<strong style="color:#ff79d7">よこむき</strong>にしてください</p>
  </div>

  <!-- OVERLAY 1 — confirmation -->
  <div id="overlay1" class="overlay" aria-label="めいろへいく？">
    <h1 class="overlayHeading">ブーハーめいろにいく？</h1>
    <div class="btnRow">
      <button id="returnBtn" class="btnBlue" type="button">いかない</button>
      <div class="sparkleWrap">
        <div class="sparkleField" id="confirmSparkles" aria-hidden="true"></div>
        <button id="continueBtn" class="btnPink" type="button">いく！</button>
      </div>
    </div>
  </div>

  <!-- TRANSITION VIDEO -->
  <div id="videoWrap" aria-hidden="true">
    <video id="toMazeVideo" preload="auto" playsinline webkit-playsinline>
      <source src="assets/video/to-the-maze.mp4" type="video/mp4" />
    </video>
  </div>

  <!-- OVERLAY 2 — ghost start -->
  <div id="overlay2" class="overlay" aria-label="スタート">
    <h1 class="overlayHeading">ブーハーをタッチしてはじめよう！</h1>
    <button id="mazeStartBtn" class="ghostBtnWrap" type="button" aria-label="スタート">
      <div class="ghostSparkleField" id="startSparkles" aria-hidden="true"></div>
      <img id="startGhost" alt="ブーハー" />
    </button>
  </div>

  <!-- MAZE SCENE -->
  <section id="mazeScene" aria-label="めいろ">
    <div id="stage">
      <img id="mazeImg" src="assets/img/maze.png" alt="めいろ" />
      <canvas id="mazeCanvas" aria-hidden="true"></canvas>
      <div id="hitLayer" aria-hidden="true">
        <div id="grid"></div>
        <div id="crosshair">
          <div class="chLineH"></div>
          <div class="chLineV"></div>
        </div>
      </div>
    </div>

    <!-- Checkpoint popup -->
    <div id="cpPopup" role="dialog" aria-modal="true">
      <h2 id="cpPopupTitle">Week XX</h2>
      <p id="cpPopupBody">このウィークのコンテンツはここにはいります！</p>
      <button id="cpCloseBtn" type="button">とじる ✕</button>
    </div>

    <!-- Desktop HUD -->
    <div id="hud">
      <div class="hudTitle">BOOHA<br>ADVENTURE</div>
      <div id="coordPill" class="pill">
        <div class="coordSmall">COORDINATES</div>
        <div class="coordBig" id="coordText">x: —  y: —</div>
        <div class="coordSmall" style="margin-top:6px;opacity:.9;">click to copy</div>
      </div>
    </div>

    <img id="avatar" alt="ブーハー" />
    <button id="bryanBtn" type="button" aria-label="Bryan mode">BRYAN</button>
    <button id="backBtn" type="button" aria-label="もどる">もどる</button>
  </section>

  <div id="fade" aria-hidden="true"></div>
</div>

<audio id="bgMusic" src="assets/audio/sneaky.mp3" loop preload="auto"></audio>

<script>

    '#3bc8ff', // month 5 — cyan
    '#3b6fff', // month 6 — blue
    '#a03bff', // month 7 — purple
    '#ff3b6f', // month 8 — rose
    '#ff9f3b', // month 9 — amber
    '#3bffee', // month 10 — teal
    '#c8ff3b', // month 11 — lime
    '#ff3b3b', // month 12 — red
  ];

  function monthForWeek(w){ return Math.floor((w-1)/4); } // 0-indexed
  function colorForWeek(w){ return MONTH_COLORS[monthForWeek(w)]; }

  // Current open weeks: 8, 9, 10
  const OPEN_WEEKS = [8, 9, 10];
  const CURRENT_WEEK = 10; // where ghost travels on open

  // DOM refs
  const app             = document.getElementById('app');
  const rotateOverlay   = document.getElementById('rotateOverlay');
  const overlay1        = document.getElementById('overlay1');
  const overlay2        = document.getElementById('overlay2');
  const videoWrap       = document.getElementById('videoWrap');
  const toMazeVideo     = document.getElementById('toMazeVideo');
  const returnBtn       = document.getElementById('returnBtn');
  const continueBtn     = document.getElementById('continueBtn');
  const mazeStartBtn    = document.getElementById('mazeStartBtn');
  const startGhost      = document.getElementById('startGhost');
  const confirmSparkles = document.getElementById('confirmSparkles');
  const startSparkles   = document.getElementById('startSparkles');
  const fade            = document.getElementById('fade');
  const bgMusic         = document.getElementById('bgMusic');
  const avatar          = document.getElementById('avatar');
  const mazeImg         = document.getElementById('mazeImg');
  const hitLayer        = document.getElementById('hitLayer');
  const grid            = document.getElementById('grid');
  const crosshair       = document.getElementById('crosshair');
  const bryanBtn        = document.getElementById('bryanBtn');
  const backBtn         = document.getElementById('backBtn');
  const coordPill       = document.getElementById('coordPill');
  const coordText       = document.getElementById('coordText');
  const canvas          = document.getElementById('mazeCanvas');
  const ctx             = canvas.getContext('2d');
  const cpPopup         = document.getElementById('cpPopup');
  const cpPopupTitle    = document.getElementById('cpPopupTitle');
  const cpPopupBody     = document.getElementById('cpPopupBody');
  const cpCloseBtn      = document.getElementById('cpCloseBtn');
  const FADE_MS         = 520;

  // ── Orientation ──────────────────────────────────────────
  function checkOrientation(){
    const portrait    = window.innerHeight > window.innerWidth;
    const smallScreen = window.innerWidth < 1024;
    rotateOverlay.classList.toggle('show', portrait && smallScreen);
  }
  window.addEventListener('resize', checkOrientation, {passive:true});
  window.addEventListener('orientationchange', ()=>setTimeout(checkOrientation,150), {passive:true});
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', checkOrientation, {passive:true});
  }
  checkOrientation();

  // ── Helpers ───────────────────────────────────────────────
  function fadeToBlack(on){ fade.classList.toggle('on', !!on); }
  function pickRandom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  function assignRandomGhost(){
    const src = pickRandom(GHOSTS);
    startGhost.src = avatar.src = src;
    ghostImg.src = src;
  }

  // ── Sparkle builder ───────────────────────────────────────
  function buildSparkles(container, count=24, wide=false){
    container.innerHTML='';
    for(let i=0; i<count; i++){
      const sp = document.createElement('div'); sp.className='sp';
      const angle  = (i/count)*Math.PI*2;
      const radius = wide ? 35+Math.random()*28 : 28+Math.random()*18;
      const cx = 50+Math.cos(angle)*radius;
      const cy = 50+Math.sin(angle)*radius;
      const size  = wide ? 3+Math.random()*4 : 2+Math.random()*3;
      const dur   = 1.3+Math.random()*1.8;
      const delay = -(Math.random()*dur);
      sp.style.cssText = `--size:${size}px;--x:${cx}%;--y:${cy}%;--dur:${dur}s;--delay:${delay}s;`;
      container.appendChild(sp);
    }
  }
  buildSparkles(confirmSparkles, 24);
  buildSparkles(startSparkles, 36, true);

  // ── Cover-mode coordinate transforms ─────────────────────
  function getCoverTransform(){
    const rect = canvas.getBoundingClientRect();
    const cw = rect.width, ch = rect.height;
    const scale = Math.max(cw / IMG_W, ch / IMG_H);
    const dw = IMG_W * scale, dh = IMG_H * scale;
    const ox = (dw - cw) / 2; // crop offset left
    const oy = (dh - ch) / 2; // crop offset top
    return { scale, ox, oy, cw, ch };
  }

  // Image coords → screen (canvas-relative) pixel
  function imgToScreen(ix, iy){
    const { scale, ox, oy } = getCoverTransform();
    return {
      sx: ix * scale - ox,
      sy: iy * scale - oy
    };
  }

  // Screen pixel → image coords
  function screenToImg(sx, sy){
    const { scale, ox, oy, cw, ch } = getCoverTransform();
    return {
      ix: Math.round(Math.min(Math.max((sx + ox) / scale, 0), IMG_W)),
      iy: Math.round(Math.min(Math.max((sy + oy) / scale, 0), IMG_H))
    };
  }

  // ── Ghost image ──────────────────────────────────────────
  const ghostImg = new Image();
  ghostImg.src = GHOSTS[0];
  let ghostSrc = GHOSTS[0];

  // Ghost state
  let ghostIX = ALL_CHECKPOINTS.find(c=>c.week===CURRENT_WEEK).ix;
  let ghostIY = ALL_CHECKPOINTS.find(c=>c.week===CURRENT_WEEK).iy;
  let ghostTargetIX = ghostIX;
  let ghostTargetIY = ghostIY;
  let ghostAnimProgress = 1; // 0..1
  let ghostStartIX = ghostIX;
  let ghostStartIY = ghostIY;
  const GHOST_TRAVEL_DURATION = 1200; // ms for checkpoint-to-checkpoint move
  let ghostAnimStart = 0;
  let ghostBobT = 0;
  let ghostTrail = []; // [{ix,iy,life}]
  let rafId = null;

  // Intro animation state
  let introPhase = 'idle'; // 'idle' | 'allGlow' | 'traveling'
  let introAllGlowStart = 0;
  const INTRO_ALL_GLOW_MS = 2200; // time all checkpoints show before fade
  let introTravelStart = 0;
  let introGhostStartIX = 0;
  let introGhostStartIY = 0;
  const INTRO_TRAVEL_MS = 2000;

  // Checkpoint glow animation
  let cpGlowT = 0;
  let bryanOn = false;
  let mazeStarted = false;
  let activeWeek = CURRENT_WEEK;

  // Trail particle struct
  function addTrailParticle(ix, iy){
    ghostTrail.push({
      ix, iy,
      life: 1.0,
      size: 4 + Math.random() * 6,
      color: colorForWeek(activeWeek),
      dx: (Math.random()-0.5)*0.5,
      dy: -Math.random()*0.5,
    });
    if(ghostTrail.length > 60) ghostTrail.shift();
  }

  // ── Canvas sizing ────────────────────────────────────────
  function resizeCanvas(){
    const rect = document.getElementById('stage').getBoundingClientRect();
    canvas.width  = rect.width  * window.devicePixelRatio;
    canvas.height = rect.height * window.devicePixelRatio;
    canvas.style.width  = rect.width  + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  }
  window.addEventListener('resize', ()=>{ resizeCanvas(); positionSoon(); }, {passive:true});
  window.addEventListener('orientationchange', ()=>setTimeout(()=>{ resizeCanvas(); positionSoon(); },200), {passive:true});

  // ── Hit layer positioning ─────────────────────────────────
  function positionHitLayer(){
    const s = document.getElementById('stage').getBoundingClientRect();
    hitLayer.style.left   = '0px';
    hitLayer.style.top    = '0px';
    hitLayer.style.width  = s.width  + 'px';
    hitLayer.style.height = s.height + 'px';
  }
  function positionSoon(){
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ positionHitLayer(); resizeCanvas(); }));
  }
  window.addEventListener('resize', positionSoon, {passive:true});
  window.addEventListener('orientationchange', ()=>setTimeout(positionSoon,200), {passive:true});
  if(mazeImg.complete) setTimeout(positionSoon, 0);
  else mazeImg.addEventListener('load', ()=>setTimeout(positionSoon, 0));

  // ── Draw ─────────────────────────────────────────────────
  function easeInOut(t){ return t<.5 ? 2*t*t : -1+(4-2*t)*t; }

  function drawAll(now){
    const W = canvas.width  / window.devicePixelRatio;
    const H = canvas.height / window.devicePixelRatio;
    ctx.save();
    ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
    ctx.clearRect(0, 0, W, H);

    // Determine which checkpoints to show and their alpha/glow
    let cpStates = {}; // week -> {alpha, glowExtra, color}

    if(!mazeStarted){
      // nothing
    } else if(introPhase === 'allGlow'){
      // All checkpoints glowing, then fading out
      const elapsed = now - introAllGlowStart;
      const showTime = INTRO_ALL_GLOW_MS * 0.6;
      const fadeTime = INTRO_ALL_GLOW_MS * 0.4;
      let alpha = 1;
      if(elapsed > showTime){
        alpha = Math.max(0, 1 - (elapsed - showTime) / fadeTime);
      }
      ALL_CHECKPOINTS.forEach(cp => {
        if(!OPEN_WEEKS.includes(cp.week)){
          cpStates[cp.week] = { alpha: alpha * 0.85, glowExtra: 1, color: colorForWeek(cp.week) };
        }
      });
      OPEN_WEEKS.forEach(w => {
        cpStates[w] = { alpha: 1, glowExtra: 1.5, color: colorForWeek(w) };
      });
      if(elapsed >= INTRO_ALL_GLOW_MS){
        introPhase = 'traveling';
        introTravelStart = now;
        introGhostStartIX = ALL_CHECKPOINTS[0].ix;
        introGhostStartIY = ALL_CHECKPOINTS[0].iy;
      }
    } else if(introPhase === 'traveling'){
      OPEN_WEEKS.forEach(w => {
        cpStates[w] = { alpha: 1, glowExtra: 1, color: colorForWeek(w) };
      });
      // Ghost traveling to current week
      const elapsed = now - introTravelStart;
      const t = Math.min(elapsed / INTRO_TRAVEL_MS, 1);
      const et = easeInOut(t);
      const target = ALL_CHECKPOINTS.find(c=>c.week===CURRENT_WEEK);
      const cix = introGhostStartIX + (target.ix - introGhostStartIX)*et;
      const ciy = introGhostStartIY + (target.iy - introGhostStartIY)*et;
      if(t < 1){
        // trail
        if(Math.random()<0.4) addTrailParticle(cix, ciy);
        ghostIX = cix; ghostIY = ciy;
      } else {
        introPhase = 'done';
        ghostIX = target.ix;
        ghostIY = target.iy;
        ghostTargetIX = ghostIX;
        ghostTargetIY = ghostIY;
        ghostAnimProgress = 1;
        activeWeek = CURRENT_WEEK;
      }
    } else {
      // Normal: open weeks always visible
      OPEN_WEEKS.forEach(w => {
        cpStates[w] = { alpha: 1, glowExtra: bryanOn ? 0.5 : 0, color: colorForWeek(w) };
      });
      if(bryanOn){
        ALL_CHECKPOINTS.forEach(cp => {
          if(!OPEN_WEEKS.includes(cp.week)){
            cpStates[cp.week] = { alpha: 0.75, glowExtra: 0.5, color: colorForWeek(cp.week) };
          }
        });
      }
    }

    // Draw trail particles
    ghostTrail.forEach((p, i) => {
      const { sx, sy } = imgToScreen(p.ix, p.iy);
      const a = p.life * 0.85;
      ctx.save();
      ctx.globalAlpha = a;
      const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, p.size*2);
      grad.addColorStop(0, p.color || '#fff');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(sx, sy, p.size*2, 0, Math.PI*2);
      ctx.fill();
      // sparkle star
      ctx.fillStyle = 'rgba(255,255,255,' + (a*0.9) + ')';
      ctx.beginPath();
      ctx.arc(sx, sy, p.size*0.5, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
      p.life -= 0.025;
      p.ix += p.dx;
      p.iy += p.dy;
    });
    ghostTrail = ghostTrail.filter(p=>p.life>0);

    // Draw checkpoints
    cpGlowT = now / 1000;
    ALL_CHECKPOINTS.forEach(cp => {
      const state = cpStates[cp.week];
      if(!state || state.alpha <= 0) return;
      const { sx, sy } = imgToScreen(cp.ix, cp.iy);
      const color = state.color;
      const pulse = 0.5 + 0.5*Math.sin(cpGlowT * 2.5 + cp.week * 0.7);
      const glowR = 14 + pulse * 8 * (1 + state.glowExtra);
      ctx.save();
      ctx.globalAlpha = state.alpha;

      // Outer glow
      const gGlow = ctx.createRadialGradient(sx, sy, 0, sx, sy, glowR*2.2);
      gGlow.addColorStop(0, color.replace(')', ',0.45)').replace('rgb','rgba').replace('#','rgba(').replace('rgba(','rgba(').replace(/rgba\(([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2}),/, (m,r,g,b)=>`rgba(${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)},`));
      // simpler approach:
      const glowAlpha = 0.35 + pulse * 0.2;
      ctx.globalAlpha = state.alpha * glowAlpha;
      ctx.beginPath();
      ctx.arc(sx, sy, glowR*2.2, 0, Math.PI*2);
      const gr = ctx.createRadialGradient(sx, sy, 0, sx, sy, glowR*2.2);
      gr.addColorStop(0, color);
      gr.addColorStop(1, 'transparent');
      ctx.fillStyle = gr;
      ctx.fill();

      // Inner circle
      ctx.globalAlpha = state.alpha * (0.85 + pulse * 0.15);
      ctx.beginPath();
      ctx.arc(sx, sy, glowR * 0.55, 0, Math.PI*2);
      ctx.fillStyle = color;
      ctx.shadowBlur = 18;
      ctx.shadowColor = color;
      ctx.fill();
      ctx.shadowBlur = 0;

      // White core
      ctx.globalAlpha = state.alpha * 0.9;
      ctx.beginPath();
      ctx.arc(sx, sy, glowR * 0.22, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.fill();

      // Week number label
      if(OPEN_WEEKS.includes(cp.week) || bryanOn){
        ctx.globalAlpha = state.alpha * 0.95;
        ctx.font = `900 ${Math.round(glowR * 0.7)}px system-ui`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#000';
        ctx.fillText(cp.week, sx, sy + glowR * 1.05);
      }

      ctx.restore();
    });

    // Draw ghost
    if(mazeStarted){
      // Update ghost travel animation
      if(ghostAnimProgress < 1){
        const elapsed = now - ghostAnimStart;
        ghostAnimProgress = Math.min(elapsed / GHOST_TRAVEL_DURATION, 1);
        const et = easeInOut(ghostAnimProgress);
        const cix = ghostStartIX + (ghostTargetIX - ghostStartIX)*et;
        const ciy = ghostStartIY + (ghostTargetIY - ghostStartIY)*et;
        if(Math.random()<0.35) addTrailParticle(cix, ciy);
        ghostIX = cix;
        ghostIY = ciy;
        if(ghostAnimProgress >= 1){
          ghostIX = ghostTargetIX;
          ghostIY = ghostTargetIY;
        }
      }

      ghostBobT = now / 1000;
      const bobY = Math.sin(ghostBobT * 1.9) * 3;
      const { sx, sy } = imgToScreen(ghostIX, ghostIY);
      const gSize = 36;

      // Ghost glow
      ctx.save();
      ctx.globalAlpha = 0.35;
      const gg = ctx.createRadialGradient(sx, sy+4, 0, sx, sy+4, gSize*1.4);
      gg.addColorStop(0, colorForWeek(activeWeek));
      gg.addColorStop(1, 'transparent');
      ctx.fillStyle = gg;
      ctx.beginPath();
      ctx.arc(sx, sy+4, gSize*1.4, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();

      // Ghost image
      if(ghostImg.complete && ghostImg.naturalWidth>0){
        ctx.save();
        ctx.drawImage(ghostImg, sx-gSize, sy-gSize+bobY, gSize*2, gSize*2);
        ctx.restore();
      } else {
        // Fallback circle
        ctx.save();
        ctx.beginPath();
        ctx.arc(sx, sy+bobY, gSize*0.65, 0, Math.PI*2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.restore();
      }
    }

    ctx.restore();
  }

  // ── RAF loop ──────────────────────────────────────────────
  function loop(now){
    drawAll(now);
    rafId = requestAnimationFrame(loop);
  }

  // ── Canvas click / touch — checkpoint interaction ────────
  function handleCanvasInteraction(clientX, clientY){
    if(introPhase === 'allGlow' || introPhase === 'traveling') return;

    const rect = canvas.getBoundingClientRect();
    const sx = clientX - rect.left;
    const sy = clientY - rect.top;
    const { ix, iy } = screenToImg(sx, sy);

    // Find nearest checkpoint within threshold
    const HIT_RADIUS_IMG = 40; // in image px
    let best = null, bestDist = Infinity;
    const weeksToCheck = bryanOn ? ALL_CHECKPOINTS.map(c=>c.week) : OPEN_WEEKS;
    ALL_CHECKPOINTS.forEach(cp => {
      if(!weeksToCheck.includes(cp.week)) return;
      const d = Math.hypot(cp.ix - ix, cp.iy - iy);
      if(d < HIT_RADIUS_IMG && d < bestDist){
        bestDist = d; best = cp;
      }
    });

    if(best){
      moveGhostTo(best);
      openPopup(best, sx, sy);
    }
  }

  canvas.classList.add('interactive');
  canvas.addEventListener('click', e=>{
    handleCanvasInteraction(e.clientX, e.clientY);
  });
  canvas.addEventListener('touchend', e=>{
    if(e.changedTouches.length){
      const t = e.changedTouches[0];
      handleCanvasInteraction(t.clientX, t.clientY);
      e.preventDefault();
    }
  }, {passive:false});

  function moveGhostTo(cp){
    ghostStartIX = ghostIX;
    ghostStartIY = ghostIY;
    ghostTargetIX = cp.ix;
    ghostTargetIY = cp.iy;
    ghostAnimProgress = 0;
    ghostAnimStart = performance.now();
    activeWeek = cp.week;
  }

  // ── Popup ─────────────────────────────────────────────────
  function openPopup(cp, sx, sy){
    cpPopupTitle.textContent = `Week ${cp.week}`;
    cpPopupBody.textContent = `Week ${cp.week}のコンテンツはここにはいります！ (準備中...)`;

    // Position popup above checkpoint in screen space
    const rect = document.getElementById('stage').getBoundingClientRect();
    const absX = rect.left + sx;
    const absY = rect.top + sy;

    cpPopup.style.left = Math.min(Math.max(absX, 120), rect.right - 120) + 'px';
    cpPopup.style.top  = (absY - 20) + 'px';
    cpPopup.style.transform = 'translate(-50%, -100%)';
    cpPopup.classList.add('show');
  }

  cpCloseBtn.addEventListener('click', ()=> cpPopup.classList.remove('show'));
  cpPopup.addEventListener('click', e=>e.stopPropagation());

  // ── Overlay 1 ─────────────────────────────────────────────
  returnBtn.addEventListener('click', ()=>{
    fadeToBlack(true);
    setTimeout(()=>{ window.location.href='index.html'; }, FADE_MS);
  });

  let videoPlayed = false;
  continueBtn.addEventListener('click', async ()=>{
    if(videoPlayed) return; videoPlayed = true;

    overlay1.classList.add('hidden');
    overlay1.addEventListener('transitionend', ()=>overlay1.classList.add('gone'), {once:true});

    app.classList.add('inTransition');
    videoWrap.classList.add('show');
    try{ toMazeVideo.currentTime = 0; }catch(e){}
    try{ await toMazeVideo.play(); }catch(e){ showOverlay2(); }
  });

  // ── Video → Overlay 2 ────────────────────────────────────
  let overlay2Shown = false;
  function showOverlay2(){
    if(overlay2Shown) return; overlay2Shown = true;
    try{ toMazeVideo.pause(); }catch(e){}
    try{ toMazeVideo.currentTime = 0; }catch(e){}
    videoWrap.classList.remove('show');
    overlay2.classList.add('show');
    app.classList.add('inTransition');
    positionSoon();
  }
  toMazeVideo.addEventListener('ended', showOverlay2);
  toMazeVideo.addEventListener('error', showOverlay2);
  toMazeVideo.addEventListener('timeupdate', ()=>{
    const d = toMazeVideo.duration;
    if(!isFinite(d) || d<=0) return;
    if(d - toMazeVideo.currentTime <= 0.5) showOverlay2();
  });

  // ── Overlay 2 → maze start ───────────────────────────────
  mazeStartBtn.addEventListener('click', async ()=>{
    if(mazeStarted) return; mazeStarted = true;

    overlay2.classList.add('hidden');
    overlay2.addEventListener('transitionend', ()=>overlay2.remove(), {once:true});

    app.classList.remove('inTransition');

    // Place ghost off-screen top-left to start intro
    const firstCP = ALL_CHECKPOINTS[0];
    ghostIX = firstCP.ix;
    ghostIY = firstCP.iy;
    ghostTargetIX = ghostIX;
    ghostTargetIY = ghostIY;
    ghostAnimProgress = 1;

    // Start intro sequence
    introPhase = 'allGlow';
    introAllGlowStart = performance.now();

    try{ bgMusic.volume=0.65; await bgMusic.play(); }
    catch(e){ console.warn('Music blocked:', e); }

    resizeCanvas();
    positionSoon();
    if(!rafId) rafId = requestAnimationFrame(loop);
  });

  // ── Back button ───────────────────────────────────────────
  backBtn.addEventListener('click', ()=>{
    try{ bgMusic.pause(); bgMusic.currentTime=0; }catch(e){}
    fadeToBlack(true);
    setTimeout(()=>{ window.location.href='index.html'; }, FADE_MS);
  });

  // ── Visibility ────────────────────────────────────────────
  document.addEventListener('visibilitychange', ()=>{
    if(document.hidden){
      try{ toMazeVideo.pause(); }catch(e){}
      try{ bgMusic.pause(); }catch(e){}
    } else {
      if(videoPlayed && !overlay2Shown) try{ toMazeVideo.play(); }catch(e){}
      if(mazeStarted) try{ bgMusic.play(); }catch(e){}
    }
  });

  // ── Bryan mode ────────────────────────────────────────────
  function applyBryanUI(){
    bryanBtn.classList.toggle('on', bryanOn);
    grid.classList.toggle('show', bryanOn);
    coordPill.classList.toggle('show', bryanOn);
    crosshair.classList.toggle('show', bryanOn);
    hitLayer.style.cursor = bryanOn ? 'crosshair' : 'default';
    if(bryanOn) requestAnimationFrame(positionHitLayer);
  }
  const dotLayer = document.createElement('div');
  dotLayer.style.cssText = 'position:absolute;inset:0;pointer-events:none;';
  hitLayer.appendChild(dotLayer);

  function placeDot(lx,ly,ix,iy){
    const dot = document.createElement('div');
    dot.style.cssText = `
      position:absolute; left:${lx}px; top:${ly}px;
      width:10px; height:10px; border-radius:50%;
      background:#ff3bbd;
      box-shadow:0 0 0 2px #fff,0 0 10px rgba(255,59,189,.8);
      transform:translate(-50%,-50%); pointer-events:none;`;
    const label = document.createElement('div');
    label.textContent = `${ix},${iy}`;
    label.style.cssText = `
      position:absolute; left:10px; top:-8px;
      font-size:11px; font-weight:900; letter-spacing:.5px;
      color:#fff; background:rgba(0,0,0,.72);
      padding:2px 5px; border-radius:4px;
      white-space:nowrap; pointer-events:none;`;
    dot.appendChild(label);
    dotLayer.appendChild(dot);
  }
  function clearDots(){ dotLayer.innerHTML=''; }

  bryanBtn.addEventListener('click', ()=>{
    if(bryanOn){
      bryanOn=false; clearDots();
      coordText.textContent='x: —  y: —';
      applyBryanUI(); return;
    }
    const pw = prompt('Bryan mode password:');
    if(pw===null) return;
    String(pw).trim()===BRYAN_PASS ? (bryanOn=true, applyBryanUI()) : alert('Nope.');
  });

  // ── Coordinate display (Bryan mode, hitLayer) ────────────
  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

  function getImageCoordsFromClient(cx, cy){
    const rect = canvas.getBoundingClientRect();
    const sx = cx - rect.left;
    const sy = cy - rect.top;
    const c = screenToImg(sx, sy);
    return { x: c.ix, y: c.iy, localX: sx, localY: sy };
  }

  function setCrosshair(lx,ly){
    const h = crosshair.querySelector('.chLineH');
    const v = crosshair.querySelector('.chLineV');
    if(h) h.style.transform=`translateY(${ly}px)`;
    if(v) v.style.transform=`translateX(${lx}px)`;
  }

  async function copyText(txt){
    try{ await navigator.clipboard.writeText(txt); return true; }
    catch(e){
      try{
        const ta = document.createElement('textarea');
        ta.value=txt; ta.style.cssText='position:fixed;left:-9999px';
        document.body.appendChild(ta); ta.focus(); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta); return true;
      }catch(err){ return false; }
    }
  }

  hitLayer.addEventListener('mousemove', e=>{
    if(!bryanOn) return;
    const c = getImageCoordsFromClient(e.clientX, e.clientY);
    coordText.textContent = `x: ${c.x}  y: ${c.y}`;
    setCrosshair(c.localX, c.localY);
  });

  hitLayer.addEventListener('click', async e=>{
    if(!bryanOn) return;
    const c = getImageCoordsFromClient(e.clientX, e.clientY);
    coordText.textContent = `x: ${c.x}  y: ${c.y}`;
    setCrosshair(c.localX, c.localY);
    placeDot(c.localX, c.localY, c.x, c.y);
    const ok = await copyText(`${c.x},${c.y}`);
    if(ok){
      coordPill.style.transform='scale(1.02)';
      setTimeout(()=>coordPill.style.transform='', 120);
    }
  });

  coordPill.addEventListener('click', async ()=>{
    if(!bryanOn) return;
    const m = coordText.textContent.match(/x:\s*(\d+)\s*y:\s*(\d+)/);
    await copyText(m ? `${m[1]},${m[2]}` : coordText.textContent);
  });

  // ── Init ──────────────────────────────────────────────────
  assignRandomGhost();
  resizeCanvas();
  positionSoon();
</script>
</body>
</html>
