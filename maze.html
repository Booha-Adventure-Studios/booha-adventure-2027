
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Booha Adventure 2027 — Maze</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&display=swap" rel="stylesheet" />
  <style>
    :root{
      --pink:#ff3bbd; --pink2:#ff79d7;
      --blue:#3bc8ff; --blue2:#79dfff;
      --safe-top:    env(safe-area-inset-top);
      --safe-right:  env(safe-area-inset-right);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left:   env(safe-area-inset-left);
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; background:#000; color:#fff;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,
        "Noto Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; }
    #app{ position:fixed; inset:0; background:#000; overflow:hidden; }

    /* ══ ROTATE OVERLAY ══ */
    #rotateOverlay{
      position:fixed; inset:0;
      display:none; flex-direction:column;
      align-items:center; justify-content:center; gap:20px;
      background:#000; z-index:9999; text-align:center; padding:32px;
    }
    #rotateOverlay.show{ display:flex; }
    @media screen and (orientation:portrait) and (max-width:1023px){
      #rotateOverlay{ display:flex !important; }
    }
    .rotateIcon{
      font-size:72px; display:block; transform-origin:center;
      animation:rotateHint 2.2s ease-in-out infinite;
    }
    @keyframes rotateHint{
      0%  { transform:rotate(0deg); }
      35% { transform:rotate(-90deg); }
      65% { transform:rotate(-90deg); }
      100%{ transform:rotate(0deg); }
    }
    .rotateTitle{
      font-family:'Bowlby One',sans-serif;
      font-size:clamp(22px,6vw,34px);
      letter-spacing:2px; color:#fff; margin:0;
      text-shadow:0 0 30px rgba(255,140,255,.8),0 0 60px rgba(255,80,200,.4);
    }
    .rotateSub{ font-size:16px; color:rgba(255,255,255,.65); margin:0; line-height:1.7; }
    .rotateGlow{
      width:140px; height:4px; border-radius:999px; margin:0 auto;
      background:linear-gradient(90deg,var(--pink),var(--blue),var(--pink));
      background-size:200%; animation:shimmer 2s linear infinite;
      box-shadow:0 0 16px rgba(255,59,189,.5);
    }
    @keyframes shimmer{ 0%{ background-position:0% } 100%{ background-position:200% } }

    /* ══ SHARED OVERLAY ══ */
    .overlay{
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:clamp(14px,3.5vmin,30px);
      padding:
        calc(28px + var(--safe-top))
        calc(28px + var(--safe-right))
        calc(28px + var(--safe-bottom))
        calc(28px + var(--safe-left));
      background:radial-gradient(ellipse at center,
        rgba(0,0,0,.50) 0%,rgba(0,0,0,.84) 62%,rgba(0,0,0,.97) 100%);
      backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
      text-align:center; z-index:40;
      transition:opacity 550ms ease;
    }
    .overlay.hidden{ opacity:0; pointer-events:none; }
    .overlay.gone{ display:none; }
    .overlayHeading{
      font-family:'Bowlby One',sans-serif;
      font-size:clamp(20px,4.5vw,46px);
      letter-spacing:2px; margin:0; color:#fff; line-height:1.2;
      text-shadow:0 0 32px rgba(255,140,255,.7),0 0 80px rgba(255,80,200,.35),0 2px 8px rgba(0,0,0,.9);
    }
    .btnRow{ display:flex; gap:clamp(10px,3vmin,20px); flex-wrap:wrap; justify-content:center; align-items:center; }
    .btnPink,.btnBlue{
      appearance:none; border:0; border-radius:999px;
      padding:clamp(11px,2.5vmin,15px) clamp(20px,5vmin,30px);
      font-size:clamp(15px,3.8vmin,20px); font-weight:1000; letter-spacing:.5px;
      cursor:pointer; color:#000;
      -webkit-tap-highlight-color:transparent; transform:translateZ(0); min-width:80px;
    }
    .btnPink{
      background:linear-gradient(180deg,var(--pink2),var(--pink));
      box-shadow:0 8px 20px rgba(255,59,189,.28),0 0 0 2px rgba(255,59,189,.18),0 0 26px rgba(255,59,189,.38);
    }
    .btnPink:active{ transform:scale(.96); }
    .btnBlue{
      background:linear-gradient(180deg,var(--blue2),var(--blue));
      box-shadow:0 8px 20px rgba(59,200,255,.28),0 0 0 2px rgba(59,200,255,.18),0 0 26px rgba(59,200,255,.38);
    }
    .btnBlue:active{ transform:scale(.96); }

    /* ══ SPARKLES (DOM) ══ */
    .sparkleWrap{ position:relative; display:inline-flex; align-items:center; justify-content:center; }
    .sparkleField{ position:absolute; inset:-50px; pointer-events:none; }
    .sp{
      position:absolute; border-radius:50%; background:#fff; opacity:0;
      animation:sparkleLife var(--dur) ease-in-out var(--delay) infinite;
      width:var(--size); height:var(--size); top:var(--y); left:var(--x);
      box-shadow:0 0 4px 1px rgba(255,255,255,.9),0 0 10px 3px rgba(255,100,220,.6);
    }
    @keyframes sparkleLife{
      0%  { opacity:0;   transform:scale(.4) translateY(0); }
      20% { opacity:1;   transform:scale(1)  translateY(-6px); }
      60% { opacity:.85; transform:scale(.9) translateY(-14px); }
      100%{ opacity:0;   transform:scale(.3) translateY(-22px); }
    }
    #overlay1{ z-index:50; }

    /* ══ VIDEO ══ */
    #videoWrap{ position:absolute; inset:0; display:none; background:#000; z-index:20; }
    #videoWrap.show{ display:block; }
    #toMazeVideo{ width:100%; height:100%; object-fit:cover; background:#000; }

    /* ══ OVERLAY 2 ══ */
    #overlay2{ z-index:45; display:none; }
    #overlay2.show{ display:flex; }
    .ghostBtnWrap{
      position:relative; display:inline-flex; align-items:center; justify-content:center;
      background:none; border:none; padding:0; cursor:pointer; -webkit-tap-highlight-color:transparent;
    }
    .ghostBtnWrap:active #startGhost{
      transform:scale(.88) translateY(-5px);
      filter:drop-shadow(0 0 44px rgba(255,100,220,1)) drop-shadow(0 14px 30px rgba(0,0,0,.7));
    }
    .ghostSparkleField{ position:absolute; inset:-70px; pointer-events:none; z-index:0; }
    .ghostSparkleField .sp{
      box-shadow:0 0 6px 2px rgba(255,255,255,.95),0 0 16px 5px rgba(255,100,220,.75);
    }
    #startGhost{
      width:clamp(100px,28vmin,200px); height:clamp(100px,28vmin,200px);
      object-fit:contain; user-select:none; -webkit-user-drag:none;
      filter:drop-shadow(0 0 26px rgba(255,100,220,.6)) drop-shadow(0 14px 30px rgba(0,0,0,.7));
      animation:floaty 3.6s ease-in-out infinite;
      transform-origin:50% 60%; transition:transform 120ms ease, filter 120ms ease;
      position:relative; z-index:1;
    }
    @keyframes floaty{
      0%  { transform:translateY(0px); }
      50% { transform:translateY(-8px); }
      100%{ transform:translateY(0px); }
    }

    /* ══ MAZE SCENE ══ */
    #mazeScene{ position:absolute; inset:0; background:#000; }
    #stage{ position:absolute; inset:0; overflow:hidden; }
    #mazeImg{
      display:block; position:absolute; inset:0;
      width:100%; height:100%; object-fit:cover; object-position:center center;
      user-select:none; -webkit-user-drag:none; pointer-events:none;
    }
    #mazeCanvas{
      position:absolute; left:0; top:0; z-index:6; cursor:default;
    }
    #mazeCanvas.bryan{ cursor:crosshair; }
    #grid{
      position:absolute; inset:0; display:none; pointer-events:none; z-index:7;
      background-image:
        linear-gradient(to right,rgba(255,255,255,.12) 1px,transparent 1px),
        linear-gradient(to bottom,rgba(255,255,255,.12) 1px,transparent 1px);
      background-size:80px 80px; mix-blend-mode:screen; opacity:.55;
    }
    #grid.show{ display:block; }

    /* ══ HUD (desktop only) ══ */
    .hudTitle{
      font-family:'Bowlby One',sans-serif; font-size:clamp(13px,1.8vw,18px);
      letter-spacing:2px; line-height:1.15; color:#fff;
      text-shadow:0 0 22px rgba(255,140,255,.7),0 0 60px rgba(255,80,200,.35),0 2px 6px rgba(0,0,0,.9);
      user-select:none; pointer-events:none;
    }
    #hud{
      position:absolute;
      left:calc(12px + var(--safe-left)); top:calc(12px + var(--safe-top));
      display:flex; gap:10px; align-items:flex-start; z-index:10;
    }
    .pill{
      border-radius:999px; padding:10px 14px; font-weight:900; letter-spacing:.4px;
      background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.16);
      backdrop-filter:blur(14px) saturate(140%); -webkit-backdrop-filter:blur(14px) saturate(140%);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.08),0 14px 30px rgba(0,0,0,.35);
      color:rgba(255,255,255,.92); user-select:none;
    }
    #coordPill{ display:none; } #coordPill.show{ display:block; }
    .coordSmall{ font-size:12px; color:rgba(255,255,255,.7); font-weight:800; letter-spacing:1px; }
    .coordBig  { font-size:14px; margin-top:4px; }

    /* ══ BRYAN BUTTON ══ */
    #bryanBtn{
      position:absolute;
      left:calc(10px + var(--safe-left)); bottom:calc(10px + var(--safe-bottom));
      z-index:20; border-radius:999px;
      padding:6px 10px; font-size:9px; font-weight:1000; letter-spacing:1.4px;
      text-transform:uppercase; color:rgba(255,255,255,.45);
      background:rgba(0,0,0,.30); border:1px solid rgba(255,255,255,.10);
      backdrop-filter:blur(10px) saturate(140%); -webkit-backdrop-filter:blur(10px) saturate(140%);
      cursor:pointer; -webkit-tap-highlight-color:transparent;
    }
    #bryanBtn.on{
      color:#fff; border-color:rgba(255,255,255,.22);
      box-shadow:0 0 0 2px rgba(255,59,189,.18),0 0 18px rgba(255,59,189,.25);
    }
    #bryanBtn:active{ transform:scale(.96); }

    /* ══ BACK BUTTON ══ */
    #backBtn{
      position:absolute;
      right:calc(8px + var(--safe-right)); bottom:calc(8px + var(--safe-bottom));
      z-index:20; appearance:none; border:0; border-radius:999px;
      padding:5px 12px; font-size:11px; font-weight:1000; letter-spacing:.5px;
      cursor:pointer; color:#000;
      background:linear-gradient(180deg,var(--pink2),var(--pink));
      box-shadow:0 4px 10px rgba(255,59,189,.28),0 0 0 1px rgba(255,59,189,.15),0 0 14px rgba(255,59,189,.28);
      opacity:0.75; -webkit-tap-highlight-color:transparent; transform:translateZ(0); transition:opacity 200ms;
    }
    #backBtn:hover{ opacity:1; }
    #backBtn:active{ transform:scale(.96); opacity:1; }
    @media (min-width:900px) and (pointer:fine){
      #backBtn{ padding:7px 14px; font-size:12px; opacity:0.85; }
      #bryanBtn{ padding:8px 12px; font-size:10px; color:rgba(255,255,255,.6); }
    }
    @media (pointer:coarse){ .hudTitle,.bryanBtn{ display:none; } #hud{ display:none; } }
    #app.inTransition #bryanBtn,
    #app.inTransition #hud,
    #app.inTransition #backBtn{ display:none !important; }

    /* ══ CHECKPOINT POPUP ══ */
    #cpPopup{
      position:fixed; z-index:50;
      min-width:220px; max-width:300px;
      background:linear-gradient(145deg,rgba(10,4,28,.97),rgba(4,10,36,.97));
      border-radius:22px; padding:24px 28px 20px;
      backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
      text-align:center;
      border:1px solid rgba(255,255,255,.13);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.06),
        0 24px 70px rgba(0,0,0,.75),
        0 0 60px rgba(180,60,255,.18),
        inset 0 1px 0 rgba(255,255,255,.10);
      display:none; pointer-events:auto;
      transform:translate(-50%,-100%);
      animation:popIn 320ms cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn{
      from{ opacity:0; transform:translate(-50%,-90%) scale(.85); }
      to  { opacity:1; transform:translate(-50%,-100%) scale(1); }
    }
    #cpPopup.show{ display:block; }
    .cpPopupGem{
      font-size:28px; margin-bottom:6px; display:block;
      animation:gemSpin 6s linear infinite;
    }
    @keyframes gemSpin{ to{ filter:hue-rotate(360deg); } }
    #cpPopup h2{
      font-family:'Bowlby One',sans-serif; font-size:clamp(15px,2.8vw,22px);
      letter-spacing:1px; margin:0 0 6px; color:#fff;
      text-shadow:0 0 18px rgba(200,140,255,.8);
    }
    #cpPopup p{ font-size:13px; color:rgba(255,255,255,.55); margin:0 0 18px; line-height:1.55; }
    #cpCloseBtn{
      appearance:none; border:0; border-radius:999px;
      padding:9px 22px; font-size:13px; font-weight:900; cursor:pointer; color:#000;
      background:linear-gradient(180deg,var(--pink2),var(--pink));
      box-shadow:0 4px 16px rgba(255,59,189,.4),0 0 24px rgba(255,59,189,.2);
      transition:transform 100ms;
    }
    #cpCloseBtn:active{ transform:scale(.95); }

    /* ══ FADE ══ */
    #fade{
      position:fixed; inset:0; background:#000; opacity:0;
      pointer-events:none; transition:opacity 520ms ease; z-index:200;
    }
    #fade.on{ opacity:1; }
    @media (prefers-reduced-motion:reduce){
      #startGhost{ animation:none; }
      .rotateIcon{ animation:none; transform:rotate(-90deg); }
      #fade{ transition:none; }
      .sp{ animation:none; opacity:.6; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ROTATE OVERLAY -->
  <div id="rotateOverlay" role="alert" aria-live="polite">
    <span class="rotateIcon">📱</span>
    <div class="rotateGlow"></div>
    <h1 class="rotateTitle">よこにしてね！</h1>
    <p class="rotateSub">めいろをあそぶには<br>スマホを<strong style="color:#ff79d7">よこむき</strong>にしてください</p>
  </div>

  <!-- OVERLAY 1 -->
  <div id="overlay1" class="overlay" aria-label="めいろへいく？">
    <h1 class="overlayHeading">ブーハーめいろにいく？</h1>
    <div class="btnRow">
      <button id="returnBtn" class="btnBlue" type="button">いかない</button>
      <div class="sparkleWrap">
        <div class="sparkleField" id="confirmSparkles" aria-hidden="true"></div>
        <button id="continueBtn" class="btnPink" type="button">いく！</button>
      </div>
    </div>
  </div>

  <!-- TRANSITION VIDEO -->
  <div id="videoWrap" aria-hidden="true">
    <video id="toMazeVideo" preload="auto" playsinline webkit-playsinline>
      <source src="assets/video/to-the-maze.mp4" type="video/mp4" />
    </video>
  </div>

  <!-- OVERLAY 2 -->
  <div id="overlay2" class="overlay" aria-label="スタート">
    <h1 class="overlayHeading">ブーハーをタッチしてはじめよう！</h1>
    <button id="mazeStartBtn" class="ghostBtnWrap" type="button" aria-label="スタート">
      <div class="ghostSparkleField" id="startSparkles" aria-hidden="true"></div>
      <img id="startGhost" alt="ブーハー" />
    </button>
  </div>

  <!-- MAZE SCENE -->
  <section id="mazeScene" aria-label="めいろ">
    <div id="stage">
      <img id="mazeImg" src="assets/img/maze.png" alt="めいろ" />
      <canvas id="mazeCanvas"></canvas>
      <div id="grid"></div>
    </div>

    <!-- Checkpoint popup -->
    <div id="cpPopup" role="dialog" aria-modal="true">
      <span class="cpPopupGem" id="cpPopupGem">✨</span>
      <h2 id="cpPopupTitle">Week —</h2>
      <p id="cpPopupBody">コンテンツはここにはいります！</p>
      <button id="cpCloseBtn" type="button">とじる ✕</button>
    </div>

    <!-- HUD (desktop only) -->
    <div id="hud">
      <div class="hudTitle">BOOHA<br>ADVENTURE</div>
      <div id="coordPill" class="pill">
        <div class="coordSmall">COORDINATES</div>
        <div class="coordBig" id="coordText">x: —  y: —</div>
        <div class="coordSmall" style="margin-top:6px;opacity:.9;">click to copy</div>
      </div>
    </div>

    <button id="bryanBtn" type="button" aria-label="Bryan mode">BRYAN</button>
    <button id="backBtn" type="button" aria-label="もどる">もどる</button>
  </section>

  <div id="fade" aria-hidden="true"></div>
</div>

<audio id="bgMusic" src="assets/audio/sneaky.mp3" loop preload="auto"></audio>

<script>
// ─────────────────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────────────────
const BRYAN_PASS      = 'him141amra803';
const IMG_W           = 1600;
const IMG_H           = 900;
const OPEN_WEEKS      = [8, 9, 10];
const CURRENT_WEEK    = 10;
const GHOST_TRAVEL_MS = 3800;   // slowed way down
const INTRO_GLOW_MS   = 2600;
const INTRO_TRAVEL_MS = 3200;

const GHOSTS = [
  'assets/img/booha_ghost.png','assets/img/blue-boo.png',
  'assets/img/green-boo.png','assets/img/pink-boo.png','assets/img/purple-boo.png'
];

// Month gem icons for popup
const MONTH_GEMS = ['💎','🔮','⭐','🌿','🩵','🌀','🟣','🌸','🧡','🌊','💚','❤️'];

const MONTH_COLORS = [
  '#ff3bbd','#ff6b3b','#ffd700','#3bff8a',
  '#3bc8ff','#3b6fff','#a03bff','#ff3b6f',
  '#ff9f3b','#3bffee','#c8ff3b','#ff3b3b'
];

// ── Corrected coordinates (+73 x offset applied) ──
const CHECKPOINTS = [
  {w: 1, ix: 512, iy:406},{w: 2, ix:1319, iy:509},{w: 3, ix:1219, iy:383},
  {w: 4, ix: 952, iy:504},{w: 5, ix: 635, iy:428},{w: 6, ix: 596, iy:648},
  {w: 7, ix:1219, iy:551},{w: 8, ix:1089, iy:406},{w: 9, ix:1046, iy:652},
  {w:10, ix: 453, iy:546},{w:11, ix:1189, iy:616},{w:12, ix: 755, iy:615},
  {w:13, ix: 938, iy:405},{w:14, ix: 592, iy:485},{w:15, ix: 912, iy:681},
  {w:16, ix: 816, iy:444},{w:17, ix:1204, iy:448},{w:18, ix: 444, iy:593},
  {w:19, ix: 761, iy:405},{w:20, ix:1200, iy:504},{w:21, ix: 716, iy:487},
  {w:22, ix:1302, iy:446},{w:23, ix: 872, iy:553},{w:24, ix: 446, iy:437},
  {w:25, ix:1010, iy:463},{w:26, ix: 613, iy:533},{w:27, ix:1127, iy:504},
  {w:28, ix: 578, iy:438},{w:29, ix:1095, iy:553},{w:30, ix: 500, iy:489},
  {w:31, ix: 770, iy:684},{w:32, ix:1079, iy:612},{w:33, ix: 898, iy:403},
  {w:34, ix: 715, iy:645},{w:35, ix:1141, iy:461},{w:36, ix: 560, iy:533},
  {w:37, ix:1164, iy:651},{w:38, ix: 682, iy:577},{w:39, ix: 996, iy:612},
  {w:40, ix: 541, iy:619},{w:41, ix:1258, iy:589},{w:42, ix: 817, iy:513},
  {w:43, ix:1161, iy:382},{w:44, ix: 716, iy:442},{w:45, ix:1055, iy:504},
  {w:46, ix: 836, iy:612},{w:47, ix: 442, iy:479},{w:48, ix:1259, iy:513}
];

function monthIdx(w)   { return Math.floor((w-1)/4); }
function monthColor(w) { return MONTH_COLORS[monthIdx(w)]; }
function monthGem(w)   { return MONTH_GEMS[monthIdx(w)]; }

// ─────────────────────────────────────────────────────────
//  DOM
// ─────────────────────────────────────────────────────────
const app           = document.getElementById('app');
const rotateOverlay = document.getElementById('rotateOverlay');
const overlay1      = document.getElementById('overlay1');
const overlay2      = document.getElementById('overlay2');
const videoWrap     = document.getElementById('videoWrap');
const toMazeVideo   = document.getElementById('toMazeVideo');
const returnBtn     = document.getElementById('returnBtn');
const continueBtn   = document.getElementById('continueBtn');
const mazeStartBtn  = document.getElementById('mazeStartBtn');
const startGhost    = document.getElementById('startGhost');
const confirmSp     = document.getElementById('confirmSparkles');
const startSp       = document.getElementById('startSparkles');
const fade          = document.getElementById('fade');
const bgMusic       = document.getElementById('bgMusic');
const mazeImg       = document.getElementById('mazeImg');
const canvas        = document.getElementById('mazeCanvas');
const gridEl        = document.getElementById('grid');
const bryanBtn      = document.getElementById('bryanBtn');
const backBtn       = document.getElementById('backBtn');
const coordPill     = document.getElementById('coordPill');
const coordText     = document.getElementById('coordText');
const cpPopup       = document.getElementById('cpPopup');
const cpTitle       = document.getElementById('cpPopupTitle');
const cpBody        = document.getElementById('cpPopupBody');
const cpGem         = document.getElementById('cpPopupGem');
const cpCloseBtn    = document.getElementById('cpCloseBtn');
const FADE_MS       = 520;

// ─────────────────────────────────────────────────────────
//  CANVAS / DPR
//  ctx.setTransform(DPR) called ONCE per resize only.
//  All draw calls use plain CSS-pixel coordinates.
// ─────────────────────────────────────────────────────────
const ctx = canvas.getContext('2d');
let cssW = 1, cssH = 1;

function resizeCanvas(){
  const dpr  = window.devicePixelRatio || 1;
  const rect = document.getElementById('stage').getBoundingClientRect();
  cssW = rect.width  || window.innerWidth;
  cssH = rect.height || window.innerHeight;
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';
  canvas.width  = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ─────────────────────────────────────────────────────────
//  COORDINATE TRANSFORMS (object-fit:cover)
// ─────────────────────────────────────────────────────────
function getCover(){
  const scale = Math.max(cssW / IMG_W, cssH / IMG_H);
  return { scale, ox:(IMG_W*scale-cssW)/2, oy:(IMG_H*scale-cssH)/2 };
}
function imgToCSS(ix, iy){
  const {scale,ox,oy} = getCover();
  return { x: ix*scale-ox, y: iy*scale-oy };
}
function cssToImg(cx, cy){
  const {scale,ox,oy} = getCover();
  return {
    ix: Math.round(Math.max(0, Math.min((cx+ox)/scale, IMG_W))),
    iy: Math.round(Math.max(0, Math.min((cy+oy)/scale, IMG_H)))
  };
}

// ─────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────
let mazeStarted = false;
let bryanOn     = false;
let activeWeek  = CURRENT_WEEK;

// introPhase: 'idle' | 'allGlow' | 'traveling' | 'done'
let introPhase       = 'idle';
let introGlowStart   = 0;
let introTravelStart = 0;
let introSrcIX = 0, introSrcIY = 0;

const startCP  = CHECKPOINTS.find(c => c.w === CURRENT_WEEK);
let ghostIX    = startCP.ix, ghostIY = startCP.iy;
let ghostSrcIX = ghostIX,    ghostSrcIY = ghostIY;
let ghostDstIX = ghostIX,    ghostDstIY = ghostIY;
let ghostT     = 1;
let ghostAnimStart   = 0;
let pendingPopupCP   = null;  // checkpoint to show popup when ghost arrives

// Trail
let trail = [];

// Per-checkpoint sparkle offsets (for the magical aura particles)
const CP_PARTICLES = CHECKPOINTS.map(cp => {
  return Array.from({length: 8}, (_, i) => ({
    angle:  (i / 8) * Math.PI * 2 + Math.random() * 0.4,
    radius: 18 + Math.random() * 14,
    speed:  0.5 + Math.random() * 0.8,
    phase:  Math.random() * Math.PI * 2,
    size:   1.5 + Math.random() * 2
  }));
});

// Bryan crosshair
let bMouseX = -1, bMouseY = -1;
let rafHandle = null;

// ─────────────────────────────────────────────────────────
//  EASING
// ─────────────────────────────────────────────────────────
function ease(t){ return t<.5 ? 2*t*t : -1+(4-2*t)*t; }

// ─────────────────────────────────────────────────────────
//  TRAIL
// ─────────────────────────────────────────────────────────
function addTrail(ix, iy){
  const color = monthColor(activeWeek);
  trail.push({ ix, iy, life:1, size:2+Math.random()*6, color,
    dx:(Math.random()-.5)*.3, dy:-Math.random()*.4 });
  if(trail.length > 100) trail.shift();
}

// ─────────────────────────────────────────────────────────
//  DRAW
// ─────────────────────────────────────────────────────────
function drawFrame(now){
  ctx.clearRect(0, 0, cssW, cssH);
  if(!mazeStarted) return;

  const sec = now / 1000;

  // ── Build cpState ─────────────────────────────────────
  const cpState = {}; // week → {alpha, extra, color}

  if(introPhase === 'allGlow'){
    const el     = now - introGlowStart;
    const showEnd= INTRO_GLOW_MS * 0.62;
    let baseA    = el < showEnd ? 1 : Math.max(0, 1-(el-showEnd)/(INTRO_GLOW_MS-showEnd));
    CHECKPOINTS.forEach(cp => {
      const open = OPEN_WEEKS.includes(cp.w);
      cpState[cp.w] = { alpha: open ? 1 : baseA*0.8, extra:1.4, color:monthColor(cp.w) };
    });
    if(el >= INTRO_GLOW_MS){
      introPhase       = 'traveling';
      introTravelStart = now;
      introSrcIX = CHECKPOINTS[0].ix;
      introSrcIY = CHECKPOINTS[0].iy;
      ghostIX    = introSrcIX;
      ghostIY    = introSrcIY;
    }

  } else if(introPhase === 'traveling'){
    OPEN_WEEKS.forEach(w => { cpState[w]={alpha:1,extra:0.9,color:monthColor(w)}; });
    const prog = Math.min((now-introTravelStart)/INTRO_TRAVEL_MS, 1);
    const et   = ease(prog);
    ghostIX = introSrcIX + (startCP.ix-introSrcIX)*et;
    ghostIY = introSrcIY + (startCP.iy-introSrcIY)*et;
    if(Math.random()<.35) addTrail(ghostIX, ghostIY);
    if(prog >= 1){
      introPhase = 'done'; ghostIX=startCP.ix; ghostIY=startCP.iy;
      ghostSrcIX=ghostIX; ghostSrcIY=ghostIY;
      ghostDstIX=ghostIX; ghostDstIY=ghostIY; ghostT=1;
    }

  } else {
    // Normal / done
    OPEN_WEEKS.forEach(w => { cpState[w]={alpha:1,extra:0,color:monthColor(w)}; });
    if(bryanOn){
      CHECKPOINTS.forEach(cp => {
        if(!cpState[cp.w]) cpState[cp.w]={alpha:0.68,extra:0.2,color:monthColor(cp.w)};
      });
    }
    // Ghost travel
    if(ghostT < 1){
      const el = now - ghostAnimStart;
      ghostT   = Math.min(el / GHOST_TRAVEL_MS, 1);
      const et = ease(ghostT);
      ghostIX  = ghostSrcIX + (ghostDstIX-ghostSrcIX)*et;
      ghostIY  = ghostSrcIY + (ghostDstIY-ghostSrcIY)*et;
      if(Math.random()<.3) addTrail(ghostIX, ghostIY);
      // Fire popup when ghost arrives
      if(ghostT >= 1 && pendingPopupCP){
        ghostIX = ghostDstIX; ghostIY = ghostDstIY;
        showPopupAtCP(pendingPopupCP);
        pendingPopupCP = null;
      }
    }
  }

  // ── Trail ─────────────────────────────────────────────
  for(let i=trail.length-1; i>=0; i--){
    const p      = trail[i];
    const {x, y} = imgToCSS(p.ix, p.iy);
    const gr = ctx.createRadialGradient(x,y,0,x,y,p.size*2.5);
    gr.addColorStop(0, p.color); gr.addColorStop(1,'transparent');
    ctx.globalAlpha = p.life * 0.45;
    ctx.fillStyle = gr;
    ctx.beginPath(); ctx.arc(x,y,p.size*2.5,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = p.life * 0.85;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x,y,p.size*0.38,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    p.life -= 0.016; p.ix+=p.dx; p.iy+=p.dy;
  }
  trail = trail.filter(p=>p.life>0);

  // ── Checkpoints ───────────────────────────────────────
  CHECKPOINTS.forEach((cp, cpIdx) => {
    const state = cpState[cp.w];
    if(!state || state.alpha <= 0.01) return;

    const {x, y} = imgToCSS(cp.ix, cp.iy);
    const color  = state.color;
    const pulse  = 0.5 + 0.5*Math.sin(sec*2.2 + cp.w*0.71);
    const pulse2 = 0.5 + 0.5*Math.sin(sec*1.4 + cp.w*0.43 + 1.2);
    const baseR  = 11;
    const glowR  = baseR + pulse*5*(1+state.extra*0.7);
    const alpha  = state.alpha;

    ctx.save();

    // ── Layer 1: Deep outer atmospheric haze ────────────
    ctx.globalAlpha = alpha * (0.12 + pulse*0.10);
    const hazeR = glowR * 4.5;
    const haze  = ctx.createRadialGradient(x,y,0,x,y,hazeR);
    haze.addColorStop(0, color); haze.addColorStop(0.4, color); haze.addColorStop(1,'transparent');
    ctx.fillStyle = haze;
    ctx.beginPath(); ctx.arc(x,y,hazeR,0,Math.PI*2); ctx.fill();

    // ── Layer 2: Mid glow ring ───────────────────────────
    ctx.globalAlpha = alpha * (0.35 + pulse2*0.20);
    const midR  = glowR * 2.2;
    const midG  = ctx.createRadialGradient(x,y,glowR*0.4,x,y,midR);
    midG.addColorStop(0,'transparent'); midG.addColorStop(0.3, color); midG.addColorStop(1,'transparent');
    ctx.fillStyle = midG;
    ctx.beginPath(); ctx.arc(x,y,midR,0,Math.PI*2); ctx.fill();

    // ── Layer 3: Inner corona ────────────────────────────
    ctx.globalAlpha = alpha * (0.65 + pulse*0.25);
    const coronaR = glowR * 1.15;
    const corona  = ctx.createRadialGradient(x,y,0,x,y,coronaR);
    corona.addColorStop(0,'#fff'); corona.addColorStop(0.25, color);
    corona.addColorStop(0.7, color); corona.addColorStop(1,'transparent');
    ctx.fillStyle = corona;
    ctx.beginPath(); ctx.arc(x,y,coronaR,0,Math.PI*2); ctx.fill();

    // ── Layer 4: Solid gem dot ───────────────────────────
    ctx.globalAlpha = alpha * (0.92 + pulse*0.08);
    ctx.shadowBlur  = 22; ctx.shadowColor = color;
    ctx.fillStyle   = color;
    ctx.beginPath(); ctx.arc(x,y,glowR*0.46,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur  = 0;

    // ── Layer 5: Bright white core ───────────────────────
    ctx.globalAlpha = alpha;
    const coreG = ctx.createRadialGradient(x,y,0,x,y,glowR*0.22);
    coreG.addColorStop(0,'rgba(255,255,255,1)'); coreG.addColorStop(0.6,'rgba(255,255,255,.8)');
    coreG.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle = coreG;
    ctx.beginPath(); ctx.arc(x,y,glowR*0.22,0,Math.PI*2); ctx.fill();

    // ── Layer 6: Orbiting sparkle particles ─────────────
    const particles = CP_PARTICLES[cpIdx];
    particles.forEach(p => {
      const angle  = p.angle + sec * p.speed + p.phase;
      const osc    = 0.75 + 0.25*Math.sin(sec*1.8 + p.phase);
      const r      = p.radius * (0.85 + state.extra*0.12) * osc;
      const px2    = x + Math.cos(angle)*r*(cssW/1000);
      const py2    = y + Math.sin(angle)*r*(cssH/700);
      const pAlpha = (0.55 + 0.45*Math.sin(sec*2.1+p.phase)) * alpha;
      ctx.globalAlpha = pAlpha;
      ctx.fillStyle = '#fff';
      ctx.shadowBlur = 6; ctx.shadowColor = color;
      ctx.beginPath(); ctx.arc(px2, py2, p.size * (0.8+pulse*0.4), 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    });

    // ── Layer 7: 4-point star burst ──────────────────────
    ctx.globalAlpha = alpha * (0.45 + pulse*0.35);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth   = 1.2;
    ctx.shadowBlur  = 10; ctx.shadowColor = color;
    const starLen   = glowR * (1.3 + pulse*0.5);
    [[0,starLen],[0,-starLen],[starLen,0],[-starLen,0]].forEach(([dx,dy])=>{
      ctx.beginPath();
      ctx.moveTo(x + dx*0.2, y + dy*0.2);
      ctx.lineTo(x + dx, y + dy);
      ctx.stroke();
    });
    ctx.shadowBlur = 0;

    // ── Layer 8: Week label ──────────────────────────────
    if(OPEN_WEEKS.includes(cp.w) || bryanOn){
      const fs = Math.max(8, Math.round(glowR * 0.78));
      ctx.globalAlpha    = alpha * 0.97;
      ctx.font           = `900 ${fs}px system-ui,sans-serif`;
      ctx.textAlign      = 'center';
      ctx.textBaseline   = 'top';
      ctx.fillStyle      = '#fff';
      ctx.shadowBlur     = 7; ctx.shadowColor = color;
      ctx.fillText(cp.w, x, y + glowR*0.56);
      ctx.shadowBlur = 0;
    }

    ctx.globalAlpha = 1;
    ctx.restore();
  });

  // ── Ghost ─────────────────────────────────────────────
  const bob       = Math.sin(sec * 1.85) * 3.5;
  const {x:gx, y:gy} = imgToCSS(ghostIX, ghostIY);
  const gR        = 30;

  // Outer aura (color of active month)
  ctx.save();
  const ghostColor = monthColor(activeWeek);
  const pulseG     = 0.5 + 0.5*Math.sin(sec*2.3);
  ctx.globalAlpha  = 0.28 + pulseG*0.14;
  const ga = ctx.createRadialGradient(gx,gy+4,0,gx,gy+4,gR*2.0);
  ga.addColorStop(0, ghostColor); ga.addColorStop(1,'transparent');
  ctx.fillStyle = ga;
  ctx.beginPath(); ctx.arc(gx, gy+4, gR*2.0, 0, Math.PI*2); ctx.fill();
  // Shadow blob
  ctx.globalAlpha = 0.18 + pulseG*0.08;
  const gsa = ctx.createRadialGradient(gx,gy+gR*0.7,0,gx,gy+gR*0.7,gR*1.0);
  gsa.addColorStop(0,'rgba(0,0,0,0.6)'); gsa.addColorStop(1,'transparent');
  ctx.fillStyle = gsa;
  ctx.beginPath(); ctx.arc(gx, gy+gR*0.7, gR*1.0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Ghost image
  ctx.save();
  ctx.globalAlpha = 1;
  if(ghostImg.complete && ghostImg.naturalWidth > 0){
    ctx.drawImage(ghostImg, gx-gR, gy-gR+bob, gR*2, gR*2);
  } else {
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(gx,gy+bob,gR*0.7,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // ── Bryan crosshair ───────────────────────────────────
  if(bryanOn && bMouseX >= 0){
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth   = 1;
    ctx.shadowBlur  = 8; ctx.shadowColor = 'rgba(255,255,255,.3)';
    ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(0,bMouseY); ctx.lineTo(cssW,bMouseY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bMouseX,0); ctx.lineTo(bMouseX,cssH); ctx.stroke();
    ctx.restore();
  }
}

// ─────────────────────────────────────────────────────────
//  RAF LOOP
// ─────────────────────────────────────────────────────────
function loop(now){ drawFrame(now); rafHandle = requestAnimationFrame(loop); }
function startLoop(){ if(!rafHandle) rafHandle = requestAnimationFrame(loop); }

// ─────────────────────────────────────────────────────────
//  HIT TEST
// ─────────────────────────────────────────────────────────
const HIT_R = 44;
function hitTest(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const cx   = clientX - rect.left;
  const cy   = clientY - rect.top;
  const {ix,iy} = cssToImg(cx, cy);
  const pool = bryanOn ? CHECKPOINTS : CHECKPOINTS.filter(c=>OPEN_WEEKS.includes(c.w));
  let best=null, bestD=Infinity;
  pool.forEach(cp => {
    const d = Math.hypot(cp.ix-ix, cp.iy-iy);
    if(d < HIT_R && d < bestD){ bestD=d; best=cp; }
  });
  return best;
}

// ─────────────────────────────────────────────────────────
//  CANVAS EVENTS
// ─────────────────────────────────────────────────────────
canvas.addEventListener('click', e => {
  if(!mazeStarted) return;
  if(introPhase==='allGlow' || introPhase==='traveling') return;

  // Bryan coord pick
  if(bryanOn){
    const rect=canvas.getBoundingClientRect();
    const cx=e.clientX-rect.left, cy=e.clientY-rect.top;
    const {ix,iy}=cssToImg(cx,cy);
    coordText.textContent=`x: ${ix}  y: ${iy}`;
    copyText(`${ix},${iy}`).then(ok=>{
      if(ok){coordPill.style.transform='scale(1.04)';setTimeout(()=>coordPill.style.transform='',130);}
    });
  }

  const cp = hitTest(e.clientX, e.clientY);
  if(cp) startGhostTravel(cp);
});

canvas.addEventListener('touchend', e => {
  if(!mazeStarted) return;
  if(introPhase==='allGlow'||introPhase==='traveling') return;
  if(!e.changedTouches.length) return;
  const t0 = e.changedTouches[0];
  const cp = hitTest(t0.clientX, t0.clientY);
  if(cp){ startGhostTravel(cp); e.preventDefault(); }
},{passive:false});

canvas.addEventListener('mousemove', e => {
  if(!bryanOn) return;
  const rect=canvas.getBoundingClientRect();
  bMouseX=e.clientX-rect.left; bMouseY=e.clientY-rect.top;
  const {ix,iy}=cssToImg(bMouseX,bMouseY);
  coordText.textContent=`x: ${ix}  y: ${iy}`;
});
canvas.addEventListener('mouseleave',()=>{ bMouseX=-1; bMouseY=-1; });

function startGhostTravel(cp){
  // Close any open popup immediately
  cpPopup.classList.remove('show');
  ghostSrcIX = ghostIX; ghostSrcIY = ghostIY;
  ghostDstIX = cp.ix;   ghostDstIY = cp.iy;
  ghostT     = 0;
  ghostAnimStart = performance.now();
  activeWeek     = cp.w;
  pendingPopupCP = cp;  // will fire when ghost arrives
}

// ─────────────────────────────────────────────────────────
//  POPUP  (shown when ghost arrives)
// ─────────────────────────────────────────────────────────
function showPopupAtCP(cp){
  cpTitle.textContent = `Week ${cp.w}`;
  cpBody.textContent  = `Week ${cp.w} のコンテンツはここにはいります！（準備中...）`;
  cpGem.textContent   = monthGem(cp.w);

  // Position above the checkpoint dot on screen
  const {x,y} = imgToCSS(cp.ix, cp.iy);
  const rect   = canvas.getBoundingClientRect();
  const absX   = rect.left + x;
  const absY   = rect.top  + y;
  const margin = 18, halfW = 150;
  const px = Math.min(Math.max(absX, halfW+margin), window.innerWidth-halfW-margin);
  const py = absY - 18;

  cpPopup.classList.remove('show');
  // Force animation replay
  void cpPopup.offsetWidth;
  cpPopup.style.left      = px + 'px';
  cpPopup.style.top       = py + 'px';
  cpPopup.style.transform = 'translate(-50%,-100%)';
  cpPopup.classList.add('show');
}
cpCloseBtn.addEventListener('click', () => cpPopup.classList.remove('show'));

// ─────────────────────────────────────────────────────────
//  BRYAN MODE
// ─────────────────────────────────────────────────────────
function applyBryan(){
  bryanBtn.classList.toggle('on', bryanOn);
  gridEl.classList.toggle('show', bryanOn);
  coordPill.classList.toggle('show', bryanOn);
  canvas.classList.toggle('bryan', bryanOn);
  if(!bryanOn){ bMouseX=-1; bMouseY=-1; coordText.textContent='x: —  y: —'; }
}
bryanBtn.addEventListener('click', ()=>{
  if(bryanOn){ bryanOn=false; applyBryan(); return; }
  const pw = prompt('Bryan mode password:');
  if(pw===null) return;
  if(String(pw).trim()===BRYAN_PASS){ bryanOn=true; applyBryan(); } else alert('Nope.');
});
coordPill.addEventListener('click',()=>{
  const m=coordText.textContent.match(/x:\s*(\d+)\s*y:\s*(\d+)/);
  if(m) copyText(`${m[1]},${m[2]}`);
});
async function copyText(txt){
  try{ await navigator.clipboard.writeText(txt); return true; } catch(e){}
  try{
    const ta=document.createElement('textarea'); ta.value=txt;
    ta.style.cssText='position:fixed;left:-9999px'; document.body.appendChild(ta);
    ta.focus(); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); return true;
  } catch(e){ return false; }
}

// ─────────────────────────────────────────────────────────
//  SPARKLES (DOM)
// ─────────────────────────────────────────────────────────
function buildSparkles(container, count=24, wide=false){
  container.innerHTML='';
  for(let i=0;i<count;i++){
    const sp=document.createElement('div'); sp.className='sp';
    const angle=(i/count)*Math.PI*2;
    const r=wide?35+Math.random()*28:28+Math.random()*18;
    const cx=50+Math.cos(angle)*r, cy=50+Math.sin(angle)*r;
    const size=wide?3+Math.random()*4:2+Math.random()*3;
    const dur=1.3+Math.random()*1.8, delay=-(Math.random()*dur);
    sp.style.cssText=`--size:${size}px;--x:${cx}%;--y:${cy}%;--dur:${dur}s;--delay:${delay}s;`;
    container.appendChild(sp);
  }
}
buildSparkles(confirmSp,24);
buildSparkles(startSp,36,true);

let o2shown=false;
function showOverlay2(){
  if(o2shown) return; o2shown=true;
  try{ toMazeVideo.pause(); toMazeVideo.currentTime=0; } catch(e){}
  videoWrap.classList.remove('show');
  overlay2.classList.add('show');
  app.classList.add('inTransition');
  resizeCanvas();
}
toMazeVideo.addEventListener('ended', showOverlay2);
toMazeVideo.addEventListener('error',  showOverlay2);
toMazeVideo.addEventListener('timeupdate',()=>{
  const d=toMazeVideo.duration;
  if(!isFinite(d)||d<=0) return;
  if(d-toMazeVideo.currentTime<=0.5) showOverlay2();
});

//  OVERLAY 2 → MAZE
// ─────────────────────────────────────────────────────────
let mazeLaunched=false;
mazeStartBtn.addEventListener('click', async ()=>{
  if(mazeLaunched) return; mazeLaunched=true;
  overlay2.classList.add('hidden');
  overlay2.addEventListener('transitionend',()=>overlay2.remove(),{once:true});
  app.classList.remove('inTransition');
  mazeStarted=true;
  ghostIX=CHECKPOINTS[0].ix; ghostIY=CHECKPOINTS[0].iy;

  introGlowStart= performance.now();
  resizeCanvas();
  startLoop();
  try{ bgMusic.volume=0.65; await bgMusic.play(); } catch(e){ console.warn('Music blocked',e); }
});
