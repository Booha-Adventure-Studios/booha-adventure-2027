
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Booha Adventure 2027 — Maze</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&display=swap" rel="stylesheet" />
  <style>
    :root{
      --pink:#ff3bbd; --pink2:#ff79d7;
      --blue:#3bc8ff; --blue2:#79dfff;
      --safe-top:    env(safe-area-inset-top);
      --safe-right:  env(safe-area-inset-right);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left:   env(safe-area-inset-left);
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; background:#000; color:#fff;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,
        "Noto Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; }
    #app{ position:fixed; inset:0; background:#000; overflow:hidden; }

    /* ══ ROTATE OVERLAY ══ */
    #rotateOverlay{
      position:fixed; inset:0; display:none; flex-direction:column;
      align-items:center; justify-content:center; gap:20px;
      background:#000; z-index:9999; text-align:center; padding:32px;
    }
    #rotateOverlay.show{ display:flex; }
    @media screen and (orientation:portrait) and (max-width:1023px){
      #rotateOverlay{ display:flex !important; }
    }
    .rotateIcon{ font-size:72px; display:block; transform-origin:center; animation:rotateHint 2.2s ease-in-out infinite; }
    @keyframes rotateHint{
      0%  { transform:rotate(0deg); } 35%{ transform:rotate(-90deg); }
      65% { transform:rotate(-90deg); } 100%{ transform:rotate(0deg); }
    }
    .rotateTitle{
      font-family:'Bowlby One',sans-serif; font-size:clamp(22px,6vw,34px);
      letter-spacing:2px; color:#fff; margin:0;
      text-shadow:0 0 30px rgba(255,140,255,.8),0 0 60px rgba(255,80,200,.4);
    }
    .rotateSub{ font-size:16px; color:rgba(255,255,255,.65); margin:0; line-height:1.7; }
    .rotateGlow{
      width:140px; height:4px; border-radius:999px; margin:0 auto;
      background:linear-gradient(90deg,var(--pink),var(--blue),var(--pink));
      background-size:200%; animation:shimmer 2s linear infinite;
      box-shadow:0 0 16px rgba(255,59,189,.5);
    }
    @keyframes shimmer{ 0%{ background-position:0% } 100%{ background-position:200% } }

    /* ══ SHARED OVERLAY ══ */
    .overlay{
      position:absolute; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:clamp(14px,3.5vmin,30px);
      padding: calc(28px + var(--safe-top)) calc(28px + var(--safe-right))
               calc(28px + var(--safe-bottom)) calc(28px + var(--safe-left));
      background:radial-gradient(ellipse at center,rgba(0,0,0,.50) 0%,rgba(0,0,0,.84) 62%,rgba(0,0,0,.97) 100%);
      backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
      text-align:center; z-index:40; transition:opacity 550ms ease;
    }
    .overlay.hidden{ opacity:0; pointer-events:none; }
    .overlay.gone{ display:none; }
    .overlayHeading{
      font-family:'Bowlby One',sans-serif; font-size:clamp(20px,4.5vw,46px);
      letter-spacing:2px; margin:0; color:#fff; line-height:1.2;
      text-shadow:0 0 32px rgba(255,140,255,.7),0 0 80px rgba(255,80,200,.35),0 2px 8px rgba(0,0,0,.9);
    }
    .btnRow{ display:flex; gap:clamp(10px,3vmin,20px); flex-wrap:wrap; justify-content:center; align-items:center; }
    .btnPink,.btnBlue{
      appearance:none; border:0; border-radius:999px;
      padding:clamp(11px,2.5vmin,15px) clamp(20px,5vmin,30px);
      font-size:clamp(15px,3.8vmin,20px); font-weight:1000; letter-spacing:.5px;
      cursor:pointer; color:#000; -webkit-tap-highlight-color:transparent;
      transform:translateZ(0); min-width:80px;
    }
    .btnPink{
      background:linear-gradient(180deg,var(--pink2),var(--pink));
      box-shadow:0 8px 20px rgba(255,59,189,.28),0 0 0 2px rgba(255,59,189,.18),0 0 26px rgba(255,59,189,.38);
    }
    .btnPink:active{ transform:scale(.96); }
    .btnBlue{
      background:linear-gradient(180deg,var(--blue2),var(--blue));
      box-shadow:0 8px 20px rgba(59,200,255,.28),0 0 0 2px rgba(59,200,255,.18),0 0 26px rgba(59,200,255,.38);
    }
    .btnBlue:active{ transform:scale(.96); }

    /* ══ DOM SPARKLES ══ */
    .sparkleWrap{ position:relative; display:inline-flex; align-items:center; justify-content:center; }
    .sparkleField{ position:absolute; inset:-50px; pointer-events:none; }
    .sp{
      position:absolute; border-radius:50%; background:#fff; opacity:0;
      animation:sparkleLife var(--dur) ease-in-out var(--delay) infinite;
      width:var(--size); height:var(--size); top:var(--y); left:var(--x);
      box-shadow:0 0 4px 1px rgba(255,255,255,.9),0 0 10px 3px rgba(255,100,220,.6);
    }
    @keyframes sparkleLife{
      0%  { opacity:0; transform:scale(.4) translateY(0); }
      20% { opacity:1; transform:scale(1) translateY(-6px); }
      60% { opacity:.85; transform:scale(.9) translateY(-14px); }
      100%{ opacity:0; transform:scale(.3) translateY(-22px); }
    }
    #overlay1{ z-index:50; }

    /* ══ VIDEO ══ */
    #videoWrap{ position:absolute; inset:0; display:none; background:#000; z-index:20; }
    #videoWrap.show{ display:block; }
    #toMazeVideo{ width:100%; height:100%; object-fit:cover; background:#000; }

    /* ══ OVERLAY 2 ══ */
    #overlay2{ z-index:45; display:none; }
    #overlay2.show{ display:flex; }
    .ghostBtnWrap{
      position:relative; display:inline-flex; align-items:center; justify-content:center;
      background:none; border:none; padding:0; cursor:pointer; -webkit-tap-highlight-color:transparent;
    }
    .ghostBtnWrap:active #startGhost{
      transform:scale(.88) translateY(-5px);
      filter:drop-shadow(0 0 44px rgba(255,100,220,1)) drop-shadow(0 14px 30px rgba(0,0,0,.7));
    }
    .ghostSparkleField{ position:absolute; inset:-70px; pointer-events:none; z-index:0; }
    .ghostSparkleField .sp{ box-shadow:0 0 6px 2px rgba(255,255,255,.95),0 0 16px 5px rgba(255,100,220,.75); }
    #startGhost{
      width:clamp(100px,28vmin,200px); height:clamp(100px,28vmin,200px);
      object-fit:contain; user-select:none; -webkit-user-drag:none;
      filter:drop-shadow(0 0 26px rgba(255,100,220,.6)) drop-shadow(0 14px 30px rgba(0,0,0,.7));
      animation:floaty 3.6s ease-in-out infinite;
      transform-origin:50% 60%; transition:transform 120ms ease,filter 120ms ease;
      position:relative; z-index:1;
    }
    @keyframes floaty{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-8px); } }

    /* ══ MAZE SCENE ══ */
    #mazeScene{ position:absolute; inset:0; background:#000; }
    #stage{ position:absolute; inset:0; overflow:hidden; }
    #mazeImg{
      display:block; position:absolute; inset:0; width:100%; height:100%;
      object-fit:cover; object-position:center center;
      user-select:none; -webkit-user-drag:none; pointer-events:none;
    }
    #mazeCanvas{ position:absolute; left:0; top:0; z-index:6; cursor:default; }
    #mazeCanvas.bryan{ cursor:crosshair; }
    #grid{
      position:absolute; inset:0; display:none; pointer-events:none; z-index:7;
      background-image:linear-gradient(to right,rgba(255,255,255,.12) 1px,transparent 1px),
        linear-gradient(to bottom,rgba(255,255,255,.12) 1px,transparent 1px);
      background-size:80px 80px; mix-blend-mode:screen; opacity:.55;
    }
    #grid.show{ display:block; }

    /* ══ HUD ══ */
    .hudTitle{
      font-family:'Bowlby One',sans-serif; font-size:clamp(13px,1.8vw,18px);
      letter-spacing:2px; line-height:1.15; color:#fff;
      text-shadow:0 0 22px rgba(255,140,255,.7),0 0 60px rgba(255,80,200,.35),0 2px 6px rgba(0,0,0,.9);
      user-select:none; pointer-events:none;
    }
    #hud{
      position:absolute; left:calc(12px + var(--safe-left)); top:calc(12px + var(--safe-top));
      display:flex; gap:10px; align-items:flex-start; z-index:10;
    }
    .pill{
      border-radius:999px; padding:10px 14px; font-weight:900; letter-spacing:.4px;
      background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.16);
      backdrop-filter:blur(14px) saturate(140%); -webkit-backdrop-filter:blur(14px) saturate(140%);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.08),0 14px 30px rgba(0,0,0,.35);
      color:rgba(255,255,255,.92); user-select:none;
    }
    #coordPill{ display:none; } #coordPill.show{ display:block; }
    .coordSmall{ font-size:12px; color:rgba(255,255,255,.7); font-weight:800; letter-spacing:1px; }
    .coordBig{ font-size:14px; margin-top:4px; }

    /* ══ BRYAN BUTTON ══ */
    #bryanBtn{
      position:absolute; left:calc(10px + var(--safe-left)); bottom:calc(10px + var(--safe-bottom));
      z-index:20; border-radius:999px; padding:6px 10px; font-size:9px; font-weight:1000;
      letter-spacing:1.4px; text-transform:uppercase; color:rgba(255,255,255,.45);
      background:rgba(0,0,0,.30); border:1px solid rgba(255,255,255,.10);
      backdrop-filter:blur(10px) saturate(140%); -webkit-backdrop-filter:blur(10px) saturate(140%);
      cursor:pointer; -webkit-tap-highlight-color:transparent;
    }
    #bryanBtn.on{ color:#fff; border-color:rgba(255,255,255,.22); box-shadow:0 0 0 2px rgba(255,59,189,.18),0 0 18px rgba(255,59,189,.25); }
    #bryanBtn:active{ transform:scale(.96); }

    /* ══ BACK BUTTON ══ */
    #backBtn{
      position:absolute; right:calc(8px + var(--safe-right)); bottom:calc(8px + var(--safe-bottom));
      z-index:20; appearance:none; border:0; border-radius:999px;
      padding:5px 12px; font-size:11px; font-weight:1000; letter-spacing:.5px;
      cursor:pointer; color:#000;
      background:linear-gradient(180deg,var(--pink2),var(--pink));
      box-shadow:0 4px 10px rgba(255,59,189,.28),0 0 0 1px rgba(255,59,189,.15),0 0 14px rgba(255,59,189,.28);
      opacity:0.75; -webkit-tap-highlight-color:transparent; transform:translateZ(0); transition:opacity 200ms;
    }
    #backBtn:hover{ opacity:1; }
    #backBtn:active{ transform:scale(.96); opacity:1; }
    @media (min-width:900px) and (pointer:fine){
      #backBtn{ padding:7px 14px; font-size:12px; opacity:0.85; }
      #bryanBtn{ padding:8px 12px; font-size:10px; color:rgba(255,255,255,.6); }
    }
    @media (pointer:coarse){ .hudTitle{ display:none; } #bryanBtn{ display:none; } #hud{ display:none; } }
    #app.inTransition #bryanBtn,#app.inTransition #hud,#app.inTransition #backBtn{ display:none !important; }

    /* ══ CHECKPOINT POPUP ══ */
    #cpPopup{
      position:fixed; z-index:50;
      min-width:240px; max-width:310px;
      background:linear-gradient(150deg,rgba(8,3,26,.97) 0%,rgba(3,8,32,.97) 100%);
      border-radius:22px; padding:20px 22px 18px;
      backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
      text-align:center;
      border:1px solid rgba(255,255,255,.11);
      box-shadow:0 0 0 1px rgba(255,255,255,.05),0 28px 80px rgba(0,0,0,.8),
        inset 0 1px 0 rgba(255,255,255,.09);
      display:none; pointer-events:auto;
      transform:translate(-50%,-100%);
    }
    #cpPopup.show{
      display:block;
      animation:popIn 300ms cubic-bezier(.34,1.46,.64,1) both;
    }
    @keyframes popIn{
      from{ opacity:0; transform:translate(-50%,-92%) scale(.82); }
      to  { opacity:1; transform:translate(-50%,-100%) scale(1); }
    }

    /* Popup accent bar */
    #cpPopupBar{
      height:3px; border-radius:999px; margin:0 auto 14px;
      width:60%; opacity:.9;
    }

    #cpPopup .cp-date{
      font-family:'Bowlby One',sans-serif;
      font-size:clamp(10px,1.8vw,13px);
      letter-spacing:1.5px; text-transform:uppercase;
      color:rgba(255,255,255,.45); margin:0 0 4px;
    }
    #cpPopupTitle{
      font-family:'Bowlby One',sans-serif; font-size:clamp(15px,2.6vw,20px);
      letter-spacing:1px; margin:0 0 16px; color:#fff;
      line-height:1.25;
    }

    /* Three icon buttons */
    .cp-icons{
      display:flex; justify-content:center; gap:14px;
      margin-bottom:16px;
    }
    .cp-icon-btn{
      display:flex; flex-direction:column; align-items:center; gap:6px;
      background:none; border:none; cursor:pointer; padding:0;
      -webkit-tap-highlight-color:transparent;
      transition:transform 120ms ease;
    }
    .cp-icon-btn:active{ transform:scale(.91); }
    .cp-icon-img{
      width:clamp(48px,10vw,68px); height:clamp(48px,10vw,68px);
      object-fit:contain; border-radius:14px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      padding:6px;
      box-shadow:0 4px 18px rgba(0,0,0,.5),0 0 24px rgba(180,100,255,.12);
      transition:box-shadow 120ms ease,border-color 120ms ease;
    }
    .cp-icon-btn:hover .cp-icon-img{
      border-color:rgba(255,255,255,.28);
      box-shadow:0 6px 24px rgba(0,0,0,.6),0 0 30px rgba(180,100,255,.25);
    }
    .cp-icon-label{
      font-size:clamp(8px,1.5vw,11px); font-weight:900; letter-spacing:.8px;
      text-transform:uppercase; color:rgba(255,255,255,.55);
      line-height:1.2; text-align:center; max-width:70px;
    }

    #cpCloseBtn{
      appearance:none; border:0; border-radius:999px;
      padding:8px 22px; font-size:12px; font-weight:900; cursor:pointer; color:#000;
      background:linear-gradient(180deg,var(--pink2),var(--pink));
      box-shadow:0 4px 16px rgba(255,59,189,.4),0 0 24px rgba(255,59,189,.18);
      transition:transform 100ms;
    }
    #cpCloseBtn:active{ transform:scale(.95); }

    /* ══ FADE ══ */
    #fade{ position:fixed; inset:0; background:#000; opacity:0; pointer-events:none; transition:opacity 520ms ease; z-index:200; }
    #fade.on{ opacity:1; }

    @media (prefers-reduced-motion:reduce){
      #startGhost{ animation:none; }
      .rotateIcon{ animation:none; transform:rotate(-90deg); }
      #fade{ transition:none; }
      .sp{ animation:none; opacity:.6; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ROTATE OVERLAY -->
  <div id="rotateOverlay" role="alert" aria-live="polite">
    <span class="rotateIcon">📱</span>
    <div class="rotateGlow"></div>
    <h1 class="rotateTitle">よこにしてね！</h1>
    <p class="rotateSub">めいろをあそぶには<br>スマホを<strong style="color:#ff79d7">よこむき</strong>にしてください</p>
  </div>

  <!-- OVERLAY 1 -->
  <div id="overlay1" class="overlay" aria-label="めいろへいく？">
    <h1 class="overlayHeading">ブーハーめいろにいく？</h1>
    <div class="btnRow">
      <button id="returnBtn" class="btnBlue" type="button">いかない</button>
      <div class="sparkleWrap">
        <div class="sparkleField" id="confirmSparkles" aria-hidden="true"></div>
        <button id="continueBtn" class="btnPink" type="button">いく！</button>
      </div>
    </div>
  </div>

  <!-- TRANSITION VIDEO -->
  <div id="videoWrap" aria-hidden="true">
    <video id="toMazeVideo" preload="auto" playsinline webkit-playsinline>
      <source src="assets/video/to-the-maze.mp4" type="video/mp4" />
    </video>
  </div>

  <!-- OVERLAY 2 -->
  <div id="overlay2" class="overlay" aria-label="スタート">
    <h1 class="overlayHeading">ブーハーをタッチしてはじめよう！</h1>
    <button id="mazeStartBtn" class="ghostBtnWrap" type="button" aria-label="スタート">
      <div class="ghostSparkleField" id="startSparkles" aria-hidden="true"></div>
      <img id="startGhost" alt="ブーハー" />
    </button>
  </div>

  <!-- MAZE SCENE -->
  <section id="mazeScene" aria-label="めいろ">
    <div id="stage">
      <img id="mazeImg" src="assets/img/maze.png" alt="めいろ" />
      <canvas id="mazeCanvas"></canvas>
      <div id="grid"></div>
    </div>

    <!-- Checkpoint popup -->
    <div id="cpPopup" role="dialog" aria-modal="true">
      <div id="cpPopupBar"></div>
      <p class="cp-date" id="cpPopupDate">This Week</p>
      <h2 id="cpPopupTitle">Week —</h2>
      <div class="cp-icons">
        <button class="cp-icon-btn" id="iconPreBoo" type="button" aria-label="Pre-boo">
          <img class="cp-icon-img" src="assets/img/pre-boo.png" alt="Pre-boo" />
          <span class="cp-icon-label">Pre-boo</span>
        </button>
        <button class="cp-icon-btn" id="iconBooTree" type="button" aria-label="Boo-riculum">
          <img class="cp-icon-img" src="assets/img/boo-tree.png" alt="Boo-riculum" />
          <span class="cp-icon-label">Boo-riculum</span>
        </button>
        <button class="cp-icon-btn" id="iconContTree" type="button" aria-label="Boo-continuum">
          <img class="cp-icon-img" src="assets/img/cont-tree.png" alt="Boo-continuum" />
          <span class="cp-icon-label">Boo-continuum</span>
        </button>
      </div>
      <button id="cpCloseBtn" type="button">とじる ✕</button>
    </div>

    <!-- HUD (desktop only) -->
    <div id="hud">
      <div class="hudTitle">BOOHA<br>ADVENTURE</div>
      <div id="coordPill" class="pill">
        <div class="coordSmall">COORDINATES</div>
        <div class="coordBig" id="coordText">x: —  y: —</div>
        <div class="coordSmall" style="margin-top:6px;opacity:.9;">click to copy</div>
      </div>
    </div>

    <button id="bryanBtn" type="button" aria-label="Bryan mode">BRYAN</button>
    <button id="backBtn" type="button" aria-label="もどる">もどる</button>
  </section>

  <div id="fade" aria-hidden="true"></div>
</div>

<audio id="bgMusic" src="assets/audio/sneaky.mp3" loop preload="auto"></audio>

<script>
// ─────────────────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────────────────
const BRYAN_PASS      = 'him141amra803';
const IMG_W           = 1600;
const IMG_H           = 900;
const OPEN_WEEKS      = [8, 9, 10];

const GHOSTS = [
  'assets/img/booha_ghost.png','assets/img/blue-boo.png',
  'assets/img/green-boo.png','assets/img/pink-boo.png','assets/img/purple-boo.png'

// 48 week date labels  (Week 1 = 6 Jan 2025)

// Each month gets TWO colors for a richer dual-tone glow

const MONTH_COLORS = [

// ── Corrected coordinates (dy = -51 from previous) ──
const CHECKPOINTS = [
  {w: 1, ix: 512, iy:355},{w: 2, ix:1319, iy:458},{w: 3, ix:1219, iy:332},
  {w: 4, ix: 952, iy:453},{w: 5, ix: 635, iy:377},{w: 6, ix: 596, iy:597},
  {w: 7, ix:1219, iy:500},{w: 8, ix:1089, iy:355},{w: 9, ix:1046, iy:601},
  {w:10, ix: 453, iy:495},{w:11, ix:1189, iy:565},{w:12, ix: 755, iy:564},
  {w:13, ix: 938, iy:354},{w:14, ix: 592, iy:434},{w:15, ix: 912, iy:630},
  {w:16, ix: 816, iy:393},{w:17, ix:1204, iy:397},{w:18, ix: 444, iy:542},

// ─────────────────────────────────────────────────────────
//  CANVAS / DPR
//  setTransform called ONCE per resize. Draw loop = CSS px only.
// ─────────────────────────────────────────────────────────
const ctx = canvas.getContext('2d');
let cssW = 1, cssH = 1;

function resizeCanvas(){
  const dpr  = window.devicePixelRatio || 1;
  const rect = document.getElementById('stage').getBoundingClientRect();
  cssW = rect.width  || window.innerWidth;
  cssH = rect.height || window.innerHeight;
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';
  canvas.width  = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ─────────────────────────────────────────────────────────
//  COORDINATE TRANSFORMS (object-fit:cover)
// ─────────────────────────────────────────────────────────
function getCover(){
  const scale = Math.max(cssW/IMG_W, cssH/IMG_H);
  return { scale, ox:(IMG_W*scale-cssW)/2, oy:(IMG_H*scale-cssH)/2 };
}
function imgToCSS(ix, iy){
  const {scale,ox,oy} = getCover();
  return { x:ix*scale-ox, y:iy*scale-oy };
}
function cssToImg(cx, cy){
  const {scale,ox,oy} = getCover();
  return {
    ix: Math.round(Math.max(0, Math.min((cx+ox)/scale, IMG_W))),
    iy: Math.round(Math.max(0, Math.min((cy+oy)/scale, IMG_H)))
  };
}

// ─────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────
let mazeStarted = false;
let bryanOn     = false;
let activeWeek  = CURRENT_WEEK;

let introPhase       = 'idle';
let introGlowStart   = 0;
let introTravelStart = 0;
let introSrcIX = 0, introSrcIY = 0;

const startCP   = CHECKPOINTS.find(c => c.w === CURRENT_WEEK);
let ghostIX     = startCP.ix, ghostIY = startCP.iy;
let ghostSrcIX  = ghostIX, ghostSrcIY = ghostIY;
let ghostDstIX  = ghostIX, ghostDstIY = ghostIY;
let ghostT      = 1;
let ghostAnimStart  = 0;
let pendingPopupCP  = null;

let trail = [];

// Per-checkpoint fairy particles — pre-generated offsets
const CP_FAIRIES = CHECKPOINTS.map(() =>
  Array.from({length: 9}, (_, i) => ({
    angle:  (i / 9) * Math.PI * 2 + Math.random() * 0.5,
    orbit:  16 + Math.random() * 18,  // orbit radius in image px equivalent
    speed:  0.38 + Math.random() * 0.55,
    phase:  Math.random() * Math.PI * 2,
    size:   1.2 + Math.random() * 1.6,
    twinkleSpeed: 1.8 + Math.random() * 2.2,
    twinklePhase: Math.random() * Math.PI * 2,
    useSecondary: i % 3 === 2  // every 3rd sparkle uses secondary color
  }))
);

let bMouseX = -1, bMouseY = -1;
let rafHandle = null;

// ─────────────────────────────────────────────────────────
//  EASING
// ─────────────────────────────────────────────────────────
function ease(t){ return t<.5 ? 2*t*t : -1+(4-2*t)*t; }

// ─────────────────────────────────────────────────────────
//  TRAIL
// ─────────────────────────────────────────────────────────
function addTrail(ix, iy){
  const useSec = Math.random() > 0.55;
  const color  = useSec ? monthSecondary(activeWeek) : monthPrimary(activeWeek);
  trail.push({ ix, iy, life:1, size:2+Math.random()*5, color,
    dx:(Math.random()-.5)*.28, dy:-Math.random()*.38 });
  if(trail.length > 100) trail.shift();
}

// ─────────────────────────────────────────────────────────
//  DRAW
// ─────────────────────────────────────────────────────────
function drawFrame(now){
  ctx.clearRect(0, 0, cssW, cssH);
  if(!mazeStarted) return;

  const sec = now / 1000;

  // ── cpState map ──────────────────────────────────────
  const cpState = {};

  if(introPhase === 'allGlow'){
    const el    = now - introGlowStart;
    const showEnd = INTRO_GLOW_MS * 0.62;
    let baseA   = el < showEnd ? 1 : Math.max(0, 1-(el-showEnd)/(INTRO_GLOW_MS-showEnd));
    CHECKPOINTS.forEach(cp => {
      cpState[cp.w] = { alpha: OPEN_WEEKS.includes(cp.w)?1:baseA*0.78, extra:1.5 };
    });
    if(el >= INTRO_GLOW_MS){
      introPhase=      'traveling';
      introTravelStart= now;
      introSrcIX = CHECKPOINTS[0].ix;
      introSrcIY = CHECKPOINTS[0].iy;
      ghostIX    = introSrcIX;
      ghostIY    = introSrcIY;
    }

  } else if(introPhase === 'traveling'){
    OPEN_WEEKS.forEach(w => { cpState[w]={alpha:1,extra:1.0}; });
    const prog = Math.min((now-introTravelStart)/INTRO_TRAVEL_MS, 1);
    const et   = ease(prog);
    ghostIX = introSrcIX + (startCP.ix-introSrcIX)*et;
    ghostIY = introSrcIY + (startCP.iy-introSrcIY)*et;
    if(Math.random()<.32) addTrail(ghostIX, ghostIY);
    if(prog>=1){
      introPhase='done'; ghostIX=startCP.ix; ghostIY=startCP.iy;
      ghostSrcIX=ghostIX; ghostSrcIY=ghostIY;
      ghostDstIX=ghostIX; ghostDstIY=ghostIY; ghostT=1;
    }

  } else {
    // Normal
    OPEN_WEEKS.forEach(w => { cpState[w]={alpha:1,extra:0}; });
    if(bryanOn){
      CHECKPOINTS.forEach(cp => {
        if(!cpState[cp.w]) cpState[cp.w]={alpha:0.65,extra:0.15};
      });
    }
    if(ghostT < 1){
      const el = now - ghostAnimStart;
      ghostT   = Math.min(el/GHOST_TRAVEL_MS, 1);
      const et = ease(ghostT);
      ghostIX  = ghostSrcIX + (ghostDstIX-ghostSrcIX)*et;
      ghostIY  = ghostSrcIY + (ghostDstIY-ghostSrcIY)*et;
      if(Math.random()<.28) addTrail(ghostIX, ghostIY);
      if(ghostT >= 1 && pendingPopupCP){
        ghostIX=ghostDstIX; ghostIY=ghostDstIY;
        showPopupAtCP(pendingPopupCP);
        pendingPopupCP=null;
      }
    }
  }

  // ── Trail ─────────────────────────────────────────────
  for(let i=trail.length-1; i>=0; i--){
    const p=trail[i]; const {x,y}=imgToCSS(p.ix,p.iy);
    const gr=ctx.createRadialGradient(x,y,0,x,y,p.size*2.4);
    gr.addColorStop(0,p.color); gr.addColorStop(1,'transparent');
    ctx.globalAlpha=p.life*0.42; ctx.fillStyle=gr;
    ctx.beginPath(); ctx.arc(x,y,p.size*2.4,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=p.life*0.82; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(x,y,p.size*0.36,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    p.life-=0.016; p.ix+=p.dx; p.iy+=p.dy;
  }
  trail=trail.filter(p=>p.life>0);

  // ── Checkpoints ───────────────────────────────────────
  CHECKPOINTS.forEach((cp, cpIdx) => {
    const state = cpState[cp.w];
    if(!state || state.alpha<=0.01) return;

    const {x,y}  = imgToCSS(cp.ix, cp.iy);
    const col1   = monthPrimary(cp.w);
    const col2   = monthSecondary(cp.w);
    const pulse  = 0.5 + 0.5*Math.sin(sec*2.1 + cp.w*0.73);
    const pulse2 = 0.5 + 0.5*Math.sin(sec*1.35 + cp.w*0.41 + 1.3);
    const baseR  = 10;
    const glowR  = baseR + pulse*5*(1+state.extra*0.65);
    const alpha  = state.alpha;

    ctx.save();

    // Layer 1 — deep haze (primary)
    ctx.globalAlpha = alpha*(0.10+pulse*0.08);
    const hazeR=glowR*4.8;
    const haze=ctx.createRadialGradient(x,y,0,x,y,hazeR);
    haze.addColorStop(0,col1); haze.addColorStop(0.5,col1); haze.addColorStop(1,'transparent');
    ctx.fillStyle=haze;
    ctx.beginPath(); ctx.arc(x,y,hazeR,0,Math.PI*2); ctx.fill();

    // Layer 2 — secondary color haze offset slightly
    ctx.globalAlpha = alpha*(0.08+pulse2*0.07);
    const haze2=ctx.createRadialGradient(x+glowR*0.3,y-glowR*0.2,0,x,y,hazeR*0.85);
    haze2.addColorStop(0,col2); haze2.addColorStop(0.5,col2); haze2.addColorStop(1,'transparent');
    ctx.fillStyle=haze2;
    ctx.beginPath(); ctx.arc(x,y,hazeR*0.85,0,Math.PI*2); ctx.fill();

    // Layer 3 — dual-color mid ring (primary inner, secondary outer)
    ctx.globalAlpha = alpha*(0.38+pulse2*0.18);
    const midR=glowR*2.1;
    const midG=ctx.createRadialGradient(x,y,glowR*0.3,x,y,midR);
    midG.addColorStop(0,'transparent');
    midG.addColorStop(0.35,col1);
    midG.addColorStop(0.65,col2);
    midG.addColorStop(1,'transparent');
    ctx.fillStyle=midG;
    ctx.beginPath(); ctx.arc(x,y,midR,0,Math.PI*2); ctx.fill();

    // Layer 4 — inner corona (white→col1→col2→transparent)
    ctx.globalAlpha = alpha*(0.72+pulse*0.18);
    const coronaR=glowR*1.12;
    const corona=ctx.createRadialGradient(x,y,0,x,y,coronaR);
    corona.addColorStop(0,'#fff');
    corona.addColorStop(0.2,col1);
    corona.addColorStop(0.6,col2);
    corona.addColorStop(1,'transparent');
    ctx.fillStyle=corona;
    ctx.beginPath(); ctx.arc(x,y,coronaR,0,Math.PI*2); ctx.fill();

    // Layer 5 — solid gem dot with dual shadow
    ctx.globalAlpha=alpha*(0.90+pulse*0.10);
    ctx.shadowBlur=20; ctx.shadowColor=col1;
    ctx.fillStyle=col1;
    ctx.beginPath(); ctx.arc(x,y,glowR*0.45,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=12; ctx.shadowColor=col2;
    ctx.fillStyle=col2;
    ctx.beginPath(); ctx.arc(x,y,glowR*0.28,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

    // Layer 6 — white core
    ctx.globalAlpha=alpha;
    const coreG=ctx.createRadialGradient(x,y,0,x,y,glowR*0.18);
    coreG.addColorStop(0,'rgba(255,255,255,1)');
    coreG.addColorStop(0.7,'rgba(255,255,255,.7)');
    coreG.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=coreG;
    ctx.beginPath(); ctx.arc(x,y,glowR*0.18,0,Math.PI*2); ctx.fill();

    // Layer 7 — 4-point star burst (smaller: 0.7× previous)
    ctx.globalAlpha=alpha*(0.35+pulse*0.28);
    ctx.strokeStyle='rgba(255,255,255,0.9)';
    ctx.lineWidth=0.9;
    ctx.shadowBlur=8; ctx.shadowColor=col1;
    const starLen=glowR*(0.85+pulse*0.32); // reduced vs before
    ctx.beginPath();
    ctx.moveTo(x, y-starLen*0.18); ctx.lineTo(x, y-starLen);
    ctx.moveTo(x, y+starLen*0.18); ctx.lineTo(x, y+starLen);
    ctx.moveTo(x-starLen*0.18, y); ctx.lineTo(x-starLen, y);
    ctx.moveTo(x+starLen*0.18, y); ctx.lineTo(x+starLen, y);
    // diagonal arms (shorter)
    const diagLen=starLen*0.45;
    ctx.moveTo(x-diagLen*0.12,y-diagLen*0.12); ctx.lineTo(x-diagLen,y-diagLen);
    ctx.moveTo(x+diagLen*0.12,y-diagLen*0.12); ctx.lineTo(x+diagLen,y-diagLen);
    ctx.moveTo(x-diagLen*0.12,y+diagLen*0.12); ctx.lineTo(x-diagLen,y+diagLen);
    ctx.moveTo(x+diagLen*0.12,y+diagLen*0.12); ctx.lineTo(x+diagLen,y+diagLen);
    ctx.stroke();
    ctx.shadowBlur=0;

    // Layer 8 — fairy sparkle particles (9 per checkpoint)
    const fairies = CP_FAIRIES[cpIdx];
    // Orbit radius scales with screen so it feels right at all sizes
    const orbitScale = Math.min(cssW, cssH) / 900;
    fairies.forEach(f => {
      const angle    = f.angle + sec*f.speed;
      const twinkle  = 0.4 + 0.6*Math.abs(Math.sin(sec*f.twinkleSpeed + f.twinklePhase));
      const r        = f.orbit * orbitScale * (0.82 + state.extra*0.1) * (0.9+0.1*Math.sin(sec*1.2+f.phase));
      const fx       = x + Math.cos(angle)*r;
      const fy       = y + Math.sin(angle)*r * 0.85; // slightly elliptical
      const fColor   = f.useSecondary ? col2 : col1;
      const fAlpha   = twinkle * alpha * (0.65+state.extra*0.15);
      const fSize    = f.size * (0.7+twinkle*0.5) * orbitScale;

      // Soft glow halo behind sparkle
      ctx.globalAlpha = fAlpha * 0.45;
      const fg=ctx.createRadialGradient(fx,fy,0,fx,fy,fSize*3.5);
      fg.addColorStop(0,fColor); fg.addColorStop(1,'transparent');
      ctx.fillStyle=fg;
      ctx.beginPath(); ctx.arc(fx,fy,fSize*3.5,0,Math.PI*2); ctx.fill();

      // 4-point tiny star for the fairy sparkle itself
      ctx.globalAlpha = fAlpha;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth   = fSize*0.6;
      ctx.shadowBlur  = 6; ctx.shadowColor = fColor;
      const sl = fSize*2.2;
      ctx.beginPath();
      ctx.moveTo(fx, fy-sl); ctx.lineTo(fx, fy+sl);
      ctx.moveTo(fx-sl, fy); ctx.lineTo(fx+sl, fy);
      ctx.stroke();

      // Bright center dot
      ctx.globalAlpha = fAlpha * 1.0;
      ctx.fillStyle   = '#fff';
      ctx.shadowBlur  = 4; ctx.shadowColor = fColor;
      ctx.beginPath(); ctx.arc(fx, fy, fSize*0.55, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur  = 0;
    });

    ctx.globalAlpha=1;
    ctx.restore();
  });

  // ── Ghost ─────────────────────────────────────────────
  const bob           = Math.sin(sec*1.85)*3.5;
  const {x:gx,y:gy}  = imgToCSS(ghostIX, ghostIY);
  const gR            = 30;
  const pulseG        = 0.5 + 0.5*Math.sin(sec*2.1);
  const gcol1         = monthPrimary(activeWeek);
  const gcol2         = monthSecondary(activeWeek);

  ctx.save();
  // Dual-color aura
  ctx.globalAlpha = 0.22 + pulseG*0.12;
  const ga1=ctx.createRadialGradient(gx,gy+4,0,gx,gy+4,gR*2.1);
  ga1.addColorStop(0,gcol1); ga1.addColorStop(0.5,gcol2); ga1.addColorStop(1,'transparent');
  ctx.fillStyle=ga1;
  ctx.beginPath(); ctx.arc(gx,gy+4,gR*2.1,0,Math.PI*2); ctx.fill();
  // Shadow blob
  ctx.globalAlpha=0.16+pulseG*0.07;
  const gs=ctx.createRadialGradient(gx,gy+gR*0.7,0,gx,gy+gR*0.7,gR*0.9);
  gs.addColorStop(0,'rgba(0,0,0,0.55)'); gs.addColorStop(1,'transparent');
  ctx.fillStyle=gs;
  ctx.beginPath(); ctx.arc(gx,gy+gR*0.7,gR*0.9,0,Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.globalAlpha=1;
  if(ghostImg.complete && ghostImg.naturalWidth>0){
    ctx.drawImage(ghostImg, gx-gR, gy-gR+bob, gR*2, gR*2);
  } else {
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(gx,gy+bob,gR*0.7,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // ── Bryan crosshair ───────────────────────────────────
  if(bryanOn && bMouseX>=0){
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,.55)'; ctx.lineWidth=1;
    ctx.shadowBlur=8; ctx.shadowColor='rgba(255,255,255,.3)';
    ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(0,bMouseY); ctx.lineTo(cssW,bMouseY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bMouseX,0); ctx.lineTo(bMouseX,cssH); ctx.stroke();
    ctx.restore();
  }
}

// ─────────────────────────────────────────────────────────
//  RAF LOOP
// ─────────────────────────────────────────────────────────
function loop(now){ drawFrame(now); rafHandle=requestAnimationFrame(loop); }
function startLoop(){ if(!rafHandle) rafHandle=requestAnimationFrame(loop); }

// ─────────────────────────────────────────────────────────
//  HIT TEST
// ─────────────────────────────────────────────────────────
const HIT_R = 44;
function hitTest(clientX, clientY){
  const rect=canvas.getBoundingClientRect();
  const cx=clientX-rect.left, cy=clientY-rect.top;
  const {ix,iy}=cssToImg(cx,cy);
  const pool=bryanOn ? CHECKPOINTS : CHECKPOINTS.filter(c=>OPEN_WEEKS.includes(c.w));
  let best=null, bestD=Infinity;
  pool.forEach(cp=>{
    const d=Math.hypot(cp.ix-ix,cp.iy-iy);
    if(d<HIT_R && d<bestD){ bestD=d; best=cp; }
  });
  return best;
}

// ─────────────────────────────────────────────────────────
//  CANVAS EVENTS
// ─────────────────────────────────────────────────────────
canvas.addEventListener('click', e=>{
  if(!mazeStarted) return;
  if(introPhase==='allGlow'||introPhase==='traveling') return;
  if(bryanOn){
    const rect=canvas.getBoundingClientRect();
    const {ix,iy}=cssToImg(e.clientX-rect.left,e.clientY-rect.top);
    coordText.textContent=`x: ${ix}  y: ${iy}`;
    copyText(`${ix},${iy}`).then(ok=>{
      if(ok){coordPill.style.transform='scale(1.04)';setTimeout(()=>coordPill.style.transform='',130);}
    });
  }
  const cp=hitTest(e.clientX,e.clientY);
  if(cp) startGhostTravel(cp);
});
canvas.addEventListener('touchend', e=>{
  if(!mazeStarted||introPhase==='allGlow'||introPhase==='traveling') return;
  if(!e.changedTouches.length) return;
  const t0=e.changedTouches[0];
  const cp=hitTest(t0.clientX,t0.clientY);
  if(cp){ startGhostTravel(cp); e.preventDefault(); }
},{passive:false});
canvas.addEventListener('mousemove', e=>{
  if(!bryanOn) return;
  const rect=canvas.getBoundingClientRect();
  bMouseX=e.clientX-rect.left; bMouseY=e.clientY-rect.top;
  const {ix,iy}=cssToImg(bMouseX,bMouseY);
  coordText.textContent=`x: ${ix}  y: ${iy}`;
});
canvas.addEventListener('mouseleave',()=>{ bMouseX=-1; bMouseY=-1; });

function startGhostTravel(cp){
  cpPopup.classList.remove('show');
  ghostSrcIX=ghostIX; ghostSrcIY=ghostIY;
  ghostDstIX=cp.ix;   ghostDstIY=cp.iy;
  ghostT=0; ghostAnimStart=performance.now();
  activeWeek=cp.w; pendingPopupCP=cp;
}

// ─────────────────────────────────────────────────────────
//  POPUP
// ─────────────────────────────────────────────────────────
function showPopupAtCP(cp){
  const col1=monthPrimary(cp.w), col2=monthSecondary(cp.w);

  // Accent bar: gradient of both month colors
  cpPopupBar.style.background=`linear-gradient(90deg,${col1},${col2})`;
  cpPopupBar.style.boxShadow=`0 0 14px ${col1}66,0 0 28px ${col2}44`;

  cpPopupDate.textContent='This Week  ' + WEEK_DATES[cp.w-1];
  cpTitle.textContent    = 'Week ' + String(cp.w).padStart(2,'0');

  // Position popup above the checkpoint
  const {x,y}=imgToCSS(cp.ix,cp.iy);
  const rect=canvas.getBoundingClientRect();
  const absX=rect.left+x, absY=rect.top+y;
  const margin=18, halfW=155;
  const px=Math.min(Math.max(absX,halfW+margin),window.innerWidth-halfW-margin);
  const py=absY-14;

  cpPopup.classList.remove('show');
  void cpPopup.offsetWidth; // force reflow to replay animation
  cpPopup.style.left     =px+'px';
  cpPopup.style.top      =py+'px';
  cpPopup.style.transform='translate(-50%,-100%)';
  cpPopup.classList.add('show');
}

// ─────────────────────────────────────────────────────────
//  BRYAN MODE
// ─────────────────────────────────────────────────────────
function applyBryan(){
  bryanBtn.classList.toggle('on',bryanOn);
  gridEl.classList.toggle('show',bryanOn);
  coordPill.classList.toggle('show',bryanOn);
  canvas.classList.toggle('bryan',bryanOn);
  if(!bryanOn){ bMouseX=-1;bMouseY=-1;coordText.textContent='x: —  y: —'; }
}
bryanBtn.addEventListener('click',()=>{
  if(bryanOn){bryanOn=false;applyBryan();return;}
  const pw=prompt('Bryan mode password:');
  if(pw===null) return;
  if(String(pw).trim()===BRYAN_PASS){bryanOn=true;applyBryan();} else alert('Nope.');
});
coordPill.addEventListener('click',()=>{
  const m=coordText.textContent.match(/x:\s*(\d+)\s*y:\s*(\d+)/);
  if(m) copyText(`${m[1]},${m[2]}`);
});
async function copyText(txt){
  try{await navigator.clipboard.writeText(txt);return true;}catch(e){}
  try{
    const ta=document.createElement('textarea');ta.value=txt;
    ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);
    ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);return true;
  }catch(e){return false;}
}

// ─────────────────────────────────────────────────────────
//  DOM SPARKLES
// ─────────────────────────────────────────────────────────
function buildSparkles(container,count=24,wide=false){
  container.innerHTML='';
  for(let i=0;i<count;i++){
    const sp=document.createElement('div');sp.className='sp';
    const angle=(i/count)*Math.PI*2;
    const r=wide?35+Math.random()*28:28+Math.random()*18;
    const cx=50+Math.cos(angle)*r,cy=50+Math.sin(angle)*r;
    const size=wide?3+Math.random()*4:2+Math.random()*3;
    const dur=1.3+Math.random()*1.8,delay=-(Math.random()*dur);
    sp.style.cssText=`--size:${size}px;--x:${cx}%;--y:${cy}%;--dur:${dur}s;--delay:${delay}s;`;
    container.appendChild(sp);
  }
}
buildSparkles(confirmSp,24);
buildSparkles(startSp,36,true);

// ─────────────────────────────────────────────────────────
//  OVERLAY FLOW
// ─────────────────────────────────────────────────────────
returnBtn.addEventListener('click',()=>{fadeOut();setTimeout(()=>window.location.href='index.html',FADE_MS);});

let videoPlayed=false;
continueBtn.addEventListener('click',async()=>{
  if(videoPlayed)return;videoPlayed=true;
  overlay1.classList.add('hidden');
  overlay1.addEventListener('transitionend',()=>overlay1.classList.add('gone'),{once:true});
  app.classList.add('inTransition');
  videoWrap.classList.add('show');
  try{toMazeVideo.currentTime=0;}catch(e){}
  try{await toMazeVideo.play();}catch(e){showOverlay2();}
});

let o2shown=false;
function showOverlay2(){
  if(o2shown)return;o2shown=true;
  try{toMazeVideo.pause();toMazeVideo.currentTime=0;}catch(e){}
  videoWrap.classList.remove('show');
  overlay2.classList.add('show');
  app.classList.add('inTransition');
  resizeCanvas();
}
toMazeVideo.addEventListener('ended',showOverlay2);
toMazeVideo.addEventListener('error',showOverlay2);
toMazeVideo.addEventListener('timeupdate',()=>{
  const d=toMazeVideo.duration;
  if(!isFinite(d)||d<=0)return;
  if(d-toMazeVideo.currentTime<=0.5)showOverlay2();
});

let mazeLaunched=false;
mazeStartBtn.addEventListener('click',async()=>{
  if(mazeLaunched)return;mazeLaunched=true;
  overlay2.classList.add('hidden');
  overlay2.addEventListener('transitionend',()=>overlay2.remove(),{once:true});
  app.classList.remove('inTransition');
  mazeStarted=true;
  ghostIX=CHECKPOINTS[0].ix;ghostIY=CHECKPOINTS[0].iy;
  introPhase='allGlow';introGlowStart=performance.now();
  resizeCanvas();startLoop();
  try{bgMusic.volume=0.65;await bgMusic.play();}catch(e){console.warn('Music blocked',e);}
});

backBtn.addEventListener('click',()=>{
  try{bgMusic.pause();bgMusic.currentTime=0;}catch(e){}
  fadeOut();setTimeout(()=>window.location.href='index.html',FADE_MS);
});
function fadeOut(){fade.classList.add('on');}

document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    try{toMazeVideo.pause();}catch(e){}
    try{bgMusic.pause();}catch(e){}
  } else {
    if(videoPlayed&&!o2shown) try{toMazeVideo.play();}catch(e){}
    if(mazeLaunched)          try{bgMusic.play();}catch(e){}
  }
});

resizeCanvas();
