
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Booha Adventure 2027</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#000;
      --pink:#ff3bbd;
      --pink2:#ff79d7;
      --text:#ffffff;
      --muted:rgba(255,255,255,.7);
      --safe-top:    env(safe-area-inset-top,    0px);
      --safe-right:  env(safe-area-inset-right,  0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left:   env(safe-area-inset-left,   0px);
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
        "Noto Sans","Hiragino Kaku Gothic ProN","Yu Gothic", sans-serif;
      overscroll-behavior: none;
    }

    #app {
      position: fixed;
      inset: 0;
      background: var(--bg) url('assets/img/background-1.png') center/cover no-repeat;
      overflow: hidden;
    }

    #app::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center,
        rgba(0,0,0,.10) 0%,
        rgba(0,0,0,.48) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Landscape overlay ── */
    #landscapeOverlay {
      position: fixed; inset: 0;
      display: none;
      align-items: center; justify-content: center;
      padding: 24px;
      text-align: center;
      background: rgba(0,0,0,.97);
      z-index: 9999;
    }
    #landscapeOverlay.show { display: flex; }
    #landscapeOverlay .card {
      max-width: 340px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 22px;
      padding: 28px 22px;
    }
    #landscapeOverlay h2 { margin: 0 0 10px; font-size: clamp(18px,5vw,24px); }
    #landscapeOverlay p  { margin: 0; color: var(--muted); line-height: 1.5; font-size: clamp(13px,3.5vw,15px); }
    .rotate-icon { font-size: 48px; margin-bottom: 14px; display: block; animation: rotateHint 2s ease-in-out infinite; }
    @keyframes rotateHint {
      0%,100% { transform: rotate(0deg); }
      50%      { transform: rotate(90deg); }
    }

    /* ══ SCENES ══ */
    .scene {
      position: absolute; inset: 0;
      display: none;
      z-index: 1;
    }
    .scene.active { display: flex; }

    /* ── START ── */
    #startScene {
      background: #000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 3vw, 22px);
      padding:
        calc(clamp(16px,3vw,24px) + var(--safe-top))
        calc(clamp(16px,3vw,24px) + var(--safe-right))
        calc(clamp(16px,3vw,24px) + var(--safe-bottom))
        calc(clamp(16px,3vw,24px) + var(--safe-left));
      text-align: center;
      overflow: hidden;
    }

    .ghostOuter {
      position: relative;
      width:  clamp(110px, 22vmin, 200px);
      height: clamp(110px, 22vmin, 200px);
      flex-shrink: 0;
    }

    .ghostWrap {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      animation: floaty 3.8s ease-in-out infinite;
      filter: drop-shadow(0 12px 24px rgba(0,0,0,.75));
      will-change: transform, opacity;
    }

    .ghostWrap.flyAway {
      animation: none;
      transition:
        transform 1800ms cubic-bezier(.15,.8,.25,1),
        opacity   1600ms ease 200ms;
      transform: translate3d(0,-85vh,0) scale(.7) rotate(-4deg);
      opacity: 0;
    }

    @keyframes floaty {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }

    .sparkleField {
      position: absolute;
      inset: -50px;
      pointer-events: none;
    }

    .sp {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      opacity: 0;
      animation: sparkleLife var(--dur) ease-in-out var(--delay) infinite;
      width: var(--size); height: var(--size);
      top: var(--y); left: var(--x);
      box-shadow:
        0 0 4px 1px rgba(255,255,255,.9),
        0 0 10px 3px rgba(255,100,220,.6);
    }

    @keyframes sparkleLife {
      0%   { opacity: 0;    transform: scale(.4) translateY(0); }
      20%  { opacity: 1;    transform: scale(1)  translateY(-6px); }
      60%  { opacity: .85;  transform: scale(.9) translateY(-13px); }
      100% { opacity: 0;    transform: scale(.3) translateY(-20px); }
    }

    #boohaGhost {
      width: 100%; height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* ── VIDEO ── */
    #videoScene {
      background: #000;
      align-items: center; justify-content: center;
      overflow: hidden;
    }
    #introVideo {
      width: 100%; height: 100%;
      object-fit: cover;
      background: #000;
    }

    /* ── HUB ── */
    #hubScene {
      background: transparent;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      display: none;
    }
    #hubScene.active {
      display: block;
    }

    .hubScroll {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        calc(clamp(10px,2vw,16px) + var(--safe-top))
        calc(clamp(10px,2vw,16px) + var(--safe-right))
        calc(clamp(10px,2vw,16px) + var(--safe-bottom))
        calc(clamp(10px,2vw,16px) + var(--safe-left));
    }

    .hub {
      width: min(1100px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(8px, 1.8vw, 16px);
    }

    .hubHeading {
      text-align: center;
      font-family: 'Bowlby One', system-ui, sans-serif;
      font-size: clamp(20px, 4.5vw, 48px);
      font-weight: 400;
      letter-spacing: 3px;
      color: #fff;
      text-shadow:
        0 0 32px rgba(255,140,255,.65),
        0 0 80px rgba(255,80,200,.3),
        0 2px 8px rgba(0,0,0,.9);
      line-height: 1.1;
    }

    /* ── 3-card row – always horizontal in landscape ── */
    .hubRow {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: clamp(8px, 1.6vw, 14px);
      width: 100%;
    }

    /* ── Week card – compact height ── */
    .weekCard {
      position: relative;
      border-radius: clamp(14px,2vw,22px);
      overflow: hidden;
      padding: clamp(10px,1.6vw,16px) clamp(10px,1.6vw,16px) clamp(8px,1.2vw,12px);
      /* Fixed compact height — no stretchy min-height */
      height: clamp(100px, 14vw, 140px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      /* Use transform3d to avoid repaints */
      transform: translateZ(0);
      transition: transform 220ms ease, box-shadow 220ms ease;
      /* Prevent flicker via composite layer */
      will-change: transform;
      backface-visibility: hidden;

      background: rgba(255,255,255,.09);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);

      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.22),
        0 6px 24px rgba(0,0,0,.35),
        0 0 0 2px hsl(var(--hue,0deg) 90% 65% / .7),
        0 0 18px 4px hsl(var(--hue,0deg) 90% 65% / .30);

      animation: rainbowHue var(--rainbow-speed,5s) linear infinite;
      animation-delay: var(--rainbow-offset,0s);
    }

    @property --hue {
      syntax: '<angle>';
      inherits: false;
      initial-value: 0deg;
    }
    @keyframes rainbowHue {
      from { --hue: 0deg; }
      to   { --hue: 360deg; }
    }

    .weekCard:nth-child(1) { --rainbow-offset: 0s;     --rainbow-speed: 5s; }
    .weekCard:nth-child(2) { --rainbow-offset: -1.67s; --rainbow-speed: 5s; }
    .weekCard:nth-child(3) { --rainbow-offset: -3.33s; --rainbow-speed: 5s; }

    .weekCard::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        120deg,
        transparent 30%,
        rgba(255,255,255,.18) 50%,
        transparent 70%
      );
      transform: translateX(-100%);
      animation: shimmerSweep 3.8s ease-in-out infinite;
      animation-delay: var(--shimmer-offset,0s);
      pointer-events: none;
    }
    .weekCard:nth-child(1)::before { --shimmer-offset: 0s; }
    .weekCard:nth-child(2)::before { --shimmer-offset: 1.2s; }
    .weekCard:nth-child(3)::before { --shimmer-offset: 2.4s; }

    @keyframes shimmerSweep {
      0%   { transform: translateX(-100%) skewX(-12deg); opacity: 0; }
      20%  { opacity: 1; }
      60%  { transform: translateX(200%)  skewX(-12deg); opacity: 0; }
      100% { transform: translateX(200%)  skewX(-12deg); opacity: 0; }
    }

    .weekCard:hover {
      transform: translateY(-3px) scale(1.015) translateZ(0);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.32),
        0 12px 32px rgba(0,0,0,.45),
        0 0 0 2px hsl(var(--hue,0deg) 90% 70% / .9),
        0 0 28px 6px hsl(var(--hue,0deg) 90% 65% / .45);
    }
    .weekCard:active { transform: scale(.99) translateZ(0); }

    .weekTag {
      font-weight: 900; letter-spacing: 1.5px;
      font-size: clamp(9px,1.2vw,12px);
      text-transform: uppercase;
      color: rgba(255,255,255,.6);
    }
    .weekTag span { color: rgba(255,255,255,.9); margin-left: 4px; }

    .weekTitle {
      font-size: clamp(12px, 2vw, 19px);
      font-weight: 900; letter-spacing: .4px;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,.6);
      margin-top: 4px;
      line-height: 1.2;
    }

    .weekDates {
      font-size: clamp(9px, 1.2vw, 12px);
      color: rgba(255,255,255,.65);
      margin-top: 3px;
      line-height: 1.3;
    }

    .weekHint {
      font-size: clamp(8px,1vw,10px);
      letter-spacing: 1.5px;
      color: rgba(255,255,255,.40);
      text-transform: uppercase;
    }

    /* Hub bottom */
    .hubBottom {
      display: flex;
      justify-content: center;
      padding-top: 2px;
    }

    /* ── Shared button ── */
    .btn {
      appearance: none; border: 0;
      border-radius: 999px;
      padding: clamp(10px,1.6vw,13px) clamp(16px,2.5vw,22px);
      font-size: clamp(13px,1.8vw,17px);
      font-weight: 900; letter-spacing: .6px;
      cursor: pointer; color: #000;
      background: linear-gradient(180deg, var(--pink2), var(--pink));
      box-shadow:
        0 8px 18px rgba(255,59,189,.28),
        0 0 0 2px rgba(255,59,189,.15),
        0 0 22px rgba(255,59,189,.30);
      transform: translateZ(0);
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .btn:active { transform: scale(.98) translateZ(0); }
    .btnSmall {
      padding: clamp(8px,1.2vw,11px) clamp(12px,2vw,18px);
      font-size: clamp(12px,1.5vw,14px);
    }

    /* ── Fade layer ── */
    #fade {
      position: absolute; inset: 0;
      background: #000; opacity: 0;
      pointer-events: none;
      /* Use will-change to prevent flicker */
      will-change: opacity;
      transition: opacity 520ms ease;
      z-index: 40;
    }
    #fade.on { opacity: 1; pointer-events: all; }

    /* ══════════════════════════════════════════
       PICKER OVERLAY
    ══════════════════════════════════════════ */
    .picker {
      position: absolute; inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding:
        calc(clamp(10px,2vw,16px) + var(--safe-top))
        calc(clamp(10px,2vw,16px) + var(--safe-right))
        calc(clamp(10px,2vw,16px) + var(--safe-bottom))
        calc(clamp(10px,2vw,16px) + var(--safe-left));
      background:
        radial-gradient(ellipse at center,
          rgba(0,0,0,.55) 0%,
          rgba(0,0,0,.82) 65%,
          rgba(0,0,0,.92) 100%);
      backdrop-filter: blur(10px) saturate(130%);
      -webkit-backdrop-filter: blur(10px) saturate(130%);
      z-index: 60;
    }
    .picker.show { display: flex; }

    .pickerPanel {
      position: relative;
      /* Narrow panel — tiles stack vertically */
      width: min(420px, 94%);
      border-radius: clamp(20px,3vw,28px);
      overflow: hidden;
      padding: clamp(14px,2.5vw,20px) clamp(14px,2vw,18px);
      margin: auto;

      background: rgba(255,255,255,.09);
      backdrop-filter: blur(22px) saturate(160%);
      -webkit-backdrop-filter: blur(22px) saturate(160%);
      will-change: transform;

      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.22),
        0 26px 70px rgba(0,0,0,.75),
        0 0 0 2px hsl(var(--hue,0deg) 90% 65% / .75),
        0 0 34px 8px hsl(var(--hue,0deg) 90% 65% / .35);

      animation: rainbowHue 5s linear infinite;
    }

    .pickerPanel::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        120deg,
        transparent 35%,
        rgba(255,255,255,.14) 50%,
        transparent 65%
      );
      transform: translateX(-110%) skewX(-12deg);
      animation: shimmerSweep 4.2s ease-in-out infinite;
      pointer-events: none;
    }

    .pickerTop {
      display: flex; align-items: center;
      justify-content: space-between; gap: 8px;
      position: relative; z-index: 1;
    }

    .pickerTitle {
      font-family: 'Bowlby One', system-ui, sans-serif;
      font-size: clamp(13px, 2.2vw, 20px);
      letter-spacing: 2px;
      text-align: center; flex: 1;
      text-shadow:
        0 0 24px rgba(255,140,255,.55),
        0 2px 10px rgba(0,0,0,.85);
    }

    .ghostBtn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.22);
      color: rgba(255,255,255,.92);
      border-radius: 999px;
      padding: clamp(6px,1vw,9px) clamp(10px,1.6vw,14px);
      font-size: clamp(10px,1.4vw,13px);
      font-weight: 900; letter-spacing: .4px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
      flex-shrink: 0;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.10),
        0 8px 18px rgba(0,0,0,.30);
    }
    .ghostBtn:hover  { background: rgba(255,255,255,.10); }
    .ghostBtn:active { transform: scale(.99); }

    .pickerSub {
      margin-top: 6px;
      color: rgba(255,255,255,.72);
      font-size: clamp(10px,1.5vw,13px);
      text-align: center;
      position: relative; z-index: 1;
    }

    .pickerSub2 {
      margin-top: 4px;
      font-size: clamp(8px,1.1vw,11px);
      letter-spacing: 1.4px;
      color: rgba(255,255,255,.40);
      text-transform: uppercase; text-align: center;
      position: relative; z-index: 1;
    }

    /* ── Picker grid: VERTICAL STACK, centered ── */
    .pickerGrid {
      display: flex;
      flex-direction: column;
      gap: clamp(7px,1.2vw,10px);
      margin-top: clamp(10px,1.8vw,14px);
      align-items: center;
      position: relative; z-index: 1;
    }

    .pickTile {
      appearance: none; border: 0;
      border-radius: clamp(12px,2vw,18px);
      padding: clamp(10px,1.6vw,14px) clamp(14px,2vw,18px);
      cursor: pointer;
      text-align: left;
      color: #fff;
      width: 100%;
      background: rgba(0,0,0,.16);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.18),
        0 12px 24px rgba(0,0,0,.30),
        0 0 0 2px hsl(var(--tileHue,210deg) 90% 65% / .50),
        0 0 20px 4px hsl(var(--tileHue,210deg) 90% 65% / .18);
      transition: transform 160ms ease, box-shadow 200ms ease, background 200ms ease;
      -webkit-tap-highlight-color: transparent;
      will-change: transform;
    }

    .pickTile:hover {
      transform: translateY(-2px) translateZ(0);
      background: rgba(255,255,255,.08);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.28),
        0 18px 32px rgba(0,0,0,.40),
        0 0 0 2px hsl(var(--tileHue,210deg) 95% 70% / .70),
        0 0 28px 8px hsl(var(--tileHue,210deg) 90% 65% / .28);
    }
    .pickTile:active { transform: translateY(-1px) scale(.99) translateZ(0); }

    .pickTile[data-curr="preboo"]       { --tileHue: 315deg; }
    .pickTile[data-curr="booriculum"]   { --tileHue: 190deg; }
    .pickTile[data-curr="boocontinuum"] { --tileHue: 120deg; }

    .tileTop {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(8px,1.4vw,12px);
    }

    .tileIcon {
      flex-shrink: 0;
      width:  clamp(32px,4.5vw,48px);
      height: clamp(32px,4.5vw,48px);
      border-radius: clamp(8px,1.4vw,14px);
      display: grid; place-items: center;
      background: rgba(255,255,255,.08);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.18),
        0 6px 14px rgba(0,0,0,.30);
    }

    .tileIcon img {
      width: 70%; height: 70%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      filter:
        drop-shadow(0 0 8px rgba(255,255,255,.35))
        drop-shadow(0 0 16px rgba(255,255,255,.18));
      transition: transform 200ms ease;
    }
    .pickTile:hover .tileIcon img { transform: scale(1.10); }

    .tileName {
      font-size: clamp(13px,1.8vw,17px);
      font-weight: 900; letter-spacing: .3px; line-height: 1.1;
    }

    .tileJp {
      display: block;
      margin-top: 3px;
      font-size: clamp(10px,1.2vw,12px);
      color: rgba(255,255,255,.65);
    }

    /* hide hint text in vertical layout */
    .tileHint { display: none; }

    .pickerNote {
      margin-top: clamp(8px,1.4vw,12px);
      font-size: clamp(9px,1.1vw,11px);
      color: rgba(255,255,255,.45);
      text-align: center;
      position: relative; z-index: 1;
    }

    /* ══ REDUCED MOTION ══ */
    @media (prefers-reduced-motion: reduce) {
      .ghostWrap         { animation: none; }
      #fade              { transition: none; }
      .weekCard          { animation: none; }
      .weekCard::before  { animation: none; }
      .pickerPanel       { animation: none; }
      .pickerPanel::before { animation: none; }
      .rotate-icon       { animation: none; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Landscape required overlay -->
  <div id="landscapeOverlay" aria-hidden="true">
    <div class="card">
      <span class="rotate-icon">📱</span>
      <h2>Rotate to Landscape</h2>
      <p>Please turn your device sideways to play Booha Adventure.</p>
    </div>
  </div>

  <!-- ── START ── -->
  <section id="startScene" class="scene active" aria-label="Start">
    <div class="ghostOuter">
      <div class="sparkleField" aria-hidden="true"></div>
      <div class="ghostWrap" aria-hidden="true">
        <img id="boohaGhost" src="assets/img/booha_ghost.png" alt="Booha" />
      </div>
    </div>
    <button id="startBtn" class="btn" type="button">スタート</button>
  </section>

  <!-- ── VIDEO ── -->
  <section id="videoScene" class="scene" aria-label="Intro video">
    <video id="introVideo" preload="auto" playsinline webkit-playsinline>
      <source src="assets/video/intro.mp4" type="video/mp4" />
    </video>
  </section>

  <!-- ── HUB ── -->
  <section id="hubScene" class="scene" aria-label="Week Hub">
    <div class="hubScroll">
      <div class="hub">
        <div class="hubHeading">BOOHA ADVENTURE</div>

        <div class="hubRow" id="weekCards">
          <!-- injected by JS -->
        </div>

        <div class="hubBottom">
          <button id="mazeBtn" class="btn btnSmall" type="button">めいろへ（Maze）</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ── Curriculum picker ── -->
  <div id="picker" class="picker" aria-hidden="true">
    <div class="pickerPanel" role="dialog" aria-modal="true" aria-label="Choose Curriculum">
      <div class="pickerTop">
        <div style="width:52px; flex-shrink:0;"></div>
        <div class="pickerTitle" id="pickerTitle">THIS WEEK（今週）</div>
        <button id="pickerClose" class="ghostBtn" type="button" aria-label="Back">戻る</button>
      </div>

      <div class="pickerSub" id="pickerDates">Mar 1 – Mar 7（3月1日–3月7日）</div>
      <div class="pickerSub2">Choose your curriculum</div>

      <div class="pickerGrid">
        <button class="pickTile" type="button" data-curr="preboo">
          <div class="tileTop">
            <div class="tileIcon">
              <img src="assets/img/pre-boo.png" alt="Pre-Boo" />
            </div>
            <div>
              <div class="tileName">Pre-Boo</div>
              <span class="tileJp">プレブー</span>
            </div>
          </div>
        </button>

        <button class="pickTile" type="button" data-curr="booriculum">
          <div class="tileTop">
            <div class="tileIcon">
              <img src="assets/img/boo-tree.png" alt="Boo-riculum" />
            </div>
            <div>
              <div class="tileName">Boo-riculum</div>
              <span class="tileJp">ブーリキュラム</span>
            </div>
          </div>
        </button>

        <button class="pickTile" type="button" data-curr="boocontinuum">
          <div class="tileTop">
            <div class="tileIcon">
              <img src="assets/img/cont-tree.png" alt="Boo-continuum" />
            </div>
            <div>
              <div class="tileName">Boo-continuum</div>
              <span class="tileJp">ブーコンティニューム</span>
            </div>
          </div>
        </button>
      </div>

      <div class="pickerNote">※ ここはプレースホルダーです（後でリンクします）</div>
    </div>
  </div>

  <div id="fade" aria-hidden="true"></div>
</div>

<script>
  /* ── Element refs ── */
  const startScene  = document.getElementById('startScene');
  const videoScene  = document.getElementById('videoScene');
  const hubScene    = document.getElementById('hubScene');
  const startBtn    = document.getElementById('startBtn');
  const introVideo  = document.getElementById('introVideo');
  const fade        = document.getElementById('fade');
  const ghostWrap   = document.querySelector('.ghostWrap');
  const sparkleField = document.querySelector('.sparkleField');
  const lsOverlay   = document.getElementById('landscapeOverlay');

  /* ══════════════════════════════════
     LANDSCAPE ENFORCEMENT
     Show overlay whenever portrait on
     any screen size.
  ══════════════════════════════════ */
  function checkOrientation(){
    const isPortrait = window.matchMedia('(orientation: portrait)').matches;
    lsOverlay.classList.toggle('show', isPortrait);
    lsOverlay.setAttribute('aria-hidden', isPortrait ? 'false' : 'true');
  }
  window.addEventListener('resize',          checkOrientation, { passive: true });
  window.addEventListener('orientationchange', checkOrientation, { passive: true });
  checkOrientation();

  /* ── Scene helpers ── */
  function showScene(el){
    [startScene, videoScene, hubScene].forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    if (el === hubScene) hubScene.scrollTop = 0;
  }
  function fadeToBlack(on){
    fade.classList.toggle('on', !!on);
  }

  /* ── Sparkles ── */
  (function initSparkles(){
    if (!sparkleField) return;
    const COUNT = 32;
    sparkleField.innerHTML = '';
    for (let i = 0; i < COUNT; i++){
      const sp   = document.createElement('div');
      sp.className = 'sp';
      const angle  = (i / COUNT) * Math.PI * 2;
      const radius = 28 + Math.random() * 22;
      const cx     = 50 + Math.cos(angle) * radius;
      const cy     = 50 + Math.sin(angle) * radius;
      const size   = 2 + Math.random() * 3;
      const dur    = 1.4 + Math.random() * 2.0;
      const delay  = -(Math.random() * dur);
      sp.style.cssText = `--size:${size}px;--x:${cx}%;--y:${cy}%;--dur:${dur}s;--delay:${delay}s;`;
      sparkleField.appendChild(sp);
    }
  })();

  /* ══════════════════════════════════
     DATE / WEEK LOGIC
     Locked to Japan time (Asia/Tokyo).
     Cycle starts 2027-01-03 (Sunday).
     Each week is Mon–Sun.
     Week 1 of the cycle = Jan 3–9 2027.

     Current real date context:
       This week  = Mar 1–7
       Last week  = Feb 22–28
       Next week  = Mar 8–14

     We determine the correct week by
     computing which Mon-anchored week
     "today" (Tokyo) falls in relative
     to the cycle start.
  ══════════════════════════════════ */

  const MONTH_ABBR = ['Jan','Feb','Mar','Apr','May','Jun',
                      'Jul','Aug','Sep','Oct','Nov','Dec'];
  const MONTH_NAME = {
    jan:'January', feb:'February', mar:'March',     apr:'April',
    may:'May',     jun:'June',     jul:'July',       aug:'August',
    sep:'September', oct:'October', nov:'November', dec:'December'
  };

  // Set to null for production — will use real Tokyo time
  const DEV_DATE = null; // production: uses real Japan time

  function tokyoTodayYMD(){
    if (DEV_DATE){
      const [y,m,d] = DEV_DATE.split('-').map(Number);
      return {y, m, d};
    }
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone:'Asia/Tokyo',
      year:'numeric', month:'2-digit', day:'2-digit'
    }).formatToParts(new Date());
    const map = Object.fromEntries(
      parts.filter(p => p.type !== 'literal').map(p => [p.type, p.value])
    );
    return { y:+map.year, m:+map.month, d:+map.day };
  }

  function ymdToMs(y,m,d){ return Date.UTC(y,m-1,d); }
  function parseYMD(str){ const [y,m,d]=str.split('-').map(Number); return {y,m,d}; }

  function addDays(ymd,n){
    const ms = ymdToMs(ymd.y,ymd.m,ymd.d) + n*86400000;
    const dt = new Date(ms);
    return {y:dt.getUTCFullYear(), m:dt.getUTCMonth()+1, d:dt.getUTCDate()};
  }

  function fmtRange(s,e){
    const en  = ymd => `${MONTH_ABBR[ymd.m-1]} ${ymd.d}`;
    const jp  = ymd => `${ymd.m}月${ymd.d}日`;
    return `${en(s)} – ${en(e)}（${jp(s)}–${jp(e)}）`;
  }

  function labelFromWeekId(id){
    if (!id) return '—';
    if (id === 'dec_w4_pre') return 'December Week 4';
    if (id.includes('_') && id.split('_').length >= 4){
      const p = id.split('_');
      const mn = p[2] || '';
      return `${MONTH_NAME[mn] || mn} Week ${(p[3]||'w1').replace('w','')}`;
    }
    if (id.startsWith('week_')) return `Week ${id.replace('week_','')}`;
    return id;
  }

  function buildCard({tagEn, tagJp, weekId, title, rangeText, hint, locked}){
    const div = document.createElement('div');
    div.className = 'weekCard';
    if (locked) div.classList.add('lockedCard');
    div.dataset.weekId = weekId || '';
    div.dataset.tagEn  = tagEn;
    div.dataset.tagJp  = tagJp;
    div.innerHTML = `
      <div>
        <div class="weekTag">${tagEn}<span>（${tagJp}）</span></div>
        <div class="weekTitle">${title}</div>
        <div class="weekDates">${rangeText}</div>
      </div>
      <div class="weekHint">${hint||'TAP TO OPEN'}</div>
    `;
    return div;
  }

  /* ── Picker ── */
  const picker      = document.getElementById('picker');
  const pickerTitle = document.getElementById('pickerTitle');
  const pickerDates = document.getElementById('pickerDates');
  const pickerClose = document.getElementById('pickerClose');
  const mazeBtn     = document.getElementById('mazeBtn');

  let currentPickerWeekId = '';

  function openPicker(tagEn, tagJp, dates, weekId){
    if (!weekId) return;
    currentPickerWeekId = weekId;
    pickerTitle.textContent = `${tagEn}（${tagJp}）`;
    pickerDates.textContent = dates;
    picker.scrollTop = 0;
    picker.classList.add('show');
    picker.setAttribute('aria-hidden','false');
  }

  function closePicker(){
    currentPickerWeekId = '';
    picker.classList.remove('show');
    picker.setAttribute('aria-hidden','true');
  }

  pickerClose.addEventListener('click', closePicker);
  picker.addEventListener('click', e => { if (e.target === picker) closePicker(); });

  document.querySelectorAll('.pickTile').forEach(btn => {
    btn.addEventListener('click', () => {
      alert(`PLACEHOLDER\nweek: ${currentPickerWeekId}\ncurriculum: ${btn.dataset.curr}`);
    });
  });

  if (mazeBtn){
    mazeBtn.addEventListener('click', () => {
      fadeToBlack(true);
      setTimeout(() => { window.location.href = 'maze.html'; }, 520);
    });
  }

  /* ── Render hub cards ── */
  async function renderHub(){
    const weekCards = document.getElementById('weekCards');
    weekCards.innerHTML = '';

    let year = null;
    try {
      const res = await fetch(`data/year.json?v=${Date.now()}`);
      if (res.ok) year = await res.json();
    } catch(e){}

    // Cycle starts on 2027-01-03 (Sunday).
    // Weeks run Sun–Sat to align with the cycle anchor.
    // Adjust: the first "week" is Jan 3–9 (Sun–Sat).
    const CYCLE_START_STR = (year && year.cycleStart) || '2027-01-03';
    const cycleStart      = parseYMD(CYCLE_START_STR);
    const cycleStartMs    = ymdToMs(cycleStart.y, cycleStart.m, cycleStart.d);
    const cycleLength     = (year && year.cycleLength) || 48;
    const weeks           = (year && year.weeks)       || [];

    const today   = tokyoTodayYMD();
    const todayMs = ymdToMs(today.y, today.m, today.d);
    const diffDays = Math.floor((todayMs - cycleStartMs) / 86400000);

    let thisIdx, thisWeekId, thisStart;

    if (diffDays < 0){
      // Before cycle starts
      thisIdx    = -1;
      thisWeekId = (year && year.preStartWeek) || 'dec_w4_pre';
      thisStart  = addDays(cycleStart, -14);
    } else {
      thisIdx    = Math.floor(diffDays / 7) % cycleLength;
      thisWeekId = weeks[thisIdx] || `week_${thisIdx+1}`;
      thisStart  = addDays(cycleStart, thisIdx * 7);
    }
    const thisEnd = addDays(thisStart, 6);

    // Last week
    let lastWeekId=null, lastStart=null, lastEnd=null;
    if (thisIdx === -1){
      lastWeekId = null;
    } else if (thisIdx === 0){
      lastWeekId = 'dec_w4_pre';
      lastStart  = addDays(cycleStart, -7);
      lastEnd    = addDays(lastStart, 6);
    } else {
      const lIdx = (thisIdx-1+cycleLength) % cycleLength;
      lastWeekId = weeks[lIdx] || `week_${lIdx+1}`;
      lastStart  = addDays(cycleStart, lIdx*7);
      lastEnd    = addDays(lastStart, 6);
    }

    // Next week
    let nextWeekId=null, nextStart=null, nextEnd=null;
    if (thisIdx === -1){
      nextWeekId = weeks[0] || 'week_1';
      nextStart  = cycleStart;
      nextEnd    = addDays(nextStart, 6);
    } else {
      const nIdx = (thisIdx+1) % cycleLength;
      nextWeekId = weeks[nIdx] || `week_${nIdx+1}`;
      nextStart  = addDays(cycleStart, nIdx*7);
      nextEnd    = addDays(nextStart, 6);
    }

    // LAST WEEK card
    if (lastWeekId){
      weekCards.appendChild(buildCard({
        tagEn:'LAST WEEK', tagJp:'先週',
        weekId:lastWeekId, title:labelFromWeekId(lastWeekId),
        rangeText:fmtRange(lastStart, lastEnd)
      }));
    } else {
      weekCards.appendChild(buildCard({
        tagEn:'LAST WEEK', tagJp:'先週',
        weekId:'', title:'—', rangeText:'—', hint:'LOCKED', locked:true
      }));
    }

    // THIS WEEK card
    weekCards.appendChild(buildCard({
      tagEn:'THIS WEEK', tagJp:'今週',
      weekId:thisWeekId, title:labelFromWeekId(thisWeekId),
      rangeText:fmtRange(thisStart, thisEnd)
    }));

    // NEXT WEEK card
    weekCards.appendChild(buildCard({
      tagEn:'NEXT WEEK', tagJp:'来週',
      weekId:nextWeekId||'',
      title:nextWeekId ? labelFromWeekId(nextWeekId) : '—',
      rangeText:nextWeekId ? fmtRange(nextStart, nextEnd) : '—',
      hint:nextWeekId ? 'TAP TO OPEN' : 'LOCKED',
      locked:!nextWeekId
    }));

    // Bind card click → picker
    weekCards.querySelectorAll('.weekCard').forEach(card => {
      card.addEventListener('click', () => {
        const wid  = card.dataset.weekId;
        if (!wid) return;
        const dates = card.querySelector('.weekDates')?.textContent || '';
        const tagEn = card.dataset.tagEn || '';
        const tagJp = card.dataset.tagJp || '';
        openPicker(tagEn, tagJp, dates, wid);
      });
    });
  }

  /* ── Start flow ── */
  let started   = false;
  let fadingOut = false;

  async function startIntro(){
    if (started) return;
    started = true;
    ghostWrap.classList.add('flyAway');
    fadeToBlack(true);
    await new Promise(r => setTimeout(r, 900));
    showScene(videoScene);
    try { introVideo.currentTime = 0; } catch(e){}
    // Use rAF to ensure scene swap is painted before fading in
    requestAnimationFrame(() => requestAnimationFrame(() => fadeToBlack(false)));
    try {
      await introVideo.play();
    } catch(err){
      started   = false;
      fadingOut = false;
      ghostWrap.classList.remove('flyAway');
      showScene(startScene);
      fadeToBlack(false);
      alert('もう一度「スタート」をタップしてください。');
    }
  }

  startBtn.addEventListener('click', startIntro);

  /* ── Video → Hub transition (no flicker) ── */
  const FADE_MS = 520;
  let hubRendered = false;

  // Pre-render hub data as soon as page loads so transition is instant
  (async function preloadHub(){
    try {
      await renderHub();
      hubRendered = true;
    } catch(e){ console.error(e); }
  })();

  async function goToHub(){
    if (fadingOut) return;
    fadingOut = true;
    fadeToBlack(true);

    await new Promise(r => setTimeout(r, FADE_MS));
    try { introVideo.pause(); } catch(e){}

    showScene(hubScene);

    // If not pre-rendered yet, render now
    if (!hubRendered){
      try { await renderHub(); hubRendered = true; } catch(e){ console.error(e); }
    }

    // Double rAF ensures DOM is fully painted before revealing
    requestAnimationFrame(() => requestAnimationFrame(() => fadeToBlack(false)));
  }

  introVideo.addEventListener('timeupdate', () => {
    const d = introVideo.duration;
    if (!isFinite(d) || d <= 0) return;
    if (d - introVideo.currentTime <= 0.85) goToHub();
  });
  introVideo.addEventListener('ended', goToHub);
  introVideo.addEventListener('error', goToHub);

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) try { introVideo.pause(); } catch(e){}
  });
</script>
</body>
</html>
