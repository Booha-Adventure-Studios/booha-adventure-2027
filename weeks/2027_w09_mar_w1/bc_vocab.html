
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Boo-riculum – Vocab</title>
<meta name="theme-color" content="#0d1a09">
<link rel="icon" type="image/png" href="../../boo-tree.png">
<link href="https://fonts.googleapis.com/css2?family=Chau+Philomene+One&family=Nunito:wght@800;900&family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet" />

<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   NATURE PALETTE  (matches br_index.html)
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root {
  --bg:         #0d1a09;
  --font-ui:    'Chau Philomene One', sans-serif;
  --font-en:    'Nunito', sans-serif;          /* ESL-friendly, clear, rounded */
  --font-jp:    'Noto Sans JP', sans-serif;
  --white:      #ffffff;
  --white-dim:  rgba(255,255,255,.65);
  --card-r:     28px;
}

/* ── Nature tile palettes (one per card, cycles) ── */
/* Each palette = [stripe-a, stripe-b, stripe-c] */

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--white);
  overflow: hidden; /* body never scrolls */
}

#app {
  /* Real scroll container — works portrait & landscape */
  height: 100dvh;
  max-height: -webkit-fill-available;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: env(safe-area-inset-bottom, 16px);
}

/* ── Background canvas ── */
#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── Close / back button ── */
#btn-close {
  position: fixed;
  top: 18px;
  right: 18px;
  z-index: 9999;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.35);
  background: rgba(0,0,0,.45);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .18s ease, border-color .18s ease;
  box-shadow: 0 0 14px rgba(255,255,255,.18), 0 0 28px rgba(255,255,255,.08);
  animation: pulseClose 2.8s ease-in-out infinite;
}
#btn-close:hover {
  transform: scale(1.15);
  border-color: rgba(255,255,255,.75);
  box-shadow: 0 0 20px rgba(255,255,255,.38), 0 0 44px rgba(255,255,255,.15);
}
#btn-close:active { transform: scale(.9); }
#btn-close svg {
  width: 22px; height: 22px;
  stroke: #fff; stroke-width: 2.5; stroke-linecap: round;
  filter: drop-shadow(0 0 5px rgba(255,255,255,.7));
}
@keyframes pulseClose {
  0%,100% { box-shadow: 0 0 12px rgba(255,255,255,.18), 0 0 26px rgba(255,255,255,.07); }
  50%     { box-shadow: 0 0 22px rgba(255,255,255,.36), 0 0 48px rgba(255,255,255,.14); }
}

/* ── Header ── */
header {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 36px 20px 10px;
  animation: fadeUp .9s cubic-bezier(.22,.8,.36,1) both;
}
.hdr-title {
  font-family: var(--font-ui);
  font-size: clamp(22px, 4.8vw, 46px);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--white);
  text-shadow: 0 0 28px rgba(48,208,80,.5), 0 2px 8px rgba(0,0,0,.8);
  line-height: 1.05;
}
.hdr-jp {
  font-family: var(--font-jp);
  font-size: clamp(12px, 2.2vw, 18px);
  color: var(--white-dim);
  letter-spacing: 2px;
  margin-top: 4px;
}
.hdr-sub {
  font-family: var(--font-ui);
  font-size: clamp(13px, 2vw, 17px);
  color: var(--white);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 6px;
  text-shadow: 0 1px 6px rgba(0,0,0,.6);
}
.divider {
  width: clamp(80px, 28vw, 200px);
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
  border-radius: 2px;
  margin: 8px auto 0;
}

/* ── Card counter ── */
.card-counter {
  position: relative;
  z-index: 1;
  font-family: var(--font-ui);
  font-size: clamp(12px, 1.8vw, 15px);
  color: var(--white-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 8px;
}

/* ── Card wrapper ── */
.card-area {
  position: relative;
  z-index: 1;
  width: min(92vw, 780px);
  flex-shrink: 0;
  margin-top: 12px;
  perspective: 1200px;
}

/* ── Card scene (flip container) ── */
.card-scene {
  width: 100%;
  aspect-ratio: 3 / 2;
  position: relative;
  transform-style: preserve-3d;
  transition: transform .55s cubic-bezier(.4,0,.2,1);
  cursor: pointer;
}
.card-scene.flipped { transform: rotateY(180deg); }

/* Both faces share this */
.card-face {
  position: absolute;
  inset: 0;
  border-radius: var(--card-r);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
  border: 3px solid rgba(255,255,255,.22);
  box-shadow: 0 20px 60px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.07) inset;
  display: flex;
  align-items: center;
  justify-content: center;
  /* Ensure each face is fully opaque — prevents bleed-through */
  background: #111;
  isolation: isolate;
  will-change: transform;
}

/* Back face is flipped 180 */
.card-back { transform: rotateY(180deg); }

/* Animated stripe background on both faces */
.card-face .stripe-layer {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background-size: 100% 240px;
  animation: stripeScroll 7s linear infinite;
  opacity: 1;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}
@keyframes stripeScroll {
  from { background-position: 0 0; }
  to   { background-position: 0 240px; }
}

/* Frosted overlay for readability */
.card-face .frosted {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: rgba(0,0,0,.28);
  backdrop-filter: blur(0px);
}

/* Content layer */
.card-face .content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  padding: clamp(16px, 3.5vw, 32px);
  gap: clamp(6px, 1.5vw, 12px);
  text-align: center;
}

/* ── FRONT: English word ── */
.en-word {
  font-family: var(--font-en);
  font-weight: 900;
  white-space: nowrap;
  color: #fff;
  line-height: 1.0;
  letter-spacing: 1px;
  text-shadow: 0 2px 10px rgba(0,0,0,.75);
  /* size set by JS fitOneLine */
}

/* Dancing letter spans (JS wraps each letter) */
.en-word .letter {
  display: inline-block;
}
.en-word.dancing .letter {
  animation: letterDance var(--dance-dur, .5s) ease-in-out infinite alternate;
  animation-delay: var(--dance-delay, 0s);
}
@keyframes letterDance {
  0%   { transform: translateY(0) rotate(0deg) scale(1); }
  40%  { transform: translateY(-12px) rotate(-4deg) scale(1.08); }
  100% { transform: translateY(-18px) rotate(4deg) scale(1.12); }
}

/* Flip hint on front */
.flip-hint {
  position: absolute;
  bottom: 14px;
  right: 18px;
  font-family: var(--font-ui);
  font-size: clamp(10px, 1.4vw, 13px);
  color: rgba(255,255,255,.45);
  letter-spacing: 1px;
  text-transform: uppercase;
  pointer-events: none;
}

/* ── BACK: Kanji + Hiragana ── */
.jp-kanji {
  font-family: var(--font-jp);
  font-weight: 900;
  font-size: clamp(42px, 9vw, 88px);
  line-height: 1.1;
  color: #fff;
  text-shadow: 0 2px 10px rgba(0,0,0,.75);
  white-space: normal;
  word-break: keep-all;
  overflow-wrap: anywhere;
  max-width: 92%;
}
.jp-hira {
  font-family: var(--font-jp);
  font-weight: 700;
  font-size: clamp(16px, 3.8vw, 32px);
  color: rgba(255,255,255,.88);
  line-height: 1.2;
  text-shadow: 0 1px 6px rgba(0,0,0,.7);
  max-width: 92%;
  overflow-wrap: anywhere;
  margin-top: clamp(2px, 1vw, 8px);
}

/* ── Sparkle motes ── */
#sparkle-layer {
  position: absolute;
  inset: 0;
  border-radius: var(--card-r);
  pointer-events: none;
  overflow: hidden;
  z-index: 10;
}
.mote {
  position: absolute;
  border-radius: 50%;
  opacity: 0;
  background: radial-gradient(circle, var(--mc, #fff) 0%, transparent 70%);
  animation: motePop var(--md, .9s) ease-out forwards;
}
@keyframes motePop {
  0%   { opacity: 0; transform: translate(-50%,-50%) scale(.3); }
  15%  { opacity: 1; transform: translate(-50%,-50%) scale(1.15); }
  100% { opacity: 0; transform: translate(var(--tx,0), var(--ty,-50px)) scale(.4); }
}

/* ── Controls ── */
.controls {
  position: relative;
  z-index: 1;
  display: flex;
  gap: clamp(14px, 3vw, 24px);
  justify-content: center;
  align-items: center;
  margin-top: clamp(12px, 2vh, 24px);
  padding: 0 16px 20px;
  flex-shrink: 0;
}

.btn {
  width: clamp(64px, 11vw, 82px);
  height: clamp(64px, 11vw, 82px);
  border-radius: 20px;
  border: 3px solid rgba(255,255,255,.25);
  background: rgba(255,255,255,.10);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--white);
  font-family: var(--font-ui);
  font-size: clamp(22px, 4vw, 34px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .15s ease, border-color .15s ease, background .15s ease;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  touch-action: manipulation;
}
.btn:hover {
  background: rgba(255,255,255,.18);
  border-color: rgba(255,255,255,.55);
  transform: scale(1.06);
}
.btn:active { transform: scale(.92); }

/* Play button — nature green glow */
#btn-play {
  background: linear-gradient(145deg, #1f8f35, #0e4019);
  border-color: #5ee87a;
  box-shadow: 0 0 18px rgba(94,232,122,.45), 0 8px 24px rgba(0,0,0,.4);
}
#btn-play:hover {
  background: linear-gradient(145deg, #28b844, #145c25);
  border-color: #88ffaa;
  box-shadow: 0 0 28px rgba(94,232,122,.65), 0 8px 24px rgba(0,0,0,.4);
}
#btn-play.cooling {
  opacity: .55;
  pointer-events: none;
}

/* ── Warning toast (button-smashing) ── */
#warning-toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  z-index: 9999;
  background: rgba(10,10,10,.92);
  border: 2px solid rgba(255,100,100,.6);
  border-radius: 16px;
  padding: 14px 22px;
  text-align: center;
  font-family: var(--font-jp);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 30px rgba(255,80,80,.3);
  transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s ease;
  opacity: 0;
  pointer-events: none;
  max-width: min(90vw, 360px);
}
#warning-toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}
#warning-toast .warn-jp {
  font-size: clamp(14px, 3vw, 18px);
  font-weight: 700;
  color: #ff8888;
  line-height: 1.5;
}
#warning-toast .warn-en {
  font-size: clamp(11px, 2vw, 13px);
  color: rgba(255,255,255,.55);
  margin-top: 4px;
  font-family: var(--font-ui);
  letter-spacing: .5px;
  text-transform: uppercase;
}

/* ── Entrance animations ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}
.card-area   { animation: fadeUp .8s cubic-bezier(.22,.8,.36,1) .15s both; }
.controls    { animation: fadeUp .8s cubic-bezier(.22,.8,.36,1) .28s both; }

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  .card-scene  { transition: none; }
  .stripe-layer { animation: none; }
  .en-word.dancing .letter { animation: none; }
  .mote { animation: none; opacity: 0; }
}

/* ── Landscape phone: compact layout, card + controls side by side ── */
@media (orientation: landscape) and (max-height: 520px) {
  header          { padding: 16px 70px 6px; }
  .hdr-title      { font-size: clamp(14px, 3vw, 22px); }
  .hdr-jp         { font-size: clamp(10px, 1.6vw, 13px); }
  .hdr-sub        { font-size: clamp(11px, 1.6vw, 14px); margin-top: 3px; }
  .divider        { margin: 4px auto 0; }
  .card-counter   { margin-top: 4px; font-size: 11px; }
  .card-area      { width: min(58vw, 480px); margin-top: 6px; }
  .controls       { margin-top: 8px; gap: 10px; }
  .btn            { width: 52px; height: 52px; font-size: 20px; border-radius: 14px; }
}

/* ── Small portrait phones ── */
@media (max-width: 380px) {
  .card-area { width: 94vw; }
  .btn       { width: 58px; height: 58px; font-size: 20px; }
}
</style>

<script>
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  const COLORS = [
    '#30d050','#4df070','#20a8f0','#60d8ff',
    '#f0aa00','#ffe060','#28c890','#b0f040',
    '#ff9040','#e8e080'
  ];
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const PARTS = [];
  function makePart(scatter) {
    return {
      x: Math.random() * (canvas.width || 400),
      y: scatter ? Math.random() * (canvas.height || 700) : (canvas.height || 700) + 10,
      r: .7 + Math.random() * 2,
      vx: (Math.random() - .5) * .2,
      vy: -.06 - Math.random() * .16,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      alpha: .08 + Math.random() * .22,
      life: scatter ? Math.random() : 0,
    };
  }
  for (let i = 0; i < 55; i++) PARTS.push(makePart(true));
  function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < PARTS.length; i++) {
      const p = PARTS[i];
      p.x += p.vx; p.y += p.vy; p.life += .0032;
      if (p.y < -10 || p.life > 1) { PARTS[i] = makePart(false); continue; }
      const a = p.alpha * Math.sin(p.life * Math.PI);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = a;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>

/* ── Nature stripe palettes (cycle through cards) ── */
const PALETTES = [
  ['#1a7a2e','#2ecc50','#6ee88a'],   /* forest green   */
  ['#0d5fa8','#1a8fe0','#60c4ff'],   /* sky blue       */
  ['#a06200','#d98c00','#ffc532'],   /* sunflower gold */
  ['#5a1a8a','#8e3dcc','#c87aff'],   /* wildflower purple */
  ['#8a1a1a','#cc3d3d','#ff8a7a'],   /* autumn berry   */
  ['#0a6060','#18a8a8','#5cf0e0'],   /* ocean teal     */
  ['#3a5a00','#6a9a00','#b8f040'],   /* lime leaf      */
  ['#5a3a00','#a07000','#f0c040'],   /* warm amber     */
];

/* ── Shuffle deck ── */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}
shuffle(CARDS);

/* ── State ── */
let idx      = 0;
let flipped  = false;

/* ── DOM refs ── */
const scene    = document.getElementById('card-scene');
const enEl     = document.getElementById('en-word');
const kanjiEl  = document.getElementById('jp-kanji');
const hiraEl   = document.getElementById('jp-hira');
const sfEl     = document.getElementById('stripe-front');
const sbEl     = document.getElementById('stripe-back');
const counter  = document.getElementById('card-counter');
const sparkL   = document.getElementById('sparkle-layer');

/* ── Stripe background builder ── */
function makeStripe(colors) {
  const band = 40;
  const stops = [];
  colors.forEach((c, i) => {
    const s = i * band;
    stops.push(`${c} ${s}px ${s + band}px`);
  });
  const doubled = stops.concat(
    stops.map(s => s.replace(/(\d+)px/g, (_, n) => (+n + band * colors.length) + 'px'))
  );
  return `repeating-linear-gradient(180deg, ${doubled.join(', ')})`;
}

/* ── Auto-fit English word to one line ── */
function fitOneLine(el, maxPx, minPx) {
  el.style.whiteSpace  = 'nowrap';
  el.style.display     = 'inline-block';
  el.style.width       = '90%';
  el.style.maxWidth    = '90%';
  let lo = minPx, hi = maxPx, best = minPx;
  for (let step = 0; step < 14; step++) {
    const mid = Math.round((lo + hi) / 2);
    el.style.fontSize = mid + 'px';
    if (el.scrollWidth <= el.clientWidth + 2) { best = mid; lo = mid + 1; }
    else { hi = mid - 1; }
  }
  el.style.fontSize = best + 'px';
}

/* ── Wrap each letter in a span for dancing ── */
function wrapLetters(el, text) {
  el.innerHTML = text.split('').map((ch, i) =>
    ch === ' '
      ? ' '
      : `<span class="letter" style="--dance-delay:${(i * 0.06).toFixed(2)}s; --dance-dur:${(.45 + Math.random()*.25).toFixed(2)}s">${ch}</span>`
  ).join('');
}

/* ── Show current card ── */
function showCard() {
  const card    = CARDS[idx];
  const palette = PALETTES[idx % PALETTES.length];
  const stripe  = makeStripe(palette);

  sfEl.style.backgroundImage = stripe;
  sbEl.style.backgroundImage = stripe;

  /* English word — wrap letters, then fit */
  wrapLetters(enEl, card.en);
  enEl.classList.remove('dancing');

  const isMobile = window.innerWidth <= 480;
  const maxPx = isMobile ? 80 : 150;
  const minPx = isMobile ? 36 : 56;
  /* Brief delay so spans are in DOM before measuring */
  requestAnimationFrame(() => fitOneLine(enEl, maxPx, minPx));

  kanjiEl.textContent = card.jp;
  hiraEl.textContent  = card.hira;
  counter.textContent = `${idx + 1} / ${CARDS.length}`;

  /* Ensure correct flip state */
  scene.classList.toggle('flipped', flipped);
}

/* ── Mote burst ── */
const MOTE_COLORS = ['#c0ffcc','#c0eeff','#ffeeaa','#ffccdd','#fff','#b0f040'];
function burstMotes() {
  sparkL.innerHTML = '';
  for (let i = 0; i < 22; i++) {
    const m  = document.createElement('div');
    m.className = 'mote';
    const sz = 5 + Math.random() * 10;
    const x  = 8 + Math.random() * 84;
    const y  = 20 + Math.random() * 60;
    const tx = (Math.random() - .5) * 80 + 'px';
    const ty = -(20 + Math.random() * 70) + 'px';
    const md = (.5 + Math.random() * .6) + 's';
    const mc = MOTE_COLORS[Math.floor(Math.random() * MOTE_COLORS.length)];
    m.style.cssText = `width:${sz}px;height:${sz}px;left:${x}%;top:${y}%;--tx:${tx};--ty:${ty};--md:${md};--mc:${mc};animation-delay:${(Math.random()*.12).toFixed(2)}s`;
    sparkL.appendChild(m);
  }
  setTimeout(() => { sparkL.innerHTML = ''; }, 1400);
}

/* ── Audio: single element, primed on first user interaction ── */
const audio   = new Audio();
audio.preload = 'auto';
let audioPrimed = false;

function primeAudio() {
  if (audioPrimed) return;
  /* Set a silent src and play immediately to unlock iOS audio */
  audio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
  audio.play().then(() => {
    audio.pause();
    audio.src = '';
    audioPrimed = true;
  }).catch(() => {});
}
document.addEventListener('touchstart', primeAudio, { once: true, passive: true });
document.addEventListener('click',      primeAudio, { once: true });

/* ── Button-smash protection ── */
let playLocked    = false;
let smashCount    = 0;
let smashTimer    = null;
const COOL_MS     = 1800;
const SMASH_LIMIT = 3;
const toast       = document.getElementById('warning-toast');
let toastTimer    = null;

function showWarning() {
  if (toastTimer) clearTimeout(toastTimer);
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3200);
}

async function playAudio() {
  if (playLocked) {
    smashCount++;
    if (smashCount >= SMASH_LIMIT) showWarning();
    return;
  }

  const card = CARDS[idx];
  if (!card || !card.mp3) return;

  playLocked = true;
  const btnPlay = document.getElementById('btn-play');
  btnPlay.classList.add('cooling');
  smashCount = 0;

  /* Start dancing letters */
  enEl.classList.add('dancing');

  audio.src = AUDIO_BASE + card.mp3;
  try {
    await audio.play();
    /* Stop dance when audio ends */
    audio.onended = () => {
      enEl.classList.remove('dancing');
      playLocked = false;
      btnPlay.classList.remove('cooling');
    };
  } catch (e) {
    console.warn('[br_vocab] audio play failed:', e);
    enEl.classList.remove('dancing');
    playLocked = false;
    btnPlay.classList.remove('cooling');
  }

  burstMotes();
}

/* ── Nav helpers ── */
function goNext() {
  idx = (idx + 1) % CARDS.length;
  flipped = false;
  audio.pause();
  enEl.classList.remove('dancing');
  playLocked = false;
  document.getElementById('btn-play').classList.remove('cooling');
  showCard();
}
function goPrev() {
  idx = (idx - 1 + CARDS.length) % CARDS.length;
  flipped = false;
  audio.pause();
  enEl.classList.remove('dancing');
  playLocked = false;
  document.getElementById('btn-play').classList.remove('cooling');
  showCard();
}
function doFlip() {
  flipped = !flipped;
  scene.classList.toggle('flipped', flipped);
}

/* ── Button events ── */
document.getElementById('btn-prev').addEventListener('click', goPrev);
document.getElementById('btn-next').addEventListener('click', goNext);
document.getElementById('btn-flip').addEventListener('click', doFlip);
document.getElementById('btn-play').addEventListener('click', playAudio);
scene.addEventListener('click', doFlip);

/* ── Refit on resize ── */
window.addEventListener('resize', () => showCard());

/* ── Init ── */
showCard();
</script>

</body>
</html>
